<!-- Partial-Dashboard-GM.html -->
<script>
window.getDashboardGMTemplate = function() {
  const months = [
    "Januari", "Februari", "Maret", "April", "Mei", "Juni",
    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
  ];
  
  const years = ["2026", "2027", "2028"];
  
  let reportsHtml = "";
  let statsHtml = "";
  let topProdukHtml = "";
  let kesehatanHtml = "";
  let strategiHtml = "";
  let hygieneAiHtml = "";
  let fraudHtml = "";
  let spvRevenueHtml = "";
  let spvBriefingHtml = "";
  let marketingIntelligenceHtml = "";
  
  // Smart Briefing Mode Detection (harus dieksekusi selalu, meski data belum ditarik)
  let diffDays = 1;
  if (AppState.activeFilters && AppState.activeFilters.startDate && AppState.activeFilters.endDate) {
    const start = new Date(AppState.activeFilters.startDate);
    const end = new Date(AppState.activeFilters.endDate);
    diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) + 1;
  }
  const isStrategis = diffDays > 90;
  const isTaktis = diffDays > 7 && diffDays <= 90;
  const isOperasional = diffDays <= 7;
  
  let modeTitle = "MODE OPERASIONAL";
  let modeDesc = "Harian (≤7 Hari)";
  let modeBadge = "bg-blue-100 text-blue-800 border-blue-200";
  if (isStrategis) {
    modeTitle = "MODE STRATEGIS";
    modeDesc = "Jangka Panjang (>90 Hari)";
    modeBadge = "bg-purple-100 text-purple-800 border-purple-200";
  } else if (isTaktis) {
    modeTitle = "MODE TAKTIS";
    modeDesc = "Mingguan/Bulanan (8-90 Hari)";
    modeBadge = "bg-indigo-100 text-indigo-800 border-indigo-200";
  }
  
  if (AppState.dashboardData) {
    const data = AppState.dashboardData;
      const op = data.operasionalData || {
        isFallback: true, kepatuhanSop: 0, totalTelat: 0, totalTeguran: 0,
        kendalaUtama: "Data bulanan belum ditarik.", eskalasiFasilitas: "-", strategiDepan: "-",
        kebutuhanGM: "-", pencapaian: "-", tantangan: "-", skill: "-",
        listEskalasi: [], listPengeluaran: []
      };
      const salesPercent = data.targetOmset > 0 ? Math.round((data.omsetTotal / data.targetOmset) * 100) : 0;
      
      const omsetDiff = data.omsetTotal - (data.omsetBulanLalu || 0);
      const omsetTrendPercent = data.omsetBulanLalu > 0 ? (omsetDiff / data.omsetBulanLalu) * 100 : 0;
      const trendSign = omsetDiff >= 0 ? '+' : '';
      const trendIcon = omsetDiff >= 0 ? '▲' : '▼';
      const trendColor = omsetDiff >= 0 ? 'text-emerald-400' : 'text-red-400';
      const trendBg = omsetDiff >= 0 ? 'bg-emerald-400/10' : 'bg-red-400/10';
      const trendHtml = data.omsetBulanLalu > 0 ? 
        `<span class="text-[10px] font-bold ${trendColor} ml-2 ${trendBg} px-2 py-1 rounded-full flex items-center gap-1">${trendIcon} ${trendSign}${omsetTrendPercent.toFixed(1)}% bln lalu</span>` : 
        '';

      const sopColor = op.kepatuhanSop >= 90 ? 'text-emerald-500' : (op.kepatuhanSop >= 70 ? 'text-yellow-500' : 'text-red-500');
      const qcColor = data.komplainTotal <= 2 ? 'text-green-500' : 'text-red-500';

      // Time-Awareness Detection
      let tenses = "Command";
      let todayStr = new Date().toISOString().split('T')[0];
      if (AppState.activeFilters.endDate && AppState.activeFilters.endDate < todayStr) {
        tenses = "History";
      }
      
      // Blok filter pindah ke atas

      let summaryTitle = "";
      let summaryText = "";
      let summaryColor = "blue"; // blue, red, green, yellow

      const pSop = op.kepatuhanSop || 100;
      const pKomplain = data.komplainTotal || 0;
      const pOmset = data.targetOmset > 0 ? (data.omsetTotal / data.targetOmset) * 100 : 0;
      const pTrans = data.transaksiTotal || 0;
      const pATS = pTrans > 0 ? (data.omsetTotal / pTrans) : 0;
      const pTelat = op.telat || 0;
      const pSp = op.teguran || 0;

      // AI Summary uses data.systemVerdict and data.predictiveAlert generated by backend Code.gs

      summaryColor = data.systemVerdict === "Merah" ? "red" : (data.systemVerdict === "Kuning" ? "yellow" : (data.systemVerdict === "Hijau" ? "green" : "blue"));
      const bgMap = { 'red': 'bg-red-50 border-red-500', 'yellow': 'bg-amber-50 border-amber-500', 'green': 'bg-emerald-50 border-emerald-500', 'blue': 'bg-blue-50 border-blue-500' };
      const iconMap = { 'red': 'text-red-600', 'yellow': 'text-amber-600', 'green': 'text-emerald-600', 'blue': 'text-blue-600' };
      const textMap = { 'red': 'text-red-900', 'yellow': 'text-amber-900', 'green': 'text-emerald-900', 'blue': 'text-blue-900' };
      const titleMap = { 'red': 'text-red-800', 'yellow': 'text-amber-800', 'green': 'text-emerald-800', 'blue': 'text-blue-800' };

      let summaryHtml = `
        
        
        <div class="${bgMap[summaryColor]} border-l-4 p-5 rounded-xl mb-8 shadow-sm transform transition-transform duration-300 hover:scale-[1.01]">
          <div class="flex items-center gap-2 mb-2">
            <svg class="w-4 h-4 ${iconMap[summaryColor]}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-[10px] font-extrabold ${titleMap[summaryColor]} uppercase tracking-widest">AI SUMMARY (${data.systemVerdict})</span>
          </div>
          <p class="text-xs ${textMap[summaryColor]} leading-relaxed font-medium">
            ${data.predictiveAlert || "Sistem sedang menghitung prediksi data operasional Anda..."}
          </p>
        </div>
      `;

      const ytdPercent = data.targetYTD > 0 ? Math.round((data.omsetYTD / data.targetYTD) * 100) : 0;
      const ytdColor = ytdPercent >= 100 ? 'bg-emerald-500' : (ytdPercent >= 80 ? 'bg-yellow-500' : 'bg-blue-500');
      
      const targetOmsetPct = data.targetOmset > 0 ? Math.min((data.omsetTotal / data.targetOmset) * 100, 100) : 0;
      const hygienePct = data.hygieneScore || 0;
      const kepatuhanPct = op.kepatuhanSop !== null ? op.kepatuhanSop : hygienePct; 

      const opsScore = Math.round((targetOmsetPct * 0.5) + (hygienePct * 0.3) + (kepatuhanPct * 0.2));
      let opsLabel = "CRITICAL";
      let opsColor = "text-red-600";
      if (opsScore >= 85) { opsLabel = "EXCELLENT"; opsColor = "text-emerald-600"; }
      else if (opsScore >= 70) { opsLabel = "GOOD"; opsColor = "text-blue-600"; }
      else if (opsScore >= 50) { opsLabel = "ATTENTION"; opsColor = "text-amber-600"; }

      const tlSopColor = op.kepatuhanSop >= 90 ? "bg-emerald-50 text-emerald-800 border-emerald-200" : "bg-red-50 text-red-800 border-red-200";
      const tlSalesColor = data.omsetTotal >= data.targetOmset && data.targetOmset > 0 ? "bg-emerald-50 text-emerald-800 border-emerald-200" : "bg-red-50 text-red-800 border-red-200";
      const tlKomplainColor = data.komplainTotal <= 2 ? "bg-emerald-50 text-emerald-800 border-emerald-200" : "bg-red-50 text-red-800 border-red-200";
      const tlTurnoverColor = op.turnoverBarista <= 1 ? "bg-emerald-50 text-emerald-800 border-emerald-200" : "bg-red-50 text-red-800 border-red-200";

      let turnoverDetailsHtml = "";
      if (op.quarterResignList && op.quarterResignList.length > 0) {
        turnoverDetailsHtml = `<div class="mt-3 space-y-1.5 pt-3 border-t border-current opacity-90">`;
        op.quarterResignList.forEach(r => {
           let tglStr = r.tanggal || "?";
           turnoverDetailsHtml += `<div class="text-[9px] font-bold leading-tight flex flex-col gap-0.5"><span class="flex items-center gap-1"><svg class="w-3 h-3 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> ${r.nama}</span> <span class="font-normal opacity-70 ml-4">${tglStr}</span></div>`;
        });
        turnoverDetailsHtml += `</div>`;
      }
      const turnoverTitle = op.quarterLabel ? `Turnover ${op.quarterLabel}` : "Turnover Staf";
      let financialHtml = `
        <div class="bg-zero-black p-6 rounded-3xl text-white shadow-xl mb-8 transform transition-transform duration-300 hover:scale-[1.01]">
          <div class="flex justify-between items-start mb-2">
            <span class="text-[10px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Total Omset & Target</span>
            ${op.isFallback ? '<span class="text-[8px] bg-gray-800 text-gray-400 px-2 py-1 rounded-full border border-gray-700">Snapshot Mingguan</span>' : ''}
          </div>
          <div class="flex flex-col mb-4">
            <div class="flex items-center">
              <span class="text-4xl font-extrabold">Rp ${data.omsetTotal.toLocaleString('id-ID')}</span>
              ${trendHtml}
            </div>
            <span class="text-xs font-bold text-gray-400 mt-1">Target: Rp ${data.targetOmset.toLocaleString('id-ID')}</span>
          </div>
          <div class="w-full bg-gray-800 rounded-full h-2 mb-1 overflow-hidden">
            <div class="bg-emerald-500 h-2 rounded-full transition-all duration-1000 ease-out" style="width: ${Math.min(salesPercent, 100)}%"></div>
          </div>
          <span class="text-[9px] font-bold text-gray-400 mb-6 block">${salesPercent}% Tercapai</span>
          
          <div class="border-t border-gray-800 pt-5 mt-2">
            <div class="flex justify-between items-center mb-2">
              <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Year-to-Date (YTD) Trajectory</span>
              <span class="text-[10px] font-extrabold text-white">${ytdPercent}%</span>
            </div>
            <div class="flex justify-between items-end mb-3">
              <div>
                <span class="text-lg font-black text-white">Rp ${data.omsetYTD.toLocaleString('id-ID')}</span>
              </div>
              <div class="text-right">
                <span class="text-[9px] font-bold text-gray-400 block mb-1">Target Tahunan</span>
                <span class="text-xs font-bold text-gray-300">Rp ${data.targetYTD.toLocaleString('id-ID')}</span>
              </div>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-2 overflow-hidden">
              <div class="${ytdColor} h-2 rounded-full transition-all duration-1000 ease-out" style="width: ${Math.min(ytdPercent, 100)}%"></div>
            </div>
          </div>
          
          <div class="flex justify-between items-center border-t border-gray-800 pt-5 mt-5">
            <div>
              <span class="text-[10px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Total Transaksi</span>
              <span class="text-xl font-black text-white">${data.transaksiTotal || 0} <span class="text-[10px] text-gray-500 font-normal">struk</span></span>
            </div>
            <div class="text-right">
              <span class="text-[10px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Average Ticket Size</span>
              <span class="text-xl font-bold text-white">Rp ${data.transaksiTotal > 0 ? Math.round(data.omsetTotal / data.transaksiTotal).toLocaleString('id-ID') : 0}</span>
            </div>
          </div>

          <div class="mt-5 pt-5 border-t border-gray-800 relative h-24">
            <canvas id="gmOmsetChart" class="w-full h-full"></canvas>
          </div>
          <div id="dayOfWeekContainer" class="mt-5"></div>
          <div id="anomalyContainer"></div>
        </div>
      `;

      let operationalHtml = `
        <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm mb-8 transform transition-transform duration-300 hover:scale-[1.01]">
          <div class="flex justify-between items-start mb-6 pb-4 border-b border-gray-100">
            <div>
              <span class="text-[10px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Indikator Operasional</span>
              <div class="flex items-baseline gap-1">
                <span class="text-4xl font-black ${opsColor}">${opsScore}</span>
                <span class="text-sm font-bold text-gray-400">/100</span>
              </div>
            </div>
            <span class="text-[9px] font-bold px-3 py-1 rounded-full bg-white ${opsColor} border shadow-sm uppercase tracking-widest">${opsLabel}</span>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="${tlSopColor} border p-4 rounded-xl flex flex-col justify-between shadow-sm">
              <span class="text-[9px] uppercase tracking-widest font-bold opacity-80 mb-2">SOP Keramahan</span>
              <span class="text-2xl font-black">${op.kepatuhanSop || 0}%</span>
            </div>
            <div class="${tlSalesColor} border p-4 rounded-xl flex flex-col justify-between shadow-sm">
              <span class="text-[9px] uppercase tracking-widest font-bold opacity-80 mb-2">Target Penjualan</span>
              <span class="text-xl font-black">${data.omsetTotal >= data.targetOmset && data.targetOmset > 0 ? 'TERCAPAI' : 'GAGAL'}</span>
            </div>
            <div class="${tlKomplainColor} border p-4 rounded-xl flex flex-col justify-between shadow-sm">
              <span class="text-[9px] uppercase tracking-widest font-bold opacity-80 mb-2">Komplain Bulanan</span>
              <span class="text-2xl font-black">${data.komplainTotal} <span class="text-[10px] font-normal opacity-70">/ Max 2</span></span>
            </div>
            <div class="${tlTurnoverColor} border p-4 rounded-xl flex flex-col shadow-sm">
              <div class="mb-2 flex-grow">
                <span class="text-[9px] uppercase tracking-widest font-bold opacity-80 mb-2 block">${turnoverTitle}</span>
                <span class="text-2xl font-black">${op.turnoverBarista} <span class="text-[10px] font-normal opacity-70">/ Max 1</span></span>
              </div>
              ${turnoverDetailsHtml}
            </div>
          </div>
        </div>
      `;

      statsHtml = summaryHtml + financialHtml + operationalHtml;
      
      let hygieneKritisHtml = "";
      if (data.hygieneKritis && data.hygieneKritis.length > 0) {
        hygieneKritisHtml = `
          <div class="bg-red-50 p-5 rounded-2xl border border-red-100 mb-6 shadow-sm">
            <h3 class="text-[10px] font-bold text-red-800 uppercase tracking-widest mb-4 border-b border-red-200 pb-2 flex items-center justify-between">
              <span>${data.hygieneKritis.length} AREA KRITIS (KEBERSIHAN)</span>
              <span class="text-[8px] bg-red-200 text-red-800 px-2 py-0.5 rounded-full">ACTION REQUIRED</span>
            </h3>
            <div class="space-y-3">
              ${data.hygieneKritis.map((k, idx) => `
                <div class="flex flex-col p-3 bg-white border border-red-100 rounded-xl">
                  <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                      <span class="text-xs font-bold text-red-900">${idx + 1}. ${k.area}</span>
                    </div>
                    <span class="text-[10px] font-extrabold text-red-600">Skor: ${k.avg}%</span>
                  </div>
                  <span class="text-[9px] text-gray-500 italic">"${k.ket}"</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      let eskalasiHtml = "";
      if (op.listEskalasi && op.listEskalasi.length > 0) {
        eskalasiHtml = `
          <div class="bg-red-50 p-5 rounded-2xl border border-red-100 mb-6 shadow-sm">
            <h3 class="text-[10px] font-bold text-red-800 uppercase tracking-widest mb-4 border-b border-red-200 pb-2 flex items-center justify-between">
              <span>MAINTENANCE & ESKALASI FASILITAS</span>
              <span class="text-[8px] bg-red-200 text-red-800 px-2 py-0.5 rounded-full">${op.listEskalasi.length} TIKET</span>
            </h3>
            <div class="space-y-3">
              ${op.listEskalasi.map((k, idx) => `
                <div class="flex flex-col p-3 bg-white border border-red-100 rounded-xl shadow-sm">
                  <div class="flex items-center justify-between mb-2">
                    <div class="flex flex-col">
                      <span class="text-xs font-bold text-red-900">${k.item}</span>
                      <span class="text-[9px] text-gray-500">${k.tanggal} - ${k.outlet}</span>
                    </div>
                    <span class="text-[9px] font-extrabold text-red-600 px-2 py-1 bg-red-100 rounded-lg">${k.status}</span>
                  </div>
                  ${k.keterangan ? `
                  <div class="text-[10px] text-gray-700 italic border-l-2 border-red-300 pl-2 py-1 mb-2 bg-red-50">
                    ${k.keterangan.replace("[ESKALASI GM] ", "")}
                  </div>` : ''}
                  ${k.photoUrl ? `
                    <div class="mt-1">
                      <a href="${k.photoUrl}" target="_blank" class="inline-flex items-center gap-1 px-3 py-1.5 bg-red-600 text-white text-[9px] font-bold rounded-lg hover:bg-red-700 transition-colors">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        LIHAT FOTO BUKTI
                      </a>
                    </div>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      let pengeluaranHtml = "";
      if (op.listPengeluaran && op.listPengeluaran.length > 0) {
        let totalPengeluaran = op.listPengeluaran.reduce((acc, curr) => acc + (Number(curr.harga) || 0), 0);
        pengeluaranHtml = `
          <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 mb-6 shadow-sm">
            <h3 class="text-[10px] font-bold text-blue-800 uppercase tracking-widest mb-4 border-b border-blue-200 pb-2 flex items-center justify-between">
              <span>GALERI PENGELUARAN (BAHAN & ATK)</span>
              <span class="text-[8px] bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full">Rp ${totalPengeluaran.toLocaleString('id-ID')}</span>
            </h3>
            
            <!-- Horizontal Scrollable Gallery -->
            <div class="flex overflow-x-auto gap-4 pb-2 snap-x hide-scrollbar">
              ${op.listPengeluaran.map((k, idx) => `
                <div class="snap-start flex-none w-48 bg-white border border-blue-100 rounded-xl overflow-hidden shadow-sm flex flex-col">
                  ${k.photoUrl ? `
                    <div class="w-full h-32 bg-gray-100 relative group cursor-pointer" onclick="window.open('${k.photoUrl}', '_blank')">
                      <img src="${k.photoUrl}" alt="Nota ${k.item}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                      <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                        <span class="text-white text-[10px] font-bold border border-white px-2 py-1 rounded">Lihat Nota</span>
                      </div>
                    </div>
                  ` : `
                    <div class="w-full h-32 bg-gray-100 flex items-center justify-center">
                      <span class="text-gray-400 text-[10px] font-bold">Tidak ada foto</span>
                    </div>
                  `}
                  <div class="p-3 flex flex-col justify-between flex-1">
                    <div>
                      <span class="text-xs font-bold text-zero-black line-clamp-1 mb-1">${k.item}</span>
                      <span class="text-[9px] text-gray-500 block mb-1">${k.tanggal} - ${k.outlet}</span>
                    </div>
                    <div class="mt-2 flex justify-between items-end border-t border-gray-50 pt-2">
                      <span class="text-[8px] text-gray-400 uppercase tracking-widest">${k.ketersediaan}</span>
                      <span class="text-[10px] font-extrabold text-blue-600">Rp ${Number(k.harga).toLocaleString('id-ID')}</span>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
            <style>
              .hide-scrollbar::-webkit-scrollbar { display: none; }
              .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            </style>
          </div>
        `;
      }

      let leaderboardHtml = "";
      if ((!AppState.activeFilters.outlet || AppState.activeFilters.outlet === 'Semua') && data.leaderboard && data.leaderboard.length > 0) {
        leaderboardHtml = `
          <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6 shadow-sm">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4 border-b border-gray-100 pb-2">
              MULTI-OUTLET LEADERBOARD
            </h3>
            <div class="space-y-3">
              ${data.leaderboard.map((out, idx) => `
                <div class="flex items-center justify-between p-3 ${idx === 0 ? 'bg-yellow-50 border-yellow-100' : 'bg-gray-50 border-gray-100'} border rounded-xl">
                  <div class="flex items-center gap-3">
                    <span class="w-6 h-6 rounded-full ${idx === 0 ? 'bg-yellow-400 text-white' : 'bg-gray-200 text-gray-500'} text-[10px] font-bold flex items-center justify-center flex-shrink-0">${idx + 1}</span>
                    <span class="text-xs font-bold ${idx === 0 ? 'text-yellow-900' : 'text-zero-black'}">${out.name}</span>
                  </div>
                  <span class="text-xs font-extrabold ${idx === 0 ? 'text-yellow-700' : 'text-zero-black'}">Rp ${out.omset.toLocaleString('id-ID')}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      hygieneAiHtml = "";
      if (data.hygieneScore !== undefined && data.targetOmset > 0) {
        let aiTitle = "";
        let aiDesc = "";
        let aiColor = "";
        
        let targetPercent = (data.omsetTotal / data.targetOmset) * 100;
        
        if (targetPercent >= 90 && data.hygieneScore < 95) {
          aiTitle = "Sales Naik, SOP Turun";
          aiDesc = "Target omset tercapai, namun skor kebersihan di bawah standar (95%). Pastikan tim tidak mengabaikan kualitas operasional saat ramai pengunjung.";
          aiColor = "bg-yellow-50 border-yellow-200 text-yellow-800";
        } else if (targetPercent < 70 && data.hygieneScore < 95) {
          aiTitle = "Peringatan Ganda (Omset & SOP)";
          aiDesc = "Omset jauh di bawah target dan standar kebersihan tidak tercapai (Kritis). Dibutuhkan intervensi langsung dari Supervisor atau GM.";
          aiColor = "bg-red-50 border-red-200 text-red-800";
        } else if (data.hygieneScore >= 95) {
          aiTitle = "The Good Standard (Ideal)";
          aiDesc = "Standar kebersihan dan sanitasi terjaga dengan sangat baik. Kinerja tim lapangan memuaskan, pertahankan untuk audit eksternal.";
          aiColor = "bg-emerald-50 border-emerald-200 text-emerald-800";
        } else if (data.hygieneKritis && data.hygieneKritis.length > 0) {
          aiTitle = "Spot Warning (Area Kritis)";

window.switchGmTab = function(tabName) {
  const tabs = ['finansial', 'operasional', 'sdm'];
  tabs.forEach(t => {
    const btn = document.getElementById(`tabBtn-${t}`);
    const content = document.getElementById(`tabContent-${t}`);
    if (btn && content) {
      if (t === tabName) {
        btn.className = 'pb-3 text-[10px] font-extrabold uppercase tracking-widest whitespace-nowrap transition-all border-b-2 border-zero-black text-zero-black';
        content.classList.remove('hidden');
      } else {
        btn.className = 'pb-3 text-[10px] font-extrabold uppercase tracking-widest whitespace-nowrap transition-all border-b-2 border-transparent text-gray-400 hover:text-zero-black';
        content.classList.add('hidden');
      }
    }
  });
};

// [D2 & D3] AI Marketing Intelligence Functions
window.saveAndRunInsights = function() {
  const container = document.getElementById('ai-insights-container');
  const badges = document.getElementById('ai-summary-badges');
  if (!container) return;

  if (!AppState.activeFilters || !AppState.activeFilters.startDate) {
    container.innerHTML = '<p class="text-[10px] text-red-500 text-center py-4">Tarik data Dasbor terlebih dahulu sebelum menjalankan analisis.</p>';
    return;
  }

  const benchmarkInput = document.getElementById('benchmarkATSInput');
  const benchmarkATS = benchmarkInput ? parseRupiah(benchmarkInput.value) || 30000 : 30000;

  container.innerHTML = '<div class="flex items-center justify-center gap-2 py-6"><svg class="animate-spin h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="text-[10px] text-gray-400">Menganalisis pola data...</span></div>';

  // Use formatToDDMMYYYY if available, otherwise fallback
  const startFmt = typeof formatToDDMMYYYY === 'function' ? formatToDDMMYYYY(AppState.activeFilters.startDate) : AppState.activeFilters.startDate;
  const endFmt = typeof formatToDDMMYYYY === 'function' ? formatToDDMMYYYY(AppState.activeFilters.endDate) : AppState.activeFilters.endDate;

  const payload = JSON.stringify({
    startDate: startFmt,
    endDate: endFmt,
    outlet: AppState.activeFilters.outlet || 'Semua',
    benchmarkATS: benchmarkATS
  });

  google.script.run
    .withSuccessHandler(function(result) {
      try {
        const data = JSON.parse(result);
        if (data.status === 'error') {
          container.innerHTML = '<p class="text-[10px] text-red-500 text-center py-4">Error: ' + data.error + '</p>';
          return;
        }
        renderInsights(data.insights, data.summary, badges, container);
        // Save benchmark
        google.script.run.api_gm_saveBenchmarkATS(benchmarkATS);
      } catch(e) {
        container.innerHTML = '<p class="text-[10px] text-red-500 text-center py-4">Gagal memuat insight.</p>';
      }
    })
    .withFailureHandler(function(err) {
      container.innerHTML = '<p class="text-[10px] text-red-500 text-center py-4">Error koneksi: ' + err.message + '</p>';
    })
    .api_gm_getMarketingInsights(payload);
};

window.renderInsights = function(insights, summary, badgesEl, containerEl) {
  // Render summary badges
  if (badgesEl) {
    badgesEl.innerHTML = '';
    if (summary.critical > 0) {
      badgesEl.innerHTML += '<span class="inline-flex items-center gap-1 text-[9px] font-bold bg-red-100 text-red-700 px-2 py-1 rounded-full">' + summary.critical + ' Kritis</span>';
    }
    if (summary.warning > 0) {
      badgesEl.innerHTML += '<span class="inline-flex items-center gap-1 text-[9px] font-bold bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full">' + summary.warning + ' Perhatian</span>';
    }
    if (summary.positive > 0) {
      badgesEl.innerHTML += '<span class="inline-flex items-center gap-1 text-[9px] font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full">' + summary.positive + ' Positif</span>';
    }
    if (summary.insufficient > 0) {
      badgesEl.innerHTML += '<span class="inline-flex items-center gap-1 text-[9px] font-bold bg-gray-100 text-gray-500 px-2 py-1 rounded-full">' + summary.insufficient + ' Data Kurang</span>';
    }
  }

  // Render each insight accordion
  const levelConfig = {
    critical: { bg: 'bg-red-50', border: 'border-red-200', header: 'text-red-800', dot: 'bg-red-500', badge: 'bg-red-100 text-red-700', label: 'KRITIS' },
    warning:  { bg: 'bg-yellow-50', border: 'border-yellow-200', header: 'text-yellow-800', dot: 'bg-yellow-400', badge: 'bg-yellow-100 text-yellow-700', label: 'PERHATIAN' },
    positive: { bg: 'bg-emerald-50', border: 'border-emerald-200', header: 'text-emerald-800', dot: 'bg-emerald-500', badge: 'bg-emerald-100 text-emerald-700', label: 'POSITIF' },
    info:     { bg: 'bg-gray-50', border: 'border-gray-200', header: 'text-gray-700', dot: 'bg-gray-400', badge: 'bg-gray-100 text-gray-600', label: 'INFO' }
  };

  let html = '';
  insights.forEach(function(ins, idx) {
    if (ins.status === 'insufficient') {
      html += `
        <div class="flex items-start gap-2 p-3 bg-gray-50 rounded-xl border border-gray-200">
          <div class="w-2 h-2 rounded-full bg-gray-300 mt-1 flex-shrink-0"></div>
          <div>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${ins.modul}</p>
            <p class="text-[10px] text-gray-500 mt-0.5">${ins.desc}</p>
          </div>
        </div>`;
      return;
    }

    const cfg = levelConfig[ins.level] || levelConfig.info;
    const accordionId = 'ai-accordion-' + idx;
    html += `
      <details class="group rounded-xl border ${cfg.border} overflow-hidden">
        <summary class="${cfg.bg} px-4 py-3 flex items-center justify-between cursor-pointer list-none">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full ${cfg.dot} flex-shrink-0"></div>
            <div>
              <p class="text-[8px] font-bold ${cfg.header} uppercase tracking-widest">${ins.modul}</p>
              <p class="text-[10px] font-bold text-zero-black mt-0.5">${ins.title}</p>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="text-[8px] font-bold ${cfg.badge} px-2 py-0.5 rounded-full">${cfg.label}</span>
            <svg class="w-4 h-4 transform group-open:rotate-180 transition-transform text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
        </summary>
        <div class="bg-white px-4 py-3 border-t ${cfg.border}">
          <p class="text-[11px] text-gray-600 leading-relaxed mb-3">${ins.desc}</p>
          ${ins.chartData ? `
          <div class="w-full h-40 mb-3 relative">
            <canvas id="insight-chart-${idx}"></canvas>
          </div>
          ` : ''}
          <div class="flex items-start gap-2 bg-zero-black/5 rounded-lg p-3">
            <span class="text-[8px] font-extrabold text-zero-black uppercase tracking-widest whitespace-nowrap mt-0.5">ACTION:</span>
            <p class="text-[10px] text-zero-black font-semibold leading-relaxed">${ins.action}</p>
          </div>
        </div>
      </details>`;
  });

  containerEl.innerHTML = html || '<p class="text-[10px] text-gray-400 text-center py-4">Tidak ada insight yang tersedia.</p>';
  
  if (typeof renderInsightCharts === 'function') {
    setTimeout(() => renderInsightCharts(insights), 100);
  }
};
