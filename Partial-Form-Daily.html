<!-- Partial-Form-Daily.html -->
<script>
window.updateDailyProgress = function() {
  let targetEl = document.getElementById('inputTarget');
  let s1El = document.getElementById('inputShift1');
  let s2El = document.getElementById('inputShift2');
  if (!targetEl || !s1El || !s2El) return;

  let target = parseRupiah(targetEl.value) || 0;
  let s1 = parseRupiah(s1El.value) || 0;
  let s2 = parseRupiah(s2El.value) || 0;
  
  form.penjualan.target = target;
  form.penjualan.shift1 = s1;
  form.penjualan.shift2 = s2;
  
  let total = s1 + s2;
  let pct = target > 0 ? Math.round((total / target) * 100) : 0;
  let barPct = Math.min(pct, 100);
  let barColor = pct >= 100 ? 'bg-emerald-500' : pct >= 70 ? 'bg-zero-black' : 'bg-gray-500';
  
  let fill = document.getElementById('progressBarFill');
  let pctText = document.getElementById('progressTextPct');
  let detailText = document.getElementById('progressTextDetail');
  
  if (fill) {
    fill.style.width = barPct + '%';
    fill.className = barColor + ' h-2 rounded-full transition-all duration-500';
  }
  if (pctText) pctText.innerText = pct + '%';
  if (detailText) {
    detailText.innerText = target > 0 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(total) + ' dari Rp ' + new Intl.NumberFormat('id-ID').format(target) : 'Isi target omset untuk melihat progress';
  }
}

window.getDailyFormTemplate = function() {
  const tabs = [
    { num: 1, label: "PENJUALAN" },
    { num: 2, label: "KAS" },
    { num: 3, label: "STAFF" },
    { num: 4, label: "BRIEFING" },
    { num: 5, label: "QC" },
    { num: 6, label: "FEEDBACK" },
    { num: 7, label: "FASILITAS" },
    { num: 8, label: "PENUTUP" }
  ];

  return `
    <div class="w-full min-h-screen pb-24 bg-[#f3f4f6]">
      <!-- Header -->
      <div class="bg-white px-6 py-4 flex justify-between items-center sticky top-0 z-20 border-b border-gray-200 shadow-sm">
        <div>
          <h2 class="text-sm font-extrabold text-zero-black">LAPORAN HARIAN</h2>
          <div class="flex items-center">
            <p class="text-[10px] font-bold text-gray-400">${form.tanggal || ''}</p>
            <span id="draftIndicator" class="ml-2 text-[8px] text-emerald-500 font-bold bg-emerald-50 px-1.5 py-0.5 rounded-sm opacity-0 transition-opacity duration-300">Tersimpan otomatis</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" onclick="confirmResetForm()" class="p-2 border border-gray-200 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all" title="Reset Laporan">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
          </button>
          <button type="button" onclick="goBackMenu()" class="px-3 py-1.5 border border-gray-200 rounded-full text-[10px] font-bold text-gray-400 hover:bg-gray-50 transition-all">
            KEMBALI
          </button>
        </div>
      </div>

      <!-- Tab Navigation -->
      <div class="bg-white border-b border-gray-200 px-4 py-3 mb-4 sticky top-[65px] z-10">
        <div class="flex overflow-x-auto space-x-2 scrollbar-hide">
          ${tabs.map(t => `
            <button type="button" ${AppState.currentTab === t.num ? 'id="activeTabBtn"' : ''} onclick="switchTab(${t.num})" class="px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all duration-200 ${AppState.currentTab === t.num ? 'bg-zero-black text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
              ${t.label}
            </button>
          `).join('')}
        </div>
      </div>

      <!-- Form Content -->
      <div class="px-4">
        <form id="dailyFormElement" onsubmit="event.preventDefault();">
          ${getDailyTabContent()}
        </form>
      </div>

      <!-- Footer Navigation: minimalist dots + arrows -->
      <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 px-4 py-3 flex items-center justify-between z-30">
        <!-- Prev arrow -->
        <button type="button" onclick="prevTab()" class="p-2 text-gray-400 hover:text-zero-black transition-colors disabled:opacity-20" ${AppState.currentTab === 1 ? 'disabled' : ''}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <!-- Dots -->
        <div class="flex items-center gap-1.5">
          ${tabs.map(t => `
            <button type="button" onclick="switchTab(${t.num})" class="transition-all duration-300 rounded-full ${AppState.currentTab === t.num ? 'w-6 h-2 bg-zero-black' : 'w-2 h-2 bg-gray-200 hover:bg-gray-300'}"></button>
          `).join('')}
        </div>
        <!-- Next arrow -->
        <button type="button" onclick="nextTab()" class="p-2 text-gray-400 hover:text-zero-black transition-colors disabled:opacity-20" ${AppState.currentTab === 8 ? 'disabled' : ''}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>
  `;
}

window.switchTab = function(tabNum) {
  AppState.currentTab = tabNum;
  renderApp();
}
window.nextTab = function() {
  if (AppState.currentTab < 8) switchTab(AppState.currentTab + 1);
}
window.prevTab = function() {
  if (AppState.currentTab > 1) switchTab(AppState.currentTab - 1);
}

function getDailyTabContent() {
  switch (AppState.currentTab) {
    case 1:
      return `
        <!-- Identitas & Shift -->
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">IDENTITAS & SHIFT</h3>
          
          <!-- Row 1: Supervisor | Outlet -->
          <div class="flex gap-3 mb-4">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">NAMA SUPERVISOR</label>
              <input type="text" value="${form.supervisor}" oninput="form.supervisor = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
            </div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">OUTLET</label>
              <select onchange="form.outlet = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                <option value="Perintis" ${form.outlet === 'Perintis' ? 'selected' : ''}>Perintis</option>
                <option value="Dg Tata" ${form.outlet === 'Dg Tata' ? 'selected' : ''}>Dg Tata</option>
              </select>
            </div>
          </div>

          <!-- Row 2: Tanggal | Jam Masuk (single dropdown 15m) -->
          <div class="flex gap-3">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">TANGGAL LAPORAN</label>
              <input type="date" value="${form.tanggal}" onchange="form.tanggal = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
            </div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">JAM MASUK</label>
              <input type="time" value="${form.shift}" onchange="form.shift = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors bg-white" required>
            </div>
          </div>
        </div>

        <!-- Target Hari Ini -->
        <div class="bg-zero-black rounded-2xl p-5 mb-4 text-white shadow-md">
          <h3 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-4">TARGET HARI INI</h3>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">TARGET OMSET (Rp)</label>
            <input id="inputTarget" type="text" value="${form.penjualan.target ? 'Rp ' + new Intl.NumberFormat('id-ID').format(form.penjualan.target) : ''}" oninput="updateDailyProgress()" onchange="formatRupiah(this)" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-3 py-2 bg-[#1a1a1a] border border-gray-700 rounded-xl text-sm text-white focus:outline-none focus:border-white transition-colors" placeholder="Rp 0">
          </div>
        </div>

        <!-- Ringkasan Penjualan -->
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">RINGKASAN PENJUALAN</h3>
          
          <div class="flex gap-3 mb-4">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">06:00 – 16:59 (Rp)</label>
              <input id="inputShift1" type="text" value="${form.penjualan.shift1 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(form.penjualan.shift1) : ''}" oninput="updateDailyProgress()" onchange="form.penjualan.shift1 = parseRupiah(this.value); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" placeholder="Rp 0">
            </div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">17:00 – 04:00 (Rp)</label>
              <input id="inputShift2" type="text" value="${form.penjualan.shift2 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(form.penjualan.shift2) : ''}" oninput="updateDailyProgress()" onchange="form.penjualan.shift2 = parseRupiah(this.value); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" placeholder="Rp 0">
            </div>
          </div>
          
          <div class="mb-4">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total Struk Transaksi</label>
            <input type="number" value="${form.penjualan.transaksi || ''}" onchange="form.penjualan.transaksi = Number(this.value)" placeholder="Contoh: 50" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
          </div>

          ${(function(){
            let total = (form.penjualan.shift1 || 0) + (form.penjualan.shift2 || 0);
            let target = form.penjualan.target || 0;
            let pct = target > 0 ? Math.round((total / target) * 100) : 0;
            let barPct = Math.min(pct, 100);
            let barColor = pct >= 100 ? 'bg-emerald-500' : pct >= 70 ? 'bg-zero-black' : 'bg-gray-500';
            return `
              <div class="pt-4 border-t border-gray-100">
                <div class="flex items-center gap-2">
                  <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
                    <div id="progressBarFill" class="${barColor} h-2 rounded-full transition-all duration-500" style="width: ${barPct}%"></div>
                  </div>
                  <span id="progressTextPct" class="text-xs font-extrabold text-zero-black w-10 text-right">${pct}%</span>
                </div>
                <p id="progressTextDetail" class="text-[9px] text-gray-400 mt-1">${target > 0 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(total) + ' dari Rp ' + new Intl.NumberFormat('id-ID').format(target) : 'Isi target omset untuk melihat progress'}</p>
              </div>
            `;
          })()}
        </div>

        <!-- Top 3 Minuman -->
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">TOP 3 MINUMAN</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold text-gray-400">1</span>
              <input type="text" value="${form.produk.minuman[0]}" onchange="form.produk.minuman[0] = this.value" placeholder="Minuman 1" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold text-gray-400">2</span>
              <input type="text" value="${form.produk.minuman[1]}" onchange="form.produk.minuman[1] = this.value" placeholder="Minuman 2" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold text-gray-400">3</span>
              <input type="text" value="${form.produk.minuman[2]}" onchange="form.produk.minuman[2] = this.value" placeholder="Minuman 3" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
            </div>
          </div>
        </div>

        <!-- Top 3 Makanan -->
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">TOP 3 MAKANAN</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold text-gray-400">1</span>
              <input type="text" value="${form.produk.makanan[0]}" onchange="form.produk.makanan[0] = this.value" placeholder="Makanan 1" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold text-gray-400">2</span>
              <input type="text" value="${form.produk.makanan[1]}" onchange="form.produk.makanan[1] = this.value" placeholder="Makanan 2" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs font-bold text-gray-400">3</span>
              <input type="text" value="${form.produk.makanan[2]}" onchange="form.produk.makanan[2] = this.value" placeholder="Makanan 3" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
            </div>
          </div>
        </div>
      `;
    case 2:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">AUDIT KASIR</h3>
            <button type="button" onclick="addAuditRow()" class="px-3 py-1 bg-zero-black text-white text-[10px] font-bold rounded-full hover:bg-gray-800 transition-all">TAMBAH</button>
          </div>
          
          <div class="mb-4 pb-4 border-b border-gray-100">
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Modal Awal Kasir (Rp)</label>
            <input type="text" value="${form.kas.modalAwal ? 'Rp ' + new Intl.NumberFormat('id-ID').format(form.kas.modalAwal) : ''}" onchange="form.kas.modalAwal = parseRupiah(this.value); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" placeholder="Rp 0">
          </div>

          <div class="space-y-4">
            ${form.kas.audit.length === 0 ? `<p class="text-xs text-center text-gray-400 py-4">Belum ada baris audit kas. Tekan tambah.</p>` : ''}
            ${form.kas.audit.map((row, idx) => `
              <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/50">
                <div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-2">
                  <!-- Jam audit: single dropdown Jam (15 min intervals) -->
                  <input type="time" value="${row.jam || '12:00'}" onchange="updateAuditField(${idx}, 'jam', this.value)" class="w-24 px-2 py-1 text-xs font-bold text-zero-black border-none bg-transparent focus:outline-none">
                  <button type="button" onclick="removeAuditRow(${idx})" class="text-[10px] font-bold text-red-500 hover:text-red-700">HAPUS</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                  <div>
                    <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total QRIS</label>
                    <input type="text" value="${row.qris ? 'Rp ' + new Intl.NumberFormat('id-ID').format(row.qris) : ''}" onchange="updateAuditField(${idx}, 'qris', parseRupiah(this.value)); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-2 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none" placeholder="Rp 0">
                  </div>
                  <div>
                    <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Total Tunai</label>
                    <input type="text" value="${row.tunai ? 'Rp ' + new Intl.NumberFormat('id-ID').format(row.tunai) : ''}" onchange="updateAuditField(${idx}, 'tunai', parseRupiah(this.value)); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-2 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none" placeholder="Rp 0">
                  </div>
                </div>
                <div class="mb-2">
                  <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Aktual Tunai + QRIS (Sistem)</label>
                  <input type="text" value="${row.aktual ? 'Rp ' + new Intl.NumberFormat('id-ID').format(row.aktual) : ''}" onchange="updateAuditField(${idx}, 'aktual', parseRupiah(this.value)); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-2 py-1 text-sm border border-gray-200 rounded-lg focus:outline-none bg-white" placeholder="Rp 0">
                </div>
                <div class="mb-2">
                  <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Selisih (Rp) - Wajib</label>
                  <input type="text" value="${row.selisih !== undefined ? 'Rp ' + new Intl.NumberFormat('id-ID').format(row.selisih) : ''}" onchange="updateAuditField(${idx}, 'selisih', parseRupiah(this.value)); renderApp();" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" class="w-full px-2 py-1 text-sm font-bold border border-gray-200 rounded-lg focus:outline-none ${(row.selisih || 0) < 0 ? 'text-red-600' : ((row.selisih || 0) > 0 ? 'text-green-600' : 'text-gray-900')}" placeholder="Rp 0" required>
                </div>
                <div>
                  <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Catatan Selisih (Opsional)</label>
                  <textarea onchange="updateAuditField(${idx}, 'keterangan', this.value)" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'" placeholder="Tulis keterangan selisih di sini..." class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none resize-none overflow-hidden" style="min-height:36px">${row.keterangan || ''}</textarea>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    case 3:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">ABSENSI & KEPATUHAN STAFF</h3>
          
          <div class="flex gap-2 mb-6 border-b border-gray-100 pb-5">
            <div class="flex-1">
              <select id="staffSelectDropdown" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black bg-white mb-2">
                <option value="">PILIH STAFF</option>
                ${AppState.masterStaff.map(s => `<option value="${s.nama}">${s.nama}</option>`).join('')}
              </select>
              <button type="button" onclick="openAddStaffModal()" class="text-[10px] font-bold text-gray-500 hover:text-zero-black">+ STAFF BARU</button>
            </div>
            <button type="button" onclick="addSelectedStaff()" class="px-4 py-2 bg-zero-black text-white rounded-xl text-[10px] font-bold hover:bg-gray-800 transition-all self-start h-[38px]">TAMBAH</button>
          </div>

          <div class="space-y-3">
            ${form.staff.length === 0 ? `<p class="text-[10px] text-center text-gray-400 py-4">Belum ada staff yang ditambahkan.</p>` : ''}
            ${form.staff.map((s, idx) => `
              <div class="border border-gray-100 rounded-xl p-4 bg-gray-50/30">
                <div class="flex justify-between items-center mb-3">
                  <div>
                    <span class="text-sm font-bold text-zero-black">${s.nama}</span>
                    <span class="text-[10px] text-gray-500 ml-1">(${s.posisi})</span>
                  </div>
                  <button type="button" onclick="removeStaffRow(${idx})" class="text-[10px] font-bold text-red-400 hover:text-red-600">HAPUS</button>
                </div>
                
                <div class="${s.posisi !== 'Kitchen' ? 'grid grid-cols-2 gap-3' : ''} mb-3">
                  <div>
                    <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">STATUS KEHADIRAN</label>
                    <select onchange="updateStaffField(${idx}, 'status', this.value)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none text-green-600 font-bold bg-white h-[34px]">
                      <option value="Hadir" ${s.status === 'Hadir' ? 'selected' : ''}>Hadir</option>
                      <option value="Izin" ${s.status === 'Izin' ? 'selected' : ''}>Izin</option>
                      <option value="Sakit" ${s.status === 'Sakit' ? 'selected' : ''}>Sakit</option>
                      <option value="Alpha" ${s.status === 'Alpha' ? 'selected' : ''}>Alpha</option>
                    </select>
                  </div>
                  ${s.posisi !== 'Kitchen' ? `
                  <div>
                    <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">KERAMAHAN TERLEWAT?</label>
                    <select onchange="updateStaffField(${idx}, 'keramahan', this.value === 'true')" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white h-[34px]">
                      <option value="false" ${!s.keramahan ? 'selected' : ''}>Tidak</option>
                      <option value="true" ${s.keramahan ? 'selected' : ''}>Ya (Miss)</option>
                    </select>
                  </div>
                  ` : ''}
                </div>
                
                <div>

    case 7:
      return `

              <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/30">

                  <input type="text" value="${row.item}" onchange="updateFasilitasField(${idx}, 'item', this.value)" placeholder="Nama Alat / Fasilitas" class="flex-1 px-2 py-1.5 text-sm font-bold border border-gray-200 rounded-lg focus:outline-none">

                <div class="grid grid-cols-2 gap-2 mb-2">
                   <select onchange="updateFasilitasField(${idx}, 'status', this.value)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                      <option value="Rusak Ringan" ${row.status === 'Rusak Ringan' ? 'selected' : ''}>Rusak Ringan</option>
                      <option value="Rusak Sedang" ${row.status === 'Rusak Sedang' ? 'selected' : ''}>Rusak Sedang</option>
                      <option value="Rusak Berat" ${row.status === 'Rusak Berat' ? 'selected' : ''}>Rusak Berat (Mati)</option>
                   </select>
                   <label class="flex items-center justify-center gap-2 text-[10px] font-bold text-red-500 border border-gray-200 rounded-lg bg-white">
                    <input type="checkbox" ${row.eskalasi ? 'checked' : ''} onchange="updateFasilitasField(${idx}, 'eskalasi', this.checked)"> Eskalasi
                  </label>
                </div>
                <div class="mb-2">
                  <input type="text" value="${row.keterangan || ''}" onchange="updateFasilitasField(${idx}, 'keterangan', this.value)" placeholder="Keterangan singkat..." class="w-full px-2 py-1 text-xs border border-gray-200 rounded-lg focus:outline-none">
                </div>
                <div class="text-right">
                  ${row.photoUrl ? `
                    <a href="${row.photoUrl}" target="_blank" class="text-[10px] font-bold text-blue-500 underline mr-2">Lihat Foto</a>

                    <label class="cursor-pointer text-[10px] font-bold text-gray-500 hover:text-zero-black">

          <div class="space-y-4">

              <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/30">

// === INTERACTIVE FORM MUTATORS ===

function addAuditRow() {
  form.kas.audit.push({ jam: "12:00", aktual: 0, qris: 0, tunai: 0, keterangan: "" });
  renderApp();
}
function removeAuditRow(idx) {
  form.kas.audit.splice(idx, 1);
  renderApp();
}
function updateAuditField(idx, field, value) {
  form.kas.audit[idx][field] = value;
}
function updateStaffField(idx, field, value) {
  form.staff[idx][field] = value;
}
function addQcRow() {
  form.qc.items.push({ jam: "12:00", nama: "", status: "Baik", keterangan: "" });
  renderApp();
}
function removeQcRow(idx) {
  form.qc.items.splice(idx, 1);
  renderApp();
}
function updateQcField(idx, field, value) {
  form.qc.items[idx][field] = value;
}
function addFeedbackRow() {
  form.feedback.items.push({ jam: "12:00", inisial: "", isi: "", remake: false, eskalasi: false, respon: "" });
  renderApp();
}
function removeFeedbackRow(idx) {
  form.feedback.items.splice(idx, 1);
  renderApp();
}
function updateFeedbackField(idx, field, value) {
  form.feedback.items[idx][field] = value;
}
function updateTotalRemake(value) {
  form.feedback.totalRemake = value;
  renderApp();
}
function addFasilitasRow() {
  form.fasilitas.push({ item: "", status: "Rusak Ringan", eskalasi: false, keterangan: "", photoUrl: "" });
  renderApp();
}
function removeFasilitasRow(idx) {
  form.fasilitas.splice(idx, 1);
  renderApp();
}
function updateFasilitasField(idx, field, value) {
  form.fasilitas[idx][field] = value;
}
async function handleFasilitasPhoto(input, idx) {
  try {
    const url = await uploadPhoto(input, 'Fasilitas');
    if (url) {
      updateFasilitasField(idx, 'photoUrl', url);
      renderApp();
    }
  } catch (e) {
    console.error(e);
  }
}
function addBahanRow() {
  form.bahan.push({ nama: "", ketersediaan: "Habis", harga: 0, photoUrl: "" });
  renderApp();
}
function removeBahanRow(idx) {
  form.bahan.splice(idx, 1);
  renderApp();
}
function updateBahanField(idx, field, value) {
  form.bahan[idx][field] = value;
}
async function handleBahanPhoto(input, idx) {
  try {
    const url = await uploadPhoto(input, 'Bahan');
    if (url) {
      updateBahanField(idx, 'photoUrl', url);
      renderApp();
    }
  } catch (e) {
    console.error(e);
  }
}
</script>
