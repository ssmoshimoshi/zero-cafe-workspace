<!-- Partial-Form-Monthly.html -->
<script>
window.getMonthlyFormTemplate = function() {
  const tabs = [
    { num: 1, label: "RINGKASAN & SALES" },
    { num: 2, label: "STAFF & QC" },
    { num: 3, label: "EVALUASI" }
  ];

  return `
    <div class="w-full min-h-screen pb-24 bg-[#f3f4f6]">
      <!-- Header -->
      <div class="bg-white px-6 py-4 flex justify-between items-center sticky top-0 z-20 border-b border-gray-200 shadow-sm">
        <div>
          <h2 class="text-sm font-extrabold text-zero-black">LAPORAN BULANAN</h2>
          <div class="flex items-center">
            <p class="text-[10px] font-bold text-gray-400">${form.bulan ? formatMonthUI(form.bulan) : 'Bulan Baru'}</p>
            <span id="draftIndicator" class="ml-2 text-[8px] text-emerald-500 font-bold bg-emerald-50 px-1.5 py-0.5 rounded-sm opacity-0 transition-opacity duration-300">Tersimpan otomatis</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" onclick="confirmResetForm()" class="p-2 border border-gray-200 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all" title="Reset Laporan">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
          <button type="button" onclick="goBackMenu()" class="px-3 py-1.5 border border-gray-200 rounded-full text-[10px] font-bold text-gray-400 hover:bg-gray-50 transition-all">
            KEMBALI
          </button>
        </div>
      </div>

      <!-- Tab Navigation Stepper -->
      <div class="bg-white border-b border-gray-200 px-4 py-4 mb-4 sticky top-[65px] z-10 overflow-x-auto hide-scrollbar">
        <div class="flex justify-between items-start relative min-w-[300px] max-w-sm mx-auto">
          <!-- Connecting Line -->
          <div class="absolute left-6 right-6 h-0.5 bg-gray-100 z-0 top-2.5"></div>
          ${tabs.map(t => `
            <button type="button" ${AppState.currentTab === t.num ? 'id="activeTabBtn"' : ''} onclick="switchTab(${t.num})" class="relative z-10 flex flex-col items-center gap-1.5 outline-none focus:outline-none w-14 group hover-scale">
              <div class="w-5 h-5 rounded-full flex items-center justify-center transition-all duration-300 ${AppState.currentTab === t.num ? 'bg-zero-black shadow-md ring-4 ring-gray-100 scale-110' : AppState.currentTab > t.num ? 'bg-emerald-500 text-white' : 'bg-gray-200 group-hover:bg-gray-300'}">
                ${AppState.currentTab > t.num ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
              </div>
              <span class="text-[8px] font-bold tracking-widest text-center ${AppState.currentTab === t.num ? 'text-zero-black' : 'text-gray-400'}">${t.label}</span>
            </button>
          `).join('')}
        </div>
      </div>

      <div class="px-4">
        <div id="monthlyFormElement">
          ${getMonthlyTabContent()}
        </div>
      </div>

      <!-- Footer Navigation: minimalist dots + arrows -->
      <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 px-4 py-3 flex items-center justify-between z-30">
        <!-- Prev arrow -->
        <button type="button" onclick="prevTab()" class="p-2 text-gray-400 hover:text-zero-black transition-colors disabled:opacity-20" ${AppState.currentTab === 1 ? 'disabled' : ''}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <!-- Dots -->
        <div class="flex items-center gap-1.5">
          ${tabs.map(t => `
            <button type="button" onclick="switchTab(${t.num})" class="transition-all duration-300 rounded-full ${AppState.currentTab === t.num ? 'w-6 h-2 bg-zero-black' : 'w-2 h-2 bg-gray-200 hover:bg-gray-300'}"></button>
          `).join('')}
        </div>
        <!-- Next arrow -->
        <button type="button" onclick="nextTab()" class="p-2 text-gray-400 hover:text-zero-black transition-colors disabled:opacity-20" ${AppState.currentTab === 3 ? 'disabled' : ''}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>
  `;
}

function getMonthlyTabContent() {
  switch (AppState.currentTab) {
    case 1:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">IDENTITAS & PERIODE</h3>
          
          <div class="flex gap-3 mb-4">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">NAMA SUPERVISOR</label>
              <input type="text" value="${form.supervisor}" oninput="window.form.supervisor = this.value; StorageHelper.set('zc_last_spv_name', this.value);" list="spvDatalistMonthly" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
              <datalist id="spvDatalistMonthly">
                ${AppState.masterStaff.filter(s => s.outlet && s.outlet.toLowerCase().trim() === (window.form.outlet || 'Perintis').toLowerCase().trim() && s.status === 'Aktif').map(s => `<option value="${s.nama}"></option>`).join('')}
              </datalist>
            </div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">OUTLET</label>
              <select onchange="window.form.outlet = this.value; fetchMonthlyData()" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                <option value="Perintis" ${form.outlet === 'Perintis' ? 'selected' : ''}>Perintis</option>
                <option value="Dg Tata" ${form.outlet === 'Dg Tata' ? 'selected' : ''}>Dg Tata</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">BULAN LAPORAN</label>
            <input type="month" value="${form.bulan}" onchange="window.form.bulan = this.value; fetchMonthlyData()" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
          </div>
        </div>
        
        <div id="monthlySalesContainer" class="bg-zero-black rounded-2xl p-5 mb-4 transition-all duration-300 shadow-md">
          <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">METRIK PENJUALAN</h3>
          
          <div class="grid grid-cols-2 gap-3 mb-3">
             <div>
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL SALES REAL (RP)</label>
               <input type="text" value="${form.monthly.sales.total ? 'Rp ' + new Intl.NumberFormat('id-ID').format(form.monthly.sales.total) : ''}" onfocus="unformatRupiah(this)" onblur="formatRupiah(this); updateMonthlySalesField('total', parseRupiah(this.value))" class="w-full px-3 py-2 text-sm font-bold bg-transparent border border-gray-700 rounded-xl text-white focus:outline-none focus:border-gray-400">
             </div>
             <div>
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TARGET SALES (RP)</label>
               <input type="text" value="${form.monthly.sales.target ? 'Rp ' + new Intl.NumberFormat('id-ID').format(form.monthly.sales.target) : ''}" onfocus="unformatRupiah(this)" onblur="formatRupiah(this); updateMonthlySalesField('target', parseRupiah(this.value))" class="w-full px-3 py-2 text-sm bg-transparent border border-gray-700 rounded-xl text-white focus:outline-none focus:border-gray-400">
             </div>
          </div>
          <div>
            <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">PERSENTASE PENCAPAIAN</label>
            <div class="flex items-center px-3 py-2 bg-gray-800 border border-gray-700 rounded-xl">
              <span id="monthlyPersenDisplay" class="text-sm font-bold text-white">${form.monthly.sales.persen}%</span>
            </div>
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4 space-y-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">RINGKASAN EKSEKUTIF</h3>
          
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">PENCAPAIAN UTAMA BULAN INI</label>
            <textarea onchange="window.form.monthly.ringkasan.pencapaian = this.value" placeholder="Misal: Mencapai 110% dari target sales" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black min-h-[80px]">${form.monthly.ringkasan.pencapaian}</textarea>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">MASALAH / ISU UTAMA</label>
            <textarea onchange="window.form.monthly.ringkasan.masalah = this.value" placeholder="Misal: Sering mati lampu" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black min-h-[80px]">${form.monthly.ringkasan.masalah}</textarea>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">KESIMPULAN KESELURUHAN</label>
            <textarea onchange="window.form.monthly.ringkasan.kesimpulan = this.value" placeholder="Status operasional bulan ini..." class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black min-h-[80px]">${form.monthly.ringkasan.kesimpulan}</textarea>
          </div>
        </div>


        <!-- Card Minuman -->
        <div class="bg-white border border-gray-200 rounded-2xl mb-4 overflow-hidden">
          <button type="button" onclick="toggleAccordion('monthlyMinuman')" class="w-full flex justify-between items-center p-5 bg-white focus:outline-none hover:bg-gray-50 transition-colors">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">EVALUASI PRODUK MINUMAN</h3>
            <svg id="icon-monthlyMinuman" class="w-4 h-4 transition-transform duration-300 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="monthlyMinuman" class="hidden px-5 pb-5 space-y-4 border-t border-gray-100 mt-2 pt-4">
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1">TOP 5 MINUMAN</span>
              <div class="space-y-2">
                ${form.monthly.produk.topMinuman.map((item, idx) => `
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 w-4">${idx+1}</span>
                    <input type="text" id="input-minuman-topMinuman-${idx}" value="${item.nama}" readonly placeholder="Nama Produk" class="flex-1 px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                    <input type="number" value="${item.terjual}" readonly placeholder="Terjual" class="w-16 px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                  </div>
                `).join('')}
              </div>
            </div>
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1 mt-4">BOTTOM 3 MINUMAN</span>
              <div class="space-y-2">
                ${form.monthly.produk.bottomMinuman.map((item, idx) => `
                  <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="text-[10px] font-bold text-gray-400 w-4">${idx+1}</span>
                      <input type="text" id="input-minuman-bottomMinuman-${idx}" value="${item.nama}" readonly placeholder="Nama Produk" class="flex-1 px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                      <input type="number" value="${item.terjual}" readonly placeholder="Terjual" class="w-16 px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                    </div>
                    <input type="text" value="${item.rencana}" onchange="window.form.monthly.produk.bottomMinuman[${idx}].rencana = this.value" placeholder="Rencana (Promo/Hapus/dll)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
        
        <!-- Card Makanan -->
        <div class="bg-white border border-gray-200 rounded-2xl mb-4 overflow-hidden">
          <button type="button" onclick="toggleAccordion('monthlyMakanan')" class="w-full flex justify-between items-center p-5 bg-white focus:outline-none hover:bg-gray-50 transition-colors">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">EVALUASI PRODUK MAKANAN</h3>
            <svg id="icon-monthlyMakanan" class="w-4 h-4 transition-transform duration-300 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="monthlyMakanan" class="hidden px-5 pb-5 space-y-4 border-t border-gray-100 mt-2 pt-4">
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1">TOP 5 MAKANAN</span>
              <div class="space-y-2">
                ${form.monthly.produk.topMakanan.map((item, idx) => `
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 w-4">${idx+1}</span>
                    <input type="text" id="input-makanan-topMakanan-${idx}" value="${item.nama}" readonly placeholder="Nama Produk" class="flex-1 px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                    <input type="number" value="${item.terjual}" readonly placeholder="Terjual" class="w-16 px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                  </div>
                `).join('')}
              </div>
            </div>
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1 mt-4">BOTTOM 3 MAKANAN</span>
              <div class="space-y-2">
                ${form.monthly.produk.bottomMakanan.map((item, idx) => `
                  <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="text-[10px] font-bold text-gray-400 w-4">${idx+1}</span>
                      <input type="text" id="input-makanan-bottomMakanan-${idx}" value="${item.nama}" readonly placeholder="Nama Produk" class="flex-1 px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                      <input type="number" value="${item.terjual}" readonly placeholder="Terjual" class="w-16 px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                    </div>
                    <input type="text" value="${item.rencana}" onchange="window.form.monthly.produk.bottomMakanan[${idx}].rencana = this.value" placeholder="Rencana (Promo/Hapus/dll)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
        
        <!-- Card Snack -->
        <div class="bg-white border border-gray-200 rounded-2xl mb-4 overflow-hidden">
          <button type="button" onclick="toggleAccordion('monthlySnack')" class="w-full flex justify-between items-center p-5 bg-white focus:outline-none hover:bg-gray-50 transition-colors">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">EVALUASI PRODUK SNACK</h3>
            <svg id="icon-monthlySnack" class="w-4 h-4 transition-transform duration-300 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="monthlySnack" class="hidden px-5 pb-5 space-y-4 border-t border-gray-100 mt-2 pt-4">
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1">TOP 5 SNACK</span>
              <div class="space-y-2">
                ${form.monthly.produk.topSnack.map((item, idx) => `
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400 w-4">${idx+1}</span>
                    <input type="text" id="input-snack-topSnack-${idx}" value="${item.nama}" readonly placeholder="Nama Produk" class="flex-1 px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                    <input type="number" value="${item.terjual}" readonly placeholder="Terjual" class="w-16 px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                  </div>
                `).join('')}
              </div>
            </div>
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1 mt-4">BOTTOM 3 SNACK</span>
              <div class="space-y-2">
                ${form.monthly.produk.bottomSnack.map((item, idx) => `
                  <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="text-[10px] font-bold text-gray-400 w-4">${idx+1}</span>
                      <input type="text" id="input-snack-bottomSnack-${idx}" value="${item.nama}" readonly placeholder="Nama Produk" class="flex-1 px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                      <input type="number" value="${item.terjual}" readonly placeholder="Terjual" class="w-16 px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-50 pointer-events-none">
                    </div>
                    <input type="text" value="${item.rencana}" onchange="window.form.monthly.produk.bottomSnack[${idx}].rencana = this.value" placeholder="Rencana (Promo/Hapus/dll)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    case 2:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">EVALUASI OPERASIONAL STAFF</h3>
          
          <div class="grid grid-cols-3 gap-2 mb-4 border-b border-gray-100 pb-4">
             <div>
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">% KEPATUHAN SOP</label>
               <input type="number" value="${form.monthly.operasional.kepatuhanSop}" readonly class="w-full px-2 py-1.5 text-xs text-center font-bold border border-gray-200 rounded-lg focus:outline-none bg-gray-100 cursor-not-allowed">
             </div>
             <div>
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL TELAT (KALI)</label>
               <input type="number" value="${form.monthly.operasional.telat}" readonly class="w-full px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none bg-gray-100 cursor-not-allowed text-red-500 font-bold">
             </div>
             <div>
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">SP / TEGURAN KELUAR</label>
               <input type="number" value="${form.monthly.operasional.teguran}" onchange="window.form.monthly.operasional.teguran = Number(this.value)" class="w-full px-2 py-1.5 text-xs text-center border border-gray-200 rounded-lg focus:outline-none text-red-500 font-bold">
             </div>
          </div>
          
          <div class="mb-5 bg-gray-50 p-4 rounded-xl border border-gray-100">
            <label class="block text-[10px] font-bold text-zero-black uppercase tracking-widest mb-3 border-b border-gray-200 pb-2">TURNOVER (KARYAWAN RESIGN)</label>
            <div class="flex gap-3">
              <div class="bg-zero-black text-white p-3 rounded-xl flex flex-col items-center justify-center min-w-[70px] shadow-sm transform transition-transform duration-300 hover:scale-105">
                <span class="text-[8px] font-bold uppercase tracking-widest text-gray-400">Total</span>
                <span class="text-2xl font-black">${form.monthly.operasional.resignList ? form.monthly.operasional.resignList.length : 0}</span>
              </div>
              <div class="flex-1 flex flex-col justify-center space-y-2">
                ${(form.monthly.operasional.resignList || []).map((item, idx) => `
                  <div class="flex items-center gap-2 bg-white p-2.5 rounded-xl border border-gray-200 cursor-pointer hover:border-gray-300 transition-colors shadow-sm" onclick="openResignModal(${idx})">
                    <div class="flex-1 overflow-hidden">
                      <span class="block text-xs font-bold text-zero-black mb-0.5 truncate">${item.nama || 'Pilih Staf...'}</span>
                      <span class="block text-[10px] text-gray-500 truncate mb-0.5">${item.alasan || 'Ketuk untuk mengisi alasan...'}</span>
                      <span class="block text-[9px] font-bold text-blue-500 uppercase tracking-widest">${item.tanggal ? 'Eff: ' + formatDateUI(item.tanggal) : 'Tanggal belum diatur'}</span>
                    </div>
                    <button type="button" onclick="event.stopPropagation(); removeResignStaff(${idx})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-colors shrink-0">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                  </div>
                `).join('')}
                <button type="button" onclick="openResignModal(-1)" class="w-full py-2.5 border border-dashed border-gray-300 text-[10px] font-bold text-gray-500 rounded-lg hover:bg-white transition-colors uppercase tracking-widest">+ Tambah Staf Resign</button>
              </div>
            </div>
          </div>

          <div class="mb-4">
            <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">PENYEBAB KENDALA STAFF UTAMA</label>
            <textarea rows="2" onchange="window.form.monthly.operasional.penyebab = this.value" placeholder="Misal: Kurang koordinasi antar shift" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none resize-y">${form.monthly.operasional.penyebab}</textarea>
          </div>

          <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 mt-6">EVALUASI PERFORMA INDIVIDU</label>
          <div class="text-[8px] text-gray-400 italic mb-3 leading-tight">
            * Sistem menampilkan rekomendasi tren dari akumulasi mingguan. SPV wajib memeriksa ulang dan berhak mengubah penilaian akhir.
          </div>
          <div class="space-y-2">
            ${form.monthly.staff.map((s, idx) => `
              <details class="group border border-gray-200 rounded-xl bg-white overflow-hidden">
                <summary class="flex justify-between items-center p-3 cursor-pointer select-none bg-gray-50 group-open:bg-gray-100 transition-colors">
                  <span class="text-xs font-bold text-zero-black">${s.nama} <span class="text-[10px] text-gray-500 font-normal">(${s.posisi})</span></span>
                  <div class="flex items-center gap-2">
                    <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${s.status === 'Berkembang' ? 'bg-green-100 text-green-700' : s.status === 'Menurun' ? 'bg-red-100 text-red-700' : 'bg-gray-200 text-gray-700'}">${s.status || 'Stagnan'}</span>
                    <svg class="w-4 h-4 text-gray-400 group-open:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                  </div>
                </summary>
                <div class="p-3 border-t border-gray-100">
                  <div class="mb-2">
                    <label class="block text-[8px] font-bold text-gray-400 uppercase mb-1">Status Penilaian</label>
                    <select onchange="updateMonthlyStaff(${idx}, 'status', this.value)" class="w-full px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg focus:outline-none bg-white">
                      <option value="Berkembang" ${s.status === 'Berkembang' ? 'selected' : ''}>Berprogress Baik</option>
                      <option value="Stagnan" ${s.status === 'Stagnan' ? 'selected' : ''}>Stagnan / Standar</option>
                      <option value="Menurun" ${s.status === 'Menurun' ? 'selected' : ''}>Menurun / Perlu Evaluasi</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-[8px] font-bold text-gray-400 uppercase mb-1">Catatan / Alasan</label>
                    <textarea rows="2" onchange="updateMonthlyStaff(${idx}, 'alasan', this.value)" placeholder="Catatan/Alasan Evaluasi" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white resize-y">${s.alasan || ''}</textarea>
                  </div>
                </div>
              </details>
            `).join('')}
          </div>
        </div>

        <div id="monthlyQcContainer" class="bg-white border border-gray-200 rounded-2xl p-5 mb-4 transition-all duration-300">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">REKAP QUALITY CONTROL & KOMPLAIN</h3>
          
          <div class="flex gap-3 mb-4">
             <div class="flex-1">
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL KASUS KOMPLAIN</label>
               <input type="number" value="${form.monthly.qc.komplain}" onchange="window.form.monthly.qc.komplain = Number(this.value)" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none text-center font-bold">
             </div>
             <div class="flex-1">
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL REMAKE PRODUK</label>
               <input type="number" value="${form.monthly.qc.remake}" onchange="window.form.monthly.qc.remake = Number(this.value)" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none text-center font-bold text-red-500">
             </div>
          </div>
          
          <div class="space-y-4">
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">EVALUASI QC ESPRESSO BULANAN</label>
              <textarea onchange="window.form.monthly.qc.espresso = this.value" placeholder="Konsistensi rasa sebulan terakhir..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none h-16">${form.monthly.qc.espresso}</textarea>
            </div>
          </div>

          <div class="mt-4">
            <div class="flex justify-between items-center mb-3">
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest">QC PRODUK LAINNYA</label>
              <button type="button" onclick="addMonthlyQCItem()" class="px-3 py-1 bg-zero-black text-white text-[8px] font-bold rounded-lg hover:bg-gray-800 transition-all">+ TAMBAH</button>
            </div>
            ${(!form.monthly.qc.items || form.monthly.qc.items.length === 0) ? `<p class="text-[10px] text-center text-gray-400 py-3">Belum ada produk lain. Tekan Tambah.</p>` : ''}
            <div class="space-y-3">
              ${(form.monthly.qc.items || []).map((item, idx) => `
                <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/30">
                  <div class="flex justify-between items-center mb-2">
                    <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Produk #${idx + 1}</span>
                    <button type="button" onclick="removeMonthlyQCItem(${idx})" class="text-[10px] font-bold text-red-400 hover:text-red-600">HAPUS</button>
                  </div>
                  <div class="space-y-2">
                    <input type="text" value="${item.menu || ''}" onchange="updateMonthlyQCItem(${idx}, 'menu', this.value)" placeholder="Nama produk (minuman/makanan)..." class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white font-bold">
                    <input type="text" value="${item.komplain || ''}" onchange="updateMonthlyQCItem(${idx}, 'komplain', this.value)" placeholder="Penyebab dominan komplain..." class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                    <input type="text" value="${item.rekomendasi || ''}" onchange="updateMonthlyQCItem(${idx}, 'rekomendasi', this.value)" placeholder="Rekomendasi perbaikan QC bulan depan..." class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    case 3:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">FASILITAS & INVENTARIS</h3>
          
          <div class="space-y-4">
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL PENGELUARAN PERBAIKAN (RP)</label>
              <input type="number" value="${form.monthly.fasilitas.pengeluaran}" onchange="window.form.monthly.fasilitas.pengeluaran = Number(this.value)" class="w-full px-3 py-2 text-sm font-bold border border-gray-200 rounded-xl focus:outline-none text-red-500">
            </div>
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">KERUSAKAN FASILITAS BELUM SELESAI (ESKALASI)</label>
              <textarea onchange="window.form.monthly.fasilitas.eskalasi = this.value" placeholder="Misal: Mesin espresso bocor dari minggu 2..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none h-16">${form.monthly.fasilitas.eskalasi}</textarea>
            </div>
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">STRATEGI BULAN DEPAN</h3>
          
          <div class="space-y-4">
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">FOKUS & STRATEGI UTAMA</label>
              <textarea onchange="window.form.monthly.rencana.strategi = this.value" placeholder="Tuliskan program perbaikan bulan depan..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none h-20">${form.monthly.rencana.strategi}</textarea>
            </div>
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">KEBUTUHAN SUPERVISOR</label>
              <textarea onchange="window.form.monthly.rencana.gm = this.value" placeholder="Pengadaan alat baru, training eksternal..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none h-20">${form.monthly.rencana.gm}</textarea>
            </div>
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">EVALUASI MANDIRI SUPERVISOR</h3>
          
          <div class="space-y-4">
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">PENCAPAIAN TERBAIK ANDA SECARA PRIBADI?</label>
              <textarea rows="2" onchange="window.form.monthly.evaluasi.berhasil = this.value" placeholder="Berhasil menekan angka telat..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none resize-y">${form.monthly.evaluasi.berhasil}</textarea>
            </div>
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TANTANGAN TERSULIT YANG DIHADAPI?</label>
              <textarea rows="2" onchange="window.form.monthly.evaluasi.sulit = this.value" placeholder="Mengatur jadwal saat chaos..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none resize-y">${form.monthly.evaluasi.sulit}</textarea>
            </div>

            <div class="border-t border-gray-100 pt-4 mt-2">
              <p class="text-[8px] font-bold text-zero-black uppercase tracking-widest mb-3">PANDANGAN KE DEPAN</p>
              <div class="space-y-3">
                <div>
                  <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">JUMLAH STAF RESIGN BULAN INI</label>
                  <input type="number" min="0" value="${form.monthly.operasional.turnover}" onchange="window.form.monthly.operasional.turnover = parseInt(this.value) || 0" class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black transition-colors text-center font-bold">
                </div>
                <div>
                  <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">STRATEGI & RENCANA BULAN DEPAN</label>
                  <textarea rows="2" onchange="window.form.monthly.operasional.strategi = this.value" placeholder="Fokus upselling paket siang..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none resize-y">${form.monthly.operasional.strategi}</textarea>
                </div>
                <div>
                  <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">KEBUTUHAN / ESKALASI KE GM</label>
                  <textarea rows="2" onchange="window.form.monthly.operasional.kebutuhanGM = this.value" placeholder="Butuh approval budget perbaikan mesin..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none resize-y">${form.monthly.operasional.kebutuhanGM}</textarea>
                </div>
              </div>
            </div>
            <div>
              <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">SKILL YANG INGIN DITINGKATKAN?</label>
              <textarea rows="2" onchange="window.form.monthly.evaluasi.skill = this.value" placeholder="Komunikasi & problem solving..." class="w-full px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none resize-y">${form.monthly.evaluasi.skill}</textarea>
            </div>
            
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 mt-4 text-center">
              <label class="block text-[10px] font-bold text-zero-black uppercase tracking-widest mb-3">RATING KINERJA ANDA SENDIRI (1-10)</label>
              <div class="flex items-center justify-center gap-4">
                <input type="range" min="1" max="10" value="${form.monthly.evaluasi.ratingKerja}" onchange="updateMonthlyRating(this.value)" class="w-3/4 cursor-pointer accent-zero-black">
                <span id="monthlyRatingDisplay" class="text-2xl font-black text-zero-black">${form.monthly.evaluasi.ratingKerja}</span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="flex flex-col gap-3 mt-8 mb-8">
          <div class="flex gap-3">
            <button type="button" onclick="saveDraft()" class="flex-1 py-3 border border-zero-black rounded-2xl text-xs font-bold text-zero-black hover:bg-gray-50 transition-all">SIMPAN DRAFT</button>
            <button type="button" onclick="exportPDF()" class="flex-1 py-3 border border-zero-black rounded-2xl text-xs font-bold text-zero-black hover:bg-gray-50 transition-all">EXPORT PDF</button>
          </div>
          <button type="button" onclick="openPreviewModal()" class="w-full py-4 bg-zero-black text-white rounded-2xl text-sm font-bold hover:bg-gray-800 transition-all shadow-md">TINJAU & KIRIM LAPORAN</button>
        </div>
      `;
  }
}

function updateMonthlySalesField(field, value) {
  form.monthly.sales[field] = value;
  if (field === 'total' || field === 'target') {
    if (form.monthly.sales.target > 0) {
      form.monthly.sales.persen = Math.round(form.monthly.sales.total / form.monthly.sales.target * 100);
    } else {
      form.monthly.sales.persen = 0;
    }
  }
  
  setTimeout(() => {
    if (AppState.currentTab === 1) renderApp();
  }, 300);
}

function updateMonthlyRating(value) {
  form.monthly.evaluasi.ratingKerja = Number(value);
  const display = document.getElementById('monthlyRatingDisplay');
  if (display) display.innerText = value;
}

function updateMonthlyStaff(idx, field, value) {
  form.monthly.staff[idx][field] = value;
}
</script>
