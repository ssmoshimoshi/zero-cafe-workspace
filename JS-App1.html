/*  === STORAGE HELPER (BUG FIX: Mengatasi SecurityError localStorage di Iframe GAS) === */
const StorageHelper = {
  memory: {},
  get: function(key) {
    try { return localStorage.getItem(key) || sessionStorage.getItem(key) || this.memory[key]; } 
    catch(e) { 
      try { return sessionStorage.getItem(key) || this.memory[key]; }
      catch(err) { return this.memory[key]; }
    }
  },
  set: function(key, value) {
    try { localStorage.setItem(key, value); return; } catch(e) {}
    try { sessionStorage.setItem(key, value); return; } catch(e) {}
    this.memory[key] = value;
  },
  remove: function(key) {
    try { localStorage.removeItem(key); } catch(e) {}
    try { sessionStorage.removeItem(key); } catch(e) {}
    delete this.memory[key];
  }
};

/*  === FORMAT DATE HELPER === */
function formatDateIndo(dateStr) {
  if (!dateStr) return "";
  const parts = dateStr.split("-");
  if (parts.length === 3) {
    return parts[2] + "-" + parts[1] + "-" + parts[0];
  }
  return dateStr;
}

  return '<div class="flex flex-wrap gap-2">' + options.map(function(opt) {
    const isSelected = currentValue === opt.value;
    const baseClass = "px-4 py-2 rounded-full text-[10px] uppercase tracking-widest font-bold transition-all whitespace-nowrap cursor-pointer select-none ";
    const selectedClass = isSelected ? "bg-zero-black text-white shadow-md" : "bg-white text-gray-400 hover:bg-gray-100 border border-gray-200";
    return '<label class="' + baseClass + selectedClass + '">' +
             '<input type="radio" value="' + opt.value + '" onchange="' + onChangeStr + '; renderApp();" class="hidden" ' + (isSelected ? 'checked' : '') + '>' +

  }).join('') + '</div>';
}

/*  === BOOTSTRAP / INITIALIZATION === */
function bootstrapApp() {
  const root = document.getElementById('app-root');
  
  if (!root) {
    console.warn("DOM 'app-root' belum siap, menunda bootstrap...");
    setTimeout(bootstrapApp, 50);
    return;
  }
  
  if (window.__appInitialized) return;
  window.__appInitialized = true;
  
  try {
    const savedRole = StorageHelper.get('zc_role');
    if (savedRole) {
      AppState.role = savedRole;
      AppState.menu = savedRole === 'SPV' ? 'select_report' : 'dashboard_gm';
      if (savedRole === 'SPV') {
        AppState.outlet = StorageHelper.get('zc_last_outlet');
      }
    } else {
      AppState.role = null;
      AppState.menu = 'login';
    }
    
    renderApp();
    
    // Fetch data first, initialLoader acts as the loader
    const startTime = Date.now();
    fetchMasterStaff().finally(() => {
      const elapsed = Date.now() - startTime;
      const remainingTime = Math.max(0, 1500 - elapsed); // Ensure at least 1.5s loader
      
      setTimeout(() => {
        const loader = document.getElementById('initialLoader');
        if (loader) {
          loader.classList.add('opacity-0');
          setTimeout(() => loader.style.display = 'none', 700);
        }
        
        const root = document.getElementById('app-root');
        if (root) root.classList.remove('opacity-0');
      }, remainingTime);
    });
  } catch (e) {
    console.error("Bootstrap Error:", e);
  }
}

/*  === TOAST NOTIFICATIONS === */
function showToast(message, type = "success") {
  const toast = document.getElementById('toastNotification');
  if (!toast) {
    console.warn("Toast diabaikan (DOM belum siap):", message);
    return;
  }
  
  toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-2xl z-50 transition-all duration-300 transform translate-y-0 opacity-100 ${
    type === 'success' ? 'bg-gray-900 text-white' : 'bg-rose-600 text-white'
  }`;
  toast.innerHTML = `<div class="flex items-center space-x-2">
    <span>${message}</span>
  </div>`;
  
  setTimeout(() => {
    if (toast) { /*  Pengaman tambahan */
      toast.className = "fixed bottom-5 right-5 px-6 py-3 rounded-2xl z-50 transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none";
    }
  }, 4000);
}

/*  === TEMPLATE RENDERING & ROUTER === */
function renderApp() {
  const root = document.getElementById('app-root');
  if (!root) return; /*  Sudah ditangani oleh bootstrapApp */
  
  try {
    let html = "";
    if (AppState.menu === 'login') html = getLoginTemplate();
    else if (AppState.menu === 'select_report') html = getMenuSPVTemplate();
    else if (AppState.menu === 'form_daily') html = getDailyFormTemplate();
    else if (AppState.menu === 'form_weekly') html = getWeeklyFormTemplate();
    else if (AppState.menu === 'form_monthly') html = getMonthlyFormTemplate();
    else if (AppState.menu === 'dashboard_gm') html = getDashboardGMTemplate();
    root.innerHTML = html;
    bindEvents();
    
    setTimeout(() => {
      const activeTabBtn = document.getElementById('activeTabBtn');
      if (activeTabBtn) {
        activeTabBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
      
      // Render chart if in GM Dashboard
      if (AppState.menu === 'dashboard_gm' && typeof renderGMChart === 'function' && AppState.dashboardData) {
        renderGMChart();
      }
    }, 50);
  } catch (err) {
    console.error("Render Error:", err);
    if (err.name === "ReferenceError" || (err.message && err.message.includes("not a function"))) {
      showToast("Error Sistem: Komponen form tidak ditemukan.", "error");
    } else {
      showToast("Sistem mendeteksi data rusak. Mereset draft window.form.", "error");
      StorageHelper.remove('zc_draft_daily');
      StorageHelper.remove('zc_draft_weekly');
      StorageHelper.remove('zc_draft_monthly');
    }
    
    /*  Fallback to menu safely */
    AppState.menu = 'select_report';
    if (root) {
      root.innerHTML = getMenuSPVTemplate();
      bindEvents();
    }
  }
}

/*  === THEME TOGGLE LOGIC === */
function toggleTheme() {
  const html = document.documentElement;
  if (html.classList.contains('dark')) {
    html.classList.remove('dark');
    StorageHelper.set('zc_theme', 'light');
  } else {
    html.classList.add('dark');
    StorageHelper.set('zc_theme', 'dark');
  }
}

/*  === EVENT BINDING === */
function bindEvents() {
  /*  Logout function */
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', () => {
      handleLogout();
    });
  }
}

function transitionToMenu(menuKey, callback) {
  const root = document.getElementById('app-root');
  if (root) {
    root.classList.add('opacity-0');
    setTimeout(() => {
      if (callback) callback();
      AppState.menu = menuKey;
      renderApp();
      root.classList.remove('opacity-0');
    }, 300);
  } else {
    if (callback) callback();
    AppState.menu = menuKey;
    renderApp();
  }
}

function handleLogout() {
  transitionToMenu('login', () => {
    StorageHelper.remove('zc_role');
    AppState.role = null;
  });
}

window.submitSmartLogin = function() {
  const input = document.getElementById('inputSmartLogin');
  const btn = document.getElementById('btnSmartLogin');
  if (!input || !input.value) return;
  
  const pin = input.value;
  btn.innerHTML = '<span class="loading-spinner w-4 h-4 mr-2 border-2 border-white"></span> CEK...';
  btn.classList.remove('bg-zero-black');
  btn.classList.add('bg-gray-400');
  
  // 1. Cek Sandi GM
  if (pin === 'Zero123') {
    setTimeout(() => {
      btn.innerHTML = 'MASUK';
      btn.classList.add('bg-zero-black');
      btn.classList.remove('bg-gray-400');
      input.value = '';
      handleLogin('GM');
    }, 500); // Simulasi delay singkat agar UX terasa natural
    return;
  }
  
  // 2. Jika bukan GM, lempar ke backend (cek PIN SPV)
  google.script.run
    .withSuccessHandler(function(resStr) {
      btn.innerHTML = 'MASUK';
      btn.classList.add('bg-zero-black');
      btn.classList.remove('bg-gray-400');
      
      try {
        const res = JSON.parse(resStr);
        if (res.success) {
          input.value = '';
          AppState.outlet = res.outlet;
          StorageHelper.set('zc_last_outlet', res.outlet);
          StorageHelper.set('zc_role', 'SPV');
          AppState.role = 'SPV';
          transitionToMenu('select_report');
        } else {
          showToast(res.error || "Kata Sandi / PIN Salah", "error");
          input.value = '';
          input.focus();
        }
      } catch(e) {
        showToast("Error Parse: " + e.message, "error");
        console.error("Parse Error:", e, resStr);
      }
    })
    .withFailureHandler(function(err) {
      btn.innerHTML = 'MASUK';
      btn.classList.add('bg-zero-black');
      btn.classList.remove('bg-gray-400');
      showToast("Server Error: " + err.message, "error");
    })
    .api_verifyPIN(pin);
};

function startNewForm(type) {
  if (type === 'daily') {
    const loader = document.getElementById('loadingSpinner');
    if (loader) loader.classList.remove('hidden');
    
    // Ensure window.form is defined before calling
    if (!window.form || !window.form.outlet) resetFormData(type);
    
    Server.call('api_checkPendingLaporan')
      .then(res => {
        if (loader) loader.classList.add('hidden');
        try {
          const result = JSON.parse(res);
          if (result.debug) console.log("Pendings Debug:", result.debug);
          if (result.status === 'success' && result.pendings) {
            AppState.allPendingLaporan = result.pendings; // Array of all pendings
          } else {
            AppState.allPendingLaporan = [];
          }
        } catch(e) {
          AppState.allPendingLaporan = [];
        }
        
        window.form.outlet = AppState.outlet || StorageHelper.get('zc_last_outlet') || "Perintis";
        _startNormalForm(type);
      })
      .catch(err => {
        if (loader) loader.classList.add('hidden');
        AppState.allPendingLaporan = [];
        window.form.outlet = StorageHelper.get('zc_last_outlet') || "Perintis";
        _startNormalForm(type);
      });
  } else {
    _startNormalForm(type);
  }
}

function _startNormalForm(type) {
  const pending = AppState.allPendingLaporan ? AppState.allPendingLaporan.find(p => p.outlet && p.outlet.trim() === (AppState.outlet || StorageHelper.get('zc_last_outlet') || "Perintis").trim()) : null;

  if (loadDraft(type)) {
    // PROTEKSI: Jika draft dari localStorage versi lama tidak memiliki properti fase, paksa menjadi 1
    if (type === 'daily' && !window.form.fase) {
      window.form.fase = 1;
    }

    // BUGS FIX: Jika ada draft di lokal tapi server bilang ada Fase 1 yang pending, berarti user mereload halaman 
    // sebelum draft terhapus otomatis. Kita harus memaksa draft ini menjadi Fase 2.
    if (type === 'daily' && pending && window.form.fase === 1) {
      console.warn("Server mendeteksi Fase 1 selesai, namun draft lokal tertinggal. Memaksa masuk Fase 2.");
      window.form.fase = 2;
      window.form.tanggal = pending.tanggal;
      window.form.supervisor = pending.supervisor;
      window.form.penjualan.shift1 = pending.shift1;
      window.form.rowIdx = pending.rowIdx;
      window.form.sheetName = pending.sheetName;
    }
    
    // BUGS FIX: Jika ada draft Fase 2, TAPI server bilang TIDAK ADA pending Fase 1, 
    // berarti draft ini usang atau data di server sudah dihapus. Kita HARUS memaksa draft ini menjadi Fase 1.
    if (type === 'daily' && !pending && window.form.fase === 2) {
      console.warn("Server mendeteksi TIDAK ADA Fase 1 pending, namun draft lokal Fase 2 tersisa. Membuang draft usang.");
      StorageHelper.remove('zc_draft_daily');
      resetFormData(type);
      window.form.fase = 1;
      
      // Set default outlet if SPV
      if (AppState.role === 'SPV') {
        window.form.outlet = AppState.outlet || StorageHelper.get('zc_last_outlet') || "Perintis";
      }
    }
    
    // Patch missing data for Phase 2 drafts (e.g. supervisor name) that were saved incorrectly before the hotfix
    if (type === 'daily' && window.form.fase === 2) {
      if (pending) {
        window.form.tanggal = pending.tanggal;
        window.form.supervisor = pending.supervisor;
      }
    }
    transitionToMenu(`form_${type}`, () => {
      AppState.currentTab = 1;
    });
    return;
  }

  resetFormData(type);
  
  if (type === 'daily') {
    window.form.staff = [];
    window.form.outlet = AppState.outlet || StorageHelper.get('zc_last_outlet') || "Perintis";
    const pending = AppState.allPendingLaporan ? AppState.allPendingLaporan.find(p => p.outlet && p.outlet.trim() === window.form.outlet.trim()) : null;
    window.form.fase = pending ? 2 : 1;
    if (pending) {
      window.form.tanggal = pending.tanggal;
      window.form.supervisor = pending.supervisor;
      window.form.penjualan.shift1 = pending.shift1;
      window.form.rowIdx = pending.rowIdx;
      window.form.sheetName = pending.sheetName;
    }
    window.fetchDailyTarget();
  } else if (type === 'weekly') {
    const currentOutlet = AppState.outlet || StorageHelper.get('zc_last_outlet') || window.form.outlet || "";
    const filteredStaff = AppState.masterStaff.filter(s => currentOutlet ? (s.outlet && s.outlet.toLowerCase().trim() === currentOutlet.toLowerCase().trim()) : true);
    window.form.weekly.staff = filteredStaff.map(s => ({
      nama: s.nama, posisi: s.posisi, status: "", alasan: ""
    }));
  } else if (type === 'monthly') {
    const currentOutlet = AppState.outlet || StorageHelper.get('zc_last_outlet') || window.form.outlet || "";
    const filteredStaff = AppState.masterStaff.filter(s => currentOutlet ? (s.outlet && s.outlet.toLowerCase().trim() === currentOutlet.toLowerCase().trim()) : true);
    window.form.monthly.staff = filteredStaff.map(s => ({
      nama: s.nama, posisi: s.posisi, status: "Berkembang", alasan: ""
    }));
  }
  
  transitionToMenu(`form_${type}`, () => {
    AppState.currentTab = 1;
  });
}

window.formatDateUI = function(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('-');
  if (parts.length === 3) {
    return parts[2] + '-' + parts[1] + '-' + parts[0];
  }
  return dateStr;
};

window.formatMonthUI = function(monthStr) {
  if (!monthStr) return '';
  const parts = monthStr.split('-');
  if (parts.length === 2) {
    return parts[1] + '-' + parts[0];
  }
  return monthStr;
};

window.fetchDailyTarget = function() {
  if (window.form.type !== 'daily') return;
  const dObj = window.form.tanggal ? new Date(window.form.tanggal) : new Date();
  const m = dObj.getMonth() + 1;
  const monthYear = (m < 10 ? "0"+m : m) + "-" + dObj.getFullYear();
  const outlet = window.form.outlet || "Perintis";
  const daysInMonth = new Date(dObj.getFullYear(), m, 0).getDate();
  
  const loaderEl = document.getElementById('targetHarianLoader');
  const displayEl = document.getElementById('displayTargetHarian');
  
  if (loaderEl) loaderEl.classList.remove('hidden');
  if (displayEl) {
    displayEl.classList.add('opacity-50');
    displayEl.value = 'Mengambil data...';
  }
  
  google.script.run
    .withSuccessHandler(function(resStr) {
      if (loaderEl) loaderEl.classList.add('hidden');
      if (displayEl) displayEl.classList.remove('opacity-50');
      try {
         const res = JSON.parse(resStr);
         if (res.status === 'success') {
           const dailyTarget = res.target > 0 ? Math.round(res.target / daysInMonth) : 0;
           window.form.penjualan.target = dailyTarget;
           
           if (displayEl) {
             displayEl.value = dailyTarget > 0 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(dailyTarget) : 'Rp 0 (Belum Diset)';
           }
           
           if (window.updateDailyProgress) window.updateDailyProgress();
         }
      } catch(e){}
    })
    .withFailureHandler(function(err) {
      if (loaderEl) loaderEl.classList.add('hidden');
      if (displayEl) {
        displayEl.classList.remove('opacity-50');
        displayEl.value = 'Gagal mengambil data';
      }
    })
    .api_getTargetBulanan(outlet, monthYear);
};

function loadDraft(type) {
  const draft = StorageHelper.get(`zc_draft_${type}`);
  if (draft) {
    try {
      const parsed = JSON.parse(draft);
      
      let isOldSchema = false;
      if (type === 'daily' && parsed.produk && !parsed.produk.topMinuman) isOldSchema = true;
      if (type === 'weekly' && parsed.weekly && parsed.weekly.produk && !parsed.weekly.produk.topMinuman) isOldSchema = true;
      if (type === 'daily' && parsed.kebersihan && parsed.kebersihan.length > 8) isOldSchema = true;
      
      if (isOldSchema) {
        console.warn("Old draft schema detected. Clearing to prevent crash.");
        StorageHelper.remove(`zc_draft_${type}`);
        return false;
      }

      if (AppState.role === 'SPV' && AppState.outlet && parsed.outlet && parsed.outlet !== AppState.outlet) {
        console.warn("Draft outlet mismatch. Clearing cross-contaminated draft.");
        StorageHelper.remove(`zc_draft_${type}`);
        return false;
      }
      
      showToast("Melanjutkan draft yang belum terkirim...", "success");
      Object.assign(form, parsed);
      
      // BUGS FIX: Paksa timpa outlet dengan outlet dari PIN, supaya tidak menggunakan outlet lama dari draft
      if (AppState.role === 'SPV' && AppState.outlet) {
        form.outlet = AppState.outlet;
      }
      
      return true;
    } catch(e) {
      StorageHelper.remove(`zc_draft_${type}`);
    }
  }
  return false;
}

/*  === UTILS: PHOTO UPLOAD & COMPRESSION === */
async function uploadPhoto(fileInput, category, customFilename) {
  const file = fileInput.files[0];
  if (!file) return null;
  
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = async function() {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scaleSize;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        const filename = customFilename ? `${customFilename}.jpeg` : `${category}_${Date.now()}.jpg`;
        
        try {
          showLoading(true);
          const currentOutlet = AppState.outlet || StorageHelper.get('zc_last_outlet') || window.form.outlet || "Perintis";
          // Gunakan tanggal spesifik dari form, atau bulan dari form, jika tidak ada fallback ke hari ini
          const dateStr = window.form.tanggal || window.form.bulan || new Date().toISOString().split('T')[0];
          const res = await Server.call('api_uploadImage', dataUrl, filename, category, currentOutlet, dateStr);
          showLoading(false);
          
          if (res.success) {
            showToast("Foto berhasil diunggah!");
            resolve(res.url);
          } else {
            showToast("Gagal mengunggah foto.", "error");
            reject(res.error);
          }
        } catch (err) {
          showLoading(false);
          showToast("Error upload.", "error");
          reject(err);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function addBahanRow() { window.form.bahan.push({ nama: "", ketersediaan: "Habis", harga: 0, photoUrl: "" }); renderApp(); }
function removeBahanRow(idx) { window.form.bahan.splice(idx, 1); renderApp(); }
function updateBahanField(idx, field, value) { window.form.bahan[idx][field] = value; }
async function handleBahanPhoto(input, idx) {
  try {
    const row = window.form.bahan[idx];
    const dateStr = window.form.tanggal || new Date().toISOString().split('T')[0];
    const [year, month, day] = dateStr.split("-");
    const ddmmyy = day && month ? `${day}-${month}` : "UnknownDate";
    const itemName = row.nama ? row.nama.replace(/\s+/g, '') : "Bahan";
    const statusName = row.ketersediaan ? row.ketersediaan.replace(/\s+/g, '') : "Habis";
    const customFilename = `${ddmmyy}-${itemName}-${statusName}`;
    
    const url = await uploadPhoto(input, 'Nota Pengeluaran', customFilename);
    if (url) { updateBahanField(idx, 'photoUrl', url); renderApp(); }
  } catch (e) { console.error(e); }
}

window.validateFormCompletion = function(f) {
  if (!f.supervisor) return 'Nama Supervisor wajib diisi!';
  
  if (f.type === 'daily') {
    if (f.fase === 2) {
      if (!f.penjualan.shift2) return 'Omset Shift 2 wajib diisi!';
      if (!f.penjualan.transaksi) return 'Total transaksi wajib diisi!';
      return null; // Bypass kebersihan dll di fase 2
    }
    
    if (f.kebersihan) {
      const missed = f.kebersihan.filter(k => k.status === '');
      if (missed.length > 0) {
        return `Anda belum menginspeksi ${missed.length} item kebersihan! Wajib periksa semua area.`;
      }
      const kotorTanpaKet = f.kebersihan.filter(k => (k.status === 'Kotor' || k.skor < 80) && !k.ket.trim());
      if (kotorTanpaKet.length > 0) {
        return `Ada area Kotor (atau skor < 80) yang belum diberi keterangan alasan. Wajib diisi!`;
      }
    }
    
    if (f.fasilitas && f.fasilitas.length > 0) {
      if (f.fasilitas.some(fas => !fas.item || !fas.item.trim())) {
        return 'Nama fasilitas/alat yang bermasalah wajib diisi!';
      }
    }
    
    if (f.qc && f.qc.items && f.qc.items.length > 0) {
      if (f.qc.items.some(q => !q.nama)) {
        return 'Nama produk pada inspeksi QC wajib dipilih!';
      }
    }
  }
  
  if (f.type === 'weekly') {
    if (!f.periodeStart || !f.periodeEnd) return 'Periode laporan wajib diisi!';
    const diff = Math.ceil(Math.abs(new Date(f.periodeEnd) - new Date(f.periodeStart)) / (1000 * 60 * 60 * 24));
    if (diff !== 6) return 'Periode laporan harus tepat 7 hari!';
    if (f.weekly.staff.some(s => !s.status)) return 'Semua status evaluasi staff wajib diisi!';
    if (f.weekly.staff.some(s => !s.alasan)) return 'Alasan evaluasi staff wajib diisi!';
    if (!f.weekly.kendalaUtama) return 'Kendala Utama wajib diisi!';
  }
  return null;
};

/* ----- Modal Controllers ----- */
function exportPDF() {
  const f = window.form;
  const modal = document.getElementById('pdfPreviewModal');
  const body = document.getElementById('pdfPreviewBody');
  const subtitle = document.getElementById('pdfPreviewSubtitle');

  if (!f || !f.type) { showToast('Tidak ada data laporan.', 'error'); return; }
  
  const err = window.validateFormCompletion(f);
  if (err) { showToast(err, 'error'); return; }

  const jenis = f.type === 'daily' ? 'Harian' : f.type === 'weekly' ? 'Mingguan' : 'Bulanan';
  const periode = f.type === 'daily' ? f.tanggal : f.type === 'weekly' ? (f.periode || f.periodeStart) : f.bulan;
  subtitle.innerText = `Laporan ${jenis} · ${f.outlet || 'Perintis'} · ${periode || ''}`;

  body.innerHTML = buildPDFHtml(f);
  modal.classList.remove('hidden');
}

function getPDFFilename() {
  const f = window.form;
  const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
  
  if (f.type === 'daily') {
    const parts = (f.tanggal || "").split("-");
    if (parts.length === 3) {
      const monthName = months[parseInt(parts[1], 10) - 1].toLowerCase();
      return `${parts[2]}-${monthName}-laporan harian.pdf`;
    }
  } else if (f.type === 'weekly') {
    let startDD = "1", endDD = "7", monthName = "juli";
    if (f.periodeStart && f.periodeEnd) {
      const pStart = f.periodeStart.split("-");
      const pEnd = f.periodeEnd.split("-");
      if (pStart.length === 3 && pEnd.length === 3) {
        startDD = parseInt(pStart[2], 10);
        endDD = parseInt(pEnd[2], 10);
        monthName = months[parseInt(pStart[1], 10) - 1].toLowerCase();
      }
    }
    return `${startDD}-${endDD}-${monthName}-laporan mingguan.pdf`;
  } else if (f.type === 'monthly') {
    const parts = (f.bulan || "").split("-");
    let monthName = "juli";
    if (parts.length >= 2) {
      monthName = months[parseInt(parts[1], 10) - 1].toLowerCase();
    }
    return `${monthName}-laporan-bulanan.pdf`;
  }
  return "laporan.pdf";
}

async function createPdfContainer(htmlContent) {
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = htmlContent;
  // Fix blank screen bug: Must be in viewport, but behind everything
  tempDiv.style.position = 'fixed';
  tempDiv.style.top = '0';
  tempDiv.style.left = '0';
  tempDiv.style.width = '794px';
  tempDiv.style.zIndex = '-9999';
  tempDiv.style.backgroundColor = '#ffffff'; // Force white background
  document.body.appendChild(tempDiv);
  
  // Wait for fonts and styles to render properly before html2canvas captures
  await new Promise(resolve => setTimeout(resolve, 300));
  
  return tempDiv;
}

async function downloadPDF() {
  const f = window.form;
  if (!f || !f.type) { showToast('Tidak ada data laporan.', 'error'); return; }

  showLoading(true);
  const htmlContent = buildPDFHtml(f);
  const filename = getPDFFilename();

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(htmlContent).save().then(() => {
    showLoading(false);
    showToast('PDF berhasil disimpan!', 'success');
  }).catch(err => {
    showLoading(false);
    console.error(err);
    showToast('Gagal membuat PDF. Coba lagi.', 'error');
  });
}

async function sharePDF() {
  const f = window.form;
  if (!f || !f.type) { showToast('Tidak ada data laporan.', 'error'); return; }

  showLoading(true);
  const htmlContent = buildPDFHtml(f);
  const filename = getPDFFilename();

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  try {
    const pdfBlob = await html2pdf().set(opt).from(htmlContent).outputPdf('blob');
    showLoading(false);

    const file = new File([pdfBlob], filename, { type: 'application/pdf' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: filename.replace('.pdf', '').replace(/_/g, ' '),
        files: [file]
      });
      showToast('Laporan berhasil dibagikan!', 'success');
    } else {
      /* Fallback: download biasa untuk desktop */
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      showToast('PDF diunduh (berbagi tidak didukung di perangkat ini).', 'success');
    }
  } catch (err) {
    if (tempDiv.parentNode) document.body.removeChild(tempDiv);
    showLoading(false);
    if (err.name !== 'AbortError') {
      console.error(err);
      showToast('Gagal membagikan PDF.', 'error');
    }
  }
}

/* === MENU PICKER MODAL === */
let _menuPickerTargetCat = '';
let _menuPickerTargetField = '';
let _menuPickerTargetIndex = -1;

function openMenuPicker(category, targetField, targetIndex) {
  _menuPickerTargetCat = category.toLowerCase();
  _menuPickerTargetField = targetField; // "topMinuman", "bottomSnack", dll.
  _menuPickerTargetIndex = targetIndex;
  
  const modal = document.getElementById('menuPickerModal');
  const overlay = document.getElementById('menuPickerOverlay');
  const sheet = document.getElementById('menuPickerSheet');
  
  document.getElementById('menuPickerTitle').innerText = 'Pilih ' + category.charAt(0).toUpperCase() + category.slice(1);
  document.getElementById('menuPickerSubtitle').innerText = category.toUpperCase();
  document.getElementById('menuPickerSearch').value = '';
  
  renderMenuPickerList('');
  
  modal.classList.remove('hidden');
  setTimeout(() => {
    overlay.classList.remove('opacity-0');
    sheet.classList.remove('translate-y-full');
  }, 10);
}

function closeMenuPicker() {
  const overlay = document.getElementById('menuPickerOverlay');
  const sheet = document.getElementById('menuPickerSheet');
  
  overlay.classList.add('opacity-0');
  sheet.classList.add('translate-y-full');
  
  setTimeout(() => {
    document.getElementById('menuPickerModal').classList.add('hidden');
  }, 300);
}

function filterMenuPicker() {
  const q = document.getElementById('menuPickerSearch').value;
  renderMenuPickerList(q);
}

function renderMenuPickerList(query) {
  const container = document.getElementById('menuPickerList');
  const menus = AppState.masterMenu[_menuPickerTargetCat] || [];
  
  const filtered = menus.filter(m => m.toLowerCase().includes(query.toLowerCase()));
  
  if (filtered.length === 0) {
    container.innerHTML = `<div class="p-6 text-center text-gray-400 text-sm">Tidak ada menu ditemukan.</div>`;
    return;
  }
  
  let html = '';
  filtered.forEach(m => {
    html += `
      <button onclick="selectMenuItem('${m.replace(/'/g, "\\'")}')" class="px-3.5 py-2.5 bg-white text-[11px] font-bold text-gray-800 rounded-xl border border-gray-200 hover:border-zero-black active:scale-[0.96] transition-all shadow-sm flex-shrink-0">
        ${m}
      </button>
    `;
  });
  container.innerHTML = html;
}

function selectMenuItem(menuName) {
  closeMenuPicker();
  
  // Update state directly via string reference hack or switch
  if (AppState.menu === 'form_daily') {
    if (_menuPickerTargetField === 'qc') {
       updateQcField(_menuPickerTargetIndex, 'nama', menuName);
    } else if (form.produk[_menuPickerTargetField] && form.produk[_menuPickerTargetField][_menuPickerTargetIndex]) {
       form.produk[_menuPickerTargetField][_menuPickerTargetIndex].nama = menuName;
    }
  } else if (AppState.menu === 'form_weekly') {
    if (form.weekly.produk[_menuPickerTargetField] && form.weekly.produk[_menuPickerTargetField][_menuPickerTargetIndex]) {
       form.weekly.produk[_menuPickerTargetField][_menuPickerTargetIndex].nama = menuName;
    }
  } else if (AppState.menu === 'form_monthly') {
    if (form.monthly.produk[_menuPickerTargetField] && form.monthly.produk[_menuPickerTargetField][_menuPickerTargetIndex]) {
       form.monthly.produk[_menuPickerTargetField][_menuPickerTargetIndex].nama = menuName;
    }
  }
  
  // Update DOM directly to avoid re-rendering and losing accordion state!
  const inputId = `input-${_menuPickerTargetCat}-${_menuPickerTargetField}-${_menuPickerTargetIndex}`;
  const inputEl = document.getElementById(inputId);
  if (inputEl) {
    inputEl.value = menuName;
  }
}

function openGMSettings() {
  const modal = document.getElementById('modalGMSettings');
  const content = document.getElementById('modalGMSettingsContent');
  const yearInput = document.getElementById('gmSettingYear');
  const targetInput = document.getElementById('gmSettingTarget');
  
  if (modal && content) {
    const currentYear = AppState.activeFilters.startDate ? AppState.activeFilters.startDate.substring(0, 4) : new Date().getFullYear().toString();
    yearInput.value = currentYear;
    
    // Set current target if available in dashboard data
    if (AppState.dashboardData && AppState.dashboardData.targetYTD) {
      targetInput.value = 'Rp ' + new Intl.NumberFormat('id-ID').format(AppState.dashboardData.targetYTD);
    } else {
      targetInput.value = '';
    }
    
    modal.classList.remove('hidden');
    setTimeout(() => {
      content.classList.remove('translate-y-full');
    }, 10);
  }
}

function closeGMSettings() {
  const modal = document.getElementById('modalGMSettings');
  const content = document.getElementById('modalGMSettingsContent');
  
  if (modal && content) {
    content.classList.add('translate-y-full');
    setTimeout(() => {
      modal.classList.add('hidden');
    }, 300);
  }
}

function saveGMSettings() {
  const year = document.getElementById('gmSettingYear').value;
  const targetRaw = document.getElementById('gmSettingTarget').value;
  const target = parseRupiah(targetRaw);
  
  if (!target || target <= 0) {
    showToast('Silakan masukkan target yang valid', 'error');
    return;
  }
  
  const btnText = document.getElementById('btnSaveGMSettingsText');
  const btnLoader = document.getElementById('btnSaveGMSettingsLoader');
  
  btnText.classList.add('opacity-0');
  btnLoader.classList.remove('hidden');
  
  const payload = { year: year, target: target };
  
  apiSaveGMSettings(payload, (resStr) => {
    btnText.classList.remove('opacity-0');
    btnLoader.classList.add('hidden');
    
    try {
      const res = JSON.parse(resStr);
      if (res.status === 'success') {
        showToast(res.message, 'success');
        closeGMSettings();
        // Refresh dashboard immediately
        if (typeof fetchGMAnalytics === 'function') {
          fetchGMAnalytics();
        }
      } else {
        showToast(res.error || 'Gagal menyimpan pengaturan', 'error');
      }
    } catch (e) {
      showToast('Gagal memproses respon server', 'error');
    }
  }, (err) => {
    btnText.classList.remove('opacity-0');
    btnLoader.classList.add('hidden');
    showToast('Terjadi kesalahan jaringan', 'error');
  });
}

window.startParameterForm = function() {
