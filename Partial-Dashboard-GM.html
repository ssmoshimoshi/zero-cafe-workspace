<!-- Partial-Dashboard-GM.html -->
<script>
window.getDashboardGMTemplate = function() {
  const months = [
    "Januari", "Februari", "Maret", "April", "Mei", "Juni",
    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
  ];
  
  const years = ["2026", "2027", "2028"];
  
  let reportsHtml = "";
  let statsHtml = "";
  let topProdukHtml = "";
  
  if (AppState.dashboardData) {
    const data = AppState.dashboardData;
      const op = data.operasionalData || {
        isFallback: true, kepatuhanSop: 0, totalTelat: 0, totalTeguran: 0,
        kendalaUtama: "Data bulanan belum ditarik.", eskalasiFasilitas: "-", strategiDepan: "-",
        kebutuhanGM: "-", pencapaian: "-", tantangan: "-", skill: "-"
      };
      const salesPercent = data.targetOmset > 0 ? Math.round((data.omsetTotal / data.targetOmset) * 100) : 0;
      
      statsHtml = `
        <div class="grid grid-cols-2 gap-3 mb-6">
          <!-- Sales Card -->
          <div class="col-span-2 bg-zero-black p-5 rounded-2xl text-white shadow-md">
            <div class="flex justify-between items-start mb-2">
              <span class="text-[10px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Total Omset & Target</span>
              ${op.isFallback ? '<span class="text-[8px] bg-gray-800 text-gray-400 px-2 py-1 rounded-full">Snapshot Mingguan</span>' : ''}
            </div>
            <div class="flex items-end justify-between mb-3">
              <span class="text-2xl font-extrabold">Rp ${data.omsetTotal.toLocaleString()}</span>
              <span class="text-xs font-bold text-gray-400">/ Rp ${data.targetOmset.toLocaleString()}</span>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-1.5 mb-1">
              <div class="bg-emerald-500 h-1.5 rounded-full" style="width: ${Math.min(salesPercent, 100)}%"></div>
            </div>
            <span class="text-[9px] font-bold text-gray-400">${salesPercent}% Tercapai</span>
          </div>

          <!-- SOP Card -->
          <div class="bg-white p-4 rounded-2xl border border-gray-200 flex flex-col justify-center items-center text-center">
            <span class="text-[9px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Kepatuhan SOP</span>
            <span class="text-xl font-extrabold text-zero-black">${op.kepatuhanSop}%</span>
          </div>

          <!-- Complaint Card -->
          <div class="bg-white p-4 rounded-2xl border border-gray-200 flex flex-col justify-center items-center text-center">
            <span class="text-[9px] text-gray-400 uppercase tracking-widest block font-bold mb-1">Total Kasus QC</span>
            <span class="text-xl font-extrabold ${data.komplainTotal > 0 ? 'text-red-500' : 'text-zero-black'}">${data.komplainTotal}</span>
          </div>
        </div>
      `;
      
      let kesehatanHtml = `
        <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4 border-b border-gray-100 pb-2">
            KESEHATAN TIM & ASET
          </h3>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-center">
              <span class="block text-[8px] font-bold text-gray-400 uppercase mb-1">Total Telat</span>
              <span class="text-lg font-black text-zero-black">${op.totalTelat} <span class="text-[9px] font-normal text-gray-400">kali</span></span>
            </div>
            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-center">
              <span class="block text-[8px] font-bold text-gray-400 uppercase mb-1">Teguran (SP)</span>
              <span class="text-lg font-black ${op.totalTeguran > 0 ? 'text-red-500' : 'text-zero-black'}">${op.totalTeguran} <span class="text-[9px] font-normal text-gray-400">kali</span></span>
            </div>
          </div>
          
          <div class="mb-4">
            <span class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Penyebab Kendala Staff Utama</span>
            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-xs text-zero-black leading-relaxed">
              ${op.kendalaUtama || '-'}
            </div>
          </div>
          
          <div>
            <span class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Eskalasi Fasilitas Kritis</span>
            <div class="bg-red-50 p-3 rounded-xl border border-red-100 text-xs text-red-700 font-medium leading-relaxed">
              ${op.eskalasiFasilitas || '-'}
            </div>
          </div>
        </div>
      `;

      let strategiHtml = `
        <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4 border-b border-gray-100 pb-2">
            PANDANGAN KE DEPAN & EVALUASI SPV
          </h3>
          
          <div class="space-y-4">
            <div>
              <span class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Strategi Bulan Depan</span>
              <div class="text-xs text-zero-black leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100">
                ${op.strategiDepan || '-'}
              </div>
            </div>
            
            <div>
              <span class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Kebutuhan Approval GM</span>
              <div class="text-xs text-zero-black leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100">
                ${op.kebutuhanGM || '-'}
              </div>
            </div>
            
            <div class="pt-3 border-t border-gray-100">
              <span class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Evaluasi Mandiri SPV</span>
              <div class="grid grid-cols-1 gap-2">
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                  <span class="block text-[8px] font-bold text-gray-400 uppercase mb-1">Pencapaian Terbaik</span>
                  <p class="text-[10px] text-zero-black">${op.pencapaian || '-'}</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                  <span class="block text-[8px] font-bold text-gray-400 uppercase mb-1">Tantangan Tersulit</span>
                  <p class="text-[10px] text-zero-black">${op.tantangan || '-'}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    
    if (data.listLaporan.length === 0) {
      reportsHtml = `
        <div class="py-12 text-center text-gray-400">
          <p class="text-[10px] uppercase font-bold tracking-widest">Tidak ada arsip laporan.</p>
        </div>
      `;
    } else {
      reportsHtml = `
        <div class="space-y-3">
          ${data.listLaporan.map(item => `
            <div class="flex justify-between items-center p-4 bg-gray-50 border border-gray-100 rounded-2xl">
              <div>
                <h4 class="font-bold text-zero-black text-xs">${item.name}</h4>
                <p class="text-[10px] text-gray-400 font-bold mt-1">Upload: ${item.dateCreated}</p>
              </div>
              <a href="${item.url}" target="_blank" class="px-4 py-2 border border-gray-200 bg-white hover:bg-gray-100 text-zero-black rounded-full text-[10px] font-bold transition-all">
                PDF
              </a>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    const pData = data.productsData || { minuman: { top: [], bottom: [] }, makanan: { top: [], bottom: [] }, snack: { top: [], bottom: [] } };
    
    const renderCategorySection = (catTitle, catKey) => {
      const topItems = pData[catKey].top || [];
      const bottomItems = pData[catKey].bottom || [];
      const maxTop = topItems.length > 0 ? topItems[0].terjual : 1;
      
      return `
        <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4 border-b border-gray-100 pb-2">
            EVALUASI PRODUK ${catTitle.toUpperCase()}
          </h3>
          
          <div class="space-y-4">
            <div>
              <span class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Top 5 Terlaris</span>
              ${topItems.length === 0 ? '<p class="text-[10px] text-gray-400 py-2">Tidak ada data Top 5.</p>' : `
                <div class="space-y-3">
                  ${topItems.map((item, idx) => `
                    <div class="flex items-center gap-3">
                      <span class="w-5 h-5 rounded-full bg-gray-100 text-[9px] font-bold text-gray-500 flex items-center justify-center flex-shrink-0">${idx + 1}</span>
                      <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                          <span class="text-xs font-bold text-zero-black">${item.nama}</span>
                          <span class="text-xs font-extrabold text-zero-black">${item.terjual} <span class="text-[9px] font-normal text-gray-400">cup/porsi</span></span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-1.5">
                          <div class="bg-zero-black h-1.5 rounded-full" style="width: ${idx === 0 ? '100' : Math.round((item.terjual / maxTop) * 100)}%"></div>
                        </div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>

            <div class="pt-3 border-t border-gray-50">
              <span class="block text-[9px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Bottom 3 & Rencana Tindakan</span>
              ${bottomItems.length === 0 ? '<p class="text-[10px] text-gray-400 py-2">Tidak ada data Bottom 3.</p>' : `
                <div class="space-y-3">
                  ${bottomItems.map((item, idx) => `
                    <div class="bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                      <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-2">
                          <span class="text-[9px] font-extrabold text-gray-400 w-3">${idx + 1}</span>
                          <span class="text-xs font-bold text-zero-black">${item.nama}</span>
                        </div>
                        <span class="text-xs font-extrabold text-red-500">${item.terjual} <span class="text-[9px] font-normal text-gray-400">cup/porsi</span></span>
                      </div>
                      ${item.rencana ? `
                        <div class="text-[10px] text-gray-500 leading-relaxed pl-3 mt-2 border-l-2 border-gray-300">
                          <strong>Rencana:</strong> ${item.rencana}
                        </div>
                      ` : `
                        <div class="text-[9px] text-red-500 font-bold leading-relaxed pl-3 mt-2 border-l-2 border-red-400">
                          ! TIDAK ADA RENCANA TINDAKAN DARI SPV
                        </div>
                      `}
                    </div>
                  `).join('')}
                </div>
              `}
            </div>
          </div>
        </div>
      `;
    };

    topProdukHtml = `
      <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
        <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-3 border-b border-gray-100 pb-2">
          ANALISIS PERFORMA PRODUK
        </h3>
        <div class="bg-gray-50 border-l-4 border-zero-black p-3 rounded-xl">
          <p class="text-[9px] text-zero-black leading-relaxed font-medium">
            Catatan Analisis: Tren penjualan ini diakumulasikan murni dari Laporan Mingguan/Bulanan (Sinkronisasi POS Zero). Data Laporan Harian sengaja tidak diakumulasikan di sini untuk menghindari selisih angka dan memastikan GM mendapatkan data riil 100%.
          </p>
        </div>
      </div>
      ${renderCategorySection("Minuman", "minuman")}
      ${renderCategorySection("Makanan", "makanan")}
      ${renderCategorySection("Snack", "snack")}
    `;
    
  } else {
    statsHtml = `
      <div class="py-12 text-center text-gray-400">
        <p class="text-[10px] font-bold tracking-widest uppercase">Pilih filter dan tarik data</p>
      </div>
    `;
    reportsHtml = "";
  }

  return `
    <div class="w-full min-h-screen pb-24 bg-[#f3f4f6]">
      <div class="bg-white px-6 py-4 flex justify-between items-center sticky top-0 z-20 border-b border-gray-200 shadow-sm">
        <div>
          <h2 class="text-sm font-extrabold text-zero-black">DASHBOARD GM</h2>
          <p class="text-[10px] font-bold text-gray-400">Zero Cafe Analytics</p>
        </div>
        <button type="button" onclick="handleLogin('')" class="px-3 py-1 border border-gray-200 rounded-full text-[10px] font-bold text-gray-400 hover:bg-gray-50 transition-all">
          KELUAR
        </button>
      </div>

      <div class="px-4 mt-6">
        <!-- Welcome Header -->
        <div class="mb-6">
          
          <!-- Filter Controls -->
          <div class="flex flex-col gap-3 bg-white p-4 rounded-2xl border border-gray-200">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2 mb-2">Filter Data</h3>
            <div class="flex gap-2">
              <select id="filterOutlet" class="flex-1 px-3 py-2 text-xs font-bold text-zero-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                <option value="Semua" ${!AppState.activeFilters.outlet || AppState.activeFilters.outlet === 'Semua' ? 'selected' : ''}>Semua Outlet</option>
                <option value="Perintis" ${AppState.activeFilters.outlet === 'Perintis' ? 'selected' : ''}>Perintis</option>
                <option value="Dg Tata" ${AppState.activeFilters.outlet === 'Dg Tata' ? 'selected' : ''}>Dg Tata</option>
              </select>
              <select id="filterMonth" class="flex-1 px-3 py-2 text-xs font-bold text-zero-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                ${months.map(m => `<option value="${m}" ${AppState.activeFilters.month === m ? 'selected' : ''}>${m}</option>`).join('')}
              </select>
              <select id="filterYear" class="flex-1 px-3 py-2 text-xs font-bold text-zero-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                ${years.map(y => `<option value="${y}" ${AppState.activeFilters.year === y ? 'selected' : ''}>${y}</option>`).join('')}
              </select>
            </div>
            <button onclick="fetchGMAnalytics()" class="w-full mt-2 py-3 bg-zero-black hover:bg-gray-800 text-white rounded-xl text-[10px] font-bold tracking-widest transition-all uppercase">
              Tarik Data
            </button>
          </div>
        </div>

        <!-- Stats Grid -->
        ${statsHtml}
        
        <!-- Tren Produk (Hanya jika data ditarik) -->
        ${topProdukHtml}

        <!-- Tier 3: Kesehatan Tim & Aset -->
        ${AppState.dashboardData ? kesehatanHtml : ''}

        <!-- Tier 4: Strategi ke Depan -->
        ${AppState.dashboardData ? strategiHtml : ''}

        <!-- PDF Archives -->
        ${AppState.dashboardData ? `
          <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">
              Arsip PDF (${AppState.activeFilters.month} ${AppState.activeFilters.year})
            </h3>
            ${reportsHtml}
          </div>
        ` : ''}

        <!-- Pengaturan Sistem -->
        <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest border-b border-gray-100 pb-2 mb-4">Pengaturan Sistem</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Target Folder GDrive ID</label>
              <p class="text-[10px] text-gray-500 mb-2">Semua file PDF laporan akan disimpan di dalam folder ini.</p>
              <div class="flex gap-2">
                <input type="text" id="targetFolderId" value="${(AppState.dashboardData && AppState.dashboardData.currentFolderId) ? AppState.dashboardData.currentFolderId : ''}" class="flex-1 px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black transition-colors" placeholder="Masukkan ID Folder GDrive baru">
                <button type="button" onclick="updateFolderId()" class="px-4 py-2 bg-zero-black text-white font-bold rounded-xl text-xs hover:bg-gray-800 transition-colors">Simpan</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;
}

async function updateFolderId() {
  const input = document.getElementById('targetFolderId');
  const newId = input.value.trim();
  
  if (!newId) {
    showToast("ID Folder tidak boleh kosong", "error");
    return;
  }
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_updateFolderId', newId);
    if (res.success) {
      showToast("Berhasil! Folder: " + res.folderName);
      if (AppState.dashboardData) {
        AppState.dashboardData.currentFolderId = newId;
      }
    } else {
      showToast("Gagal: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}

async function fetchGMAnalytics() {
  const outlet = document.getElementById('filterOutlet').value;
  const month = document.getElementById('filterMonth').value;
  const year = document.getElementById('filterYear').value;
  
  AppState.activeFilters.outlet = outlet;
  AppState.activeFilters.month = month;
  AppState.activeFilters.year = year;
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_fetchReports', month, year, outlet);
    if (res.status === 'success') {
      AppState.dashboardData = res.data;
      showToast("Data analitik berhasil diperbarui.");
    } else {
      showToast("Gagal menarik data: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
    renderApp();
  }
}
</script>
