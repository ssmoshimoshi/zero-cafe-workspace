/*  === STORAGE HELPER (BUG FIX: Mengatasi SecurityError localStorage di Iframe GAS) === */
const StorageHelper = {
  memory: {},
  get: function(key) {
    try { return localStorage.getItem(key) || sessionStorage.getItem(key) || this.memory[key]; } 
    catch(e) { 
      try { return sessionStorage.getItem(key) || this.memory[key]; }
      catch(err) { return this.memory[key]; }
    }
  },
  set: function(key, value) {
    try { localStorage.setItem(key, value); return; } catch(e) {}
    try { sessionStorage.setItem(key, value); return; } catch(e) {}
    this.memory[key] = value;
  },
  remove: function(key) {
    try { localStorage.removeItem(key); } catch(e) {}
    try { sessionStorage.removeItem(key); } catch(e) {}
    delete this.memory[key];
  }
};

/*  === BOOTSTRAP / INITIALIZATION === */
function bootstrapApp() {
  const root = document.getElementById('app-root');
  
  if (!root) {
    console.warn("DOM 'app-root' belum siap, menunda bootstrap...");
    setTimeout(bootstrapApp, 50);
    return;
  }
  
  if (window.__appInitialized) return;
  window.__appInitialized = true;
  
  try {
    const savedRole = StorageHelper.get('zc_role');
    if (savedRole) {
      AppState.role = savedRole;
      AppState.menu = savedRole === 'SPV' ? 'select_report' : 'dashboard_gm';
    } else {
      AppState.role = null;
      AppState.menu = 'login';
    }
    
    renderApp();
    
    showLoading(true);
    fetchMasterStaff().finally(() => {
      showLoading(false);
    });
  } catch (e) {
    console.error("Bootstrap Error:", e);
  }
}

/*  Jalankan langsung dan daftarkan juga ke event listeners untuk memastikan eksekusi di berbagai lingkungan browser / GAS */

/*  === TOAST NOTIFICATIONS === */
function showToast(message, type = "success") {
  const toast = document.getElementById('toastNotification');
  if (!toast) {
    console.warn("Toast diabaikan (DOM belum siap):", message);
    return;
  }
  
  toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-2xl z-50 transition-all duration-300 transform translate-y-0 opacity-100 ${
    type === 'success' ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white'
  }`;
  toast.innerHTML = `<div class="flex items-center space-x-2">
    <span>${message}</span>
  </div>`;
  
  setTimeout(() => {
    if (toast) { /*  Pengaman tambahan */
      toast.className = "fixed bottom-5 right-5 px-6 py-3 rounded-2xl z-50 transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none";
    }
  }, 4000);
}

function showLoading(show) {
  AppState.isLoading = show;
  const spinner = document.getElementById('loadingSpinner');
  if (!spinner) return;
  
  if (show) {
    spinner.classList.remove('hidden');
  } else {
    spinner.classList.add('hidden');
  }
}

/*  === TEMPLATE RENDERING & ROUTER === */
function renderApp() {
  const root = document.getElementById('app-root');
  if (!root) return; /*  Sudah ditangani oleh bootstrapApp */
  
  try {
    let html = "";
    if (AppState.menu === 'login') html = getLoginTemplate();
    else if (AppState.menu === 'select_report') html = getMenuSPVTemplate();
    else if (AppState.menu === 'form_daily') html = getDailyFormTemplate();
    else if (AppState.menu === 'form_weekly') html = getWeeklyFormTemplate();
    else if (AppState.menu === 'form_monthly') html = getMonthlyFormTemplate();
    else if (AppState.menu === 'dashboard_gm') html = getDashboardGMTemplate();
    root.innerHTML = html;
    bindEvents();
    
    setTimeout(() => {
      const activeTabBtn = document.getElementById('activeTabBtn');
      if (activeTabBtn) {
        activeTabBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 50);
  } catch (err) {
    console.error("Render Error:", err);
    if (err.name === "ReferenceError" || (err.message && err.message.includes("not a function"))) {
      showToast("Error Sistem: Komponen form tidak ditemukan.", "error");
    } else {
      showToast("Sistem mendeteksi data rusak. Mereset draft window.form.", "error");
      StorageHelper.remove('zc_draft_daily');
      StorageHelper.remove('zc_draft_weekly');
      StorageHelper.remove('zc_draft_monthly');
    }
    
    /*  Fallback to menu safely */
    AppState.menu = 'select_report';
    if (root) {
      root.innerHTML = getMenuSPVTemplate();
      bindEvents();
    }
  }
}

  if (html.classList.contains('dark')) {
    html.classList.remove('dark');
    StorageHelper.set('zc_theme', 'light');
  } else {
    html.classList.add('dark');
    StorageHelper.set('zc_theme', 'dark');
  }
}

function addSelectedStaff() {
  const select = document.getElementById('staffSelectDropdown');
  if (!select) return;
  const nama = select.value;
  if (!nama) return;
  
  if (window.form.staff.some(s => s.nama === nama)) return;
  
  const master = AppState.masterStaff.find(s => s.nama === nama);
  if (master) {
    window.form.staff.push({
      nama: master.nama,
      posisi: master.posisi,
      status: "Hadir",
      keramahan: false,
      keterangan: ""
    });
    renderApp();
  }
}

function removeStaffRow(idx) {
  window.form.staff.splice(idx, 1);
  renderApp();

function saveDraft(quiet = false) {
  if (window.form.type === 'daily' || window.form.type === 'weekly' || window.form.type === 'monthly') {
    StorageHelper.set(`zc_draft_${window.form.type}`, JSON.stringify(form));
    if (!quiet) showToast("Draft berhasil disimpan!");
  }
}

function loadDraft(type) {
  const draft = StorageHelper.get(`zc_draft_${type}`);
  if (draft) {
    showToast("Melanjutkan draft yang belum terkirim...", "success");
    Object.assign(form, JSON.parse(draft));
    return true;
  }
  return false;
}

/*  === UTILS: PHOTO UPLOAD & COMPRESSION === */
async function uploadPhoto(fileInput, category) {
  const file = fileInput.files[0];
  if (!file) return null;
  
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = async function() {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scaleSize;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        const filename = `${category}_${Date.now()}.jpg`;
        
        try {
          showLoading(true);
          const res = await Server.call('api_uploadImage', dataUrl, filename, category);
          showLoading(false);
          
          if (res.success) {
            showToast("Foto berhasil diunggah!");
            resolve(res.url);
          } else {
            showToast("Gagal mengunggah foto.", "error");
            reject(res.error);
          }
        } catch (err) {
          showLoading(false);
          showToast("Error upload.", "error");
          reject(err);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

                </div>
                <div class="mb-2">
                  <input type="text" value="${row.isi}" onchange="updateFeedbackField(${idx}, 'isi', this.value)" placeholder="Isi komplain/keluhan" class="w-full px-2 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none">
                </div>
                <div class="mb-2">
                  <input type="text" value="${row.respon}" onchange="updateFeedbackField(${idx}, 'respon', this.value)" placeholder="Tindakan penyelesaian tim" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-yellow-50/50">
                </div>
                <div class="flex items-center gap-4 px-1">
                  <label class="flex items-center gap-2 text-[10px] font-bold text-gray-500">
                    <input type="checkbox" ${row.remake ? 'checked' : ''} onchange="updateFeedbackField(${idx}, 'remake', this.checked)"> Remake
                  </label>
                  <label class="flex items-center gap-2 text-[10px] font-bold text-red-500">
                    <input type="checkbox" ${row.eskalasi ? 'checked' : ''} onchange="updateFeedbackField(${idx}, 'eskalasi', this.checked)"> Eskalasi GM
                  </label>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    case 7:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">FASILITAS & ALAT</h3>
            <button type="button" onclick="addFasilitasRow()" class="px-3 py-1 bg-zero-black text-white text-[8px] font-bold rounded-lg hover:bg-gray-800 transition-all">TAMBAH</button>
          </div>
          
          <div class="space-y-4">
            ${window.form.fasilitas.length === 0 ? `<p class="text-[10px] text-center text-gray-400 py-4">Fasilitas aman. Tekan tambah jika ada kendala.</p>` : ''}
            ${window.form.fasilitas.map((row, idx) => `
              <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/30">
                <div class="flex justify-between items-center mb-2">
                  <input type="text" value="${row.item}" onchange="updateFasilitasField(${idx}, 'item', this.value)" placeholder="Nama Alat / Fasilitas" class="flex-1 px-2 py-1.5 text-sm font-bold border border-gray-200 rounded-lg focus:outline-none">
                  <button type="button" onclick="removeFasilitasRow(${idx})" class="text-[10px] font-bold text-red-500 hover:text-red-700 ml-3">HAPUS</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                   <select onchange="updateFasilitasField(${idx}, 'status', this.value)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                      <option value="Rusak Ringan" ${row.status === 'Rusak Ringan' ? 'selected' : ''}>Rusak Ringan</option>
                      <option value="Rusak Sedang" ${row.status === 'Rusak Sedang' ? 'selected' : ''}>Rusak Sedang</option>
                      <option value="Rusak Berat" ${row.status === 'Rusak Berat' ? 'selected' : ''}>Rusak Berat (Mati)</option>
                   </select>
                   <label class="flex items-center justify-center gap-2 text-[10px] font-bold text-red-500 border border-gray-200 rounded-lg bg-white">
                    <input type="checkbox" ${row.eskalasi ? 'checked' : ''} onchange="updateFasilitasField(${idx}, 'eskalasi', this.checked)"> Eskalasi
                  </label>
                </div>
                <div class="mb-2">
                  <input type="text" value="${row.keterangan || ''}" onchange="updateFasilitasField(${idx}, 'keterangan', this.value)" placeholder="Keterangan singkat..." class="w-full px-2 py-1 text-xs border border-gray-200 rounded-lg focus:outline-none">
                </div>
                <div class="text-right">
                  ${row.photoUrl ? 
                    '<a href="' + row.photoUrl + '" target="_blank" class="text-[10px] font-bold text-blue-500 underline mr-2">Lihat Foto</a>' +
                    '<button type="button" onclick="updateFasilitasField(' + idx + ', &apos;photoUrl&apos;, &apos;&apos;)" class="text-[10px] font-bold text-red-500">Hapus Foto</button>'
                  : 
                    '<label class="cursor-pointer text-[10px] font-bold text-gray-500 hover:text-zero-black">' +
                      '+ Unggah Foto' +
                      '<input type="file" accept="image/jpeg,image/png,image/gif" capture="environment" class="hidden" onchange="handleFasilitasPhoto(this, ' + idx + ')">' +
                    '</label>'
                  }
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
            <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">BAHAN & ATK HABIS</h3>
            <button type="button" onclick="addBahanRow()" class="px-3 py-1 bg-zero-black text-white text-[8px] font-bold rounded-lg hover:bg-gray-800 transition-all">TAMBAH</button>
          </div>
          
          <div class="space-y-4">
            ${window.form.bahan.length === 0 ? `<p class="text-[10px] text-center text-gray-400 py-4">Bahan terpantau cukup.</p>` : ''}
            ${window.form.bahan.map((row, idx) => `
              <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/30">
                <div class="flex justify-between items-center mb-2">
                  <input type="text" value="${row.nama}" onchange="updateBahanField(${idx}, 'nama', this.value)" placeholder="Nama Bahan (Cth: Sabun)" class="flex-1 px-2 py-1.5 text-sm font-bold border border-gray-200 rounded-lg focus:outline-none">
                  <button type="button" onclick="removeBahanRow(${idx})" class="text-[10px] font-bold text-red-500 hover:text-red-700 ml-3">HAPUS</button>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                   <input type="text" value="${row.ketersediaan}" onchange="updateBahanField(${idx}, 'ketersediaan', this.value)" placeholder="Status Cth: Habis/Sisa 1" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none">
                   <input type="number" value="${row.harga}" onchange="updateBahanField(${idx}, 'harga', Number(this.value))" placeholder="Estimasi Rp" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none">
                </div>
                <div class="text-right">
                  ${row.photoUrl ? 
                    '<a href="' + row.photoUrl + '" target="_blank" class="text-[10px] font-bold text-blue-500 underline mr-2">Lihat Foto</a>' +
                    '<button type="button" onclick="updateBahanField(' + idx + ', &apos;photoUrl&apos;, &apos;&apos;)" class="text-[10px] font-bold text-red-500">Hapus Foto</button>'
                  : 
                    '<label class="cursor-pointer text-[10px] font-bold text-gray-500 hover:text-zero-black">' +
                      '+ Unggah Bukti' +
                      '<input type="file" accept="image/jpeg,image/png,image/gif" capture="environment" class="hidden" onchange="handleBahanPhoto(this, ' + idx + ')">' +
                    '</label>'
                  }
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    case 8:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4 space-y-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">PENUTUP & KESIMPULAN</h3>
          
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">KENDALA UTAMA HARI INI</label>
            <textarea onchange="window.form.penutup.kendala = this.value" placeholder="Tuliskan jika ada kendala besar..." class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none h-24">${window.form.penutup.kendala}</textarea>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">REKOMENDASI / SARAN</label>
            <textarea onchange="window.form.penutup.rekomendasi = this.value" placeholder="Saran perbaikan operasional..." class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none h-24">${window.form.penutup.rekomendasi}</textarea>
          </div>
        </div>

        <div class="flex flex-col gap-3 mt-8 mb-8">
          <div class="flex gap-3">
            <button type="button" onclick="saveDraft()" class="flex-1 py-3 border border-zero-black rounded-2xl text-xs font-bold text-zero-black hover:bg-gray-50 transition-all">SIMPAN DRAFT</button>
            <button type="button" onclick="exportPDF()" class="flex-1 py-3 border border-zero-black rounded-2xl text-xs font-bold text-zero-black hover:bg-gray-50 transition-all">EXPORT PDF</button>
          </div>
          <button type="button" onclick="openPreviewModal()" class="w-full py-4 bg-zero-black text-white rounded-2xl text-sm font-bold hover:bg-gray-800 transition-all shadow-md">TINJAU & KIRIM LAPORAN</button>
        </div>
      `;
  }
}

function addAuditRow() { window.form.kas.audit.push({ jam: "12:00", aktual: 0, qris: 0, tunai: 0, keterangan: "" }); renderApp(); }
function removeAuditRow(idx) { window.form.kas.audit.splice(idx, 1); renderApp(); }
function updateAuditField(idx, field, value) { window.form.kas.audit[idx][field] = value; }
function updateStaffField(idx, field, value) { window.form.staff[idx][field] = value; }
function addQcRow() { window.form.qc.items.push({ jam: "12:00", nama: "", status: "Baik", keterangan: "" }); renderApp(); }
function removeQcRow(idx) { window.form.qc.items.splice(idx, 1); renderApp(); }
function updateQcField(idx, field, value) { window.form.qc.items[idx][field] = value; }
function addFeedbackRow() { window.form.feedback.items.push({ jam: "12:00", inisial: "", isi: "", remake: false, eskalasi: false, respon: "" }); renderApp(); }
function removeFeedbackRow(idx) { window.form.feedback.items.splice(idx, 1); renderApp(); }
function updateFeedbackField(idx, field, value) { window.form.feedback.items[idx][field] = value; }
function updateTotalRemake(value) { window.form.feedback.totalRemake = value; renderApp(); }
function addFasilitasRow() { window.form.fasilitas.push({ item: "", status: "Rusak Ringan", eskalasi: false, keterangan: "", photoUrl: "" }); renderApp(); }
function removeFasilitasRow(idx) { window.form.fasilitas.splice(idx, 1); renderApp(); }
function updateFasilitasField(idx, field, value) { window.form.fasilitas[idx][field] = value; }
async function handleFasilitasPhoto(input, idx) {
  try {
    const url = await uploadPhoto(input, 'Fasilitas');
    if (url) { updateFasilitasField(idx, 'photoUrl', url); renderApp(); }
  } catch (e) { console.error(e); }
}
function addBahanRow() { window.form.bahan.push({ nama: "", ketersediaan: "Habis", harga: 0, photoUrl: "" }); renderApp(); }
function removeBahanRow(idx) { window.form.bahan.splice(idx, 1); renderApp(); }
function updateBahanField(idx, field, value) { window.form.bahan[idx][field] = value; }
async function handleBahanPhoto(input, idx) {
  try {
    const url = await uploadPhoto(input, 'Bahan');
    if (url) { updateBahanField(idx, 'photoUrl', url); renderApp(); }
  } catch (e) { console.error(e); }
}

</script>
