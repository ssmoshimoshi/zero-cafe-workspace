<script>
function getWeeklyFormTemplate() {
  const tabs = [
    { num: 1, label: "SALES & PRODUK" },
    { num: 2, label: "STAFF & KENDALA" },
    { num: 3, label: "RENCANA" }
  ];

  return `
    <div class="w-full min-h-screen pb-24 bg-[#f3f4f6]">
      <div class="bg-white px-6 py-4 flex justify-between items-center sticky top-0 z-20 border-b border-gray-200 shadow-sm">
        <div>
          <h2 class="text-sm font-extrabold text-zero-black">LAPORAN MINGGUAN</h2>
          <p class="text-[10px] font-bold text-gray-400">${window.form.periode || 'Periode Baru'}</p>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" onclick="confirmResetForm()" class="p-2 border border-gray-200 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all" title="Reset Laporan">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
          <button type="button" onclick="goBackMenu()" class="px-3 py-1.5 border border-gray-200 rounded-full text-[10px] font-bold text-gray-400 hover:bg-gray-50 transition-all">
            KEMBALI
          </button>
        </div>
      </div>
      <div class="bg-white border-b border-gray-200 px-4 py-3 mb-4 sticky top-[65px] z-10">
        <div class="flex overflow-x-auto space-x-2 scrollbar-hide py-1">
          ${tabs.map(t => `
            <button type="button" ${AppState.currentTab === t.num ? 'id="activeTabBtn"' : ''} onclick="switchTab(${t.num})" class="px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all duration-200 ${AppState.currentTab === t.num ? 'bg-zero-black text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
              ${t.label}
            </button>
          `).join('')}
        </div>
      </div>
      <div class="px-4">
        <form id="weeklyFormElement" onsubmit="event.preventDefault();">
          ${getWeeklyTabContent()}
        </form>
      </div>
      ${renderBottomNav(AppState.currentTab, 3)}
    </div>
  `;
}

function getWeeklyTabContent() {
  switch (AppState.currentTab) {
    case 1:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">IDENTITAS & PERIODE</h3>
          <div class="flex gap-3 mb-4">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">NAMA SUPERVISOR</label>
              <input type="text" value="${window.form.supervisor}" oninput="window.form.supervisor = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">DARI TANGGAL</label>
              <input type="date" value="${window.form.periodeStart || ''}" onchange="window.form.periodeStart = this.value; if(window.form.periodeEnd) window.form.periode = this.value + ' s/d ' + window.form.periodeEnd; renderApp();" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">SAMPAI TANGGAL</label>
              <input type="date" value="${window.form.periodeEnd || ''}" onchange="window.form.periodeEnd = this.value; if(window.form.periodeStart) window.form.periode = window.form.periodeStart + ' s/d ' + this.value; renderApp();" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">PERIODE (OTOMATIS)</label>
            <input type="text" value="${window.form.periode}" readonly placeholder="Contoh: 2026-06-22 s/d 2026-06-28" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm bg-gray-50 text-gray-500 focus:outline-none cursor-not-allowed">
            ${(function(){
              if (window.form.periodeStart && window.form.periodeEnd) {
                const start = new Date(window.form.periodeStart);
                const end = new Date(window.form.periodeEnd);
                const diffTime = end - start;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                if (diffDays > 7) {
                  return '<p class="text-red-500 text-[10px] font-bold mt-2 uppercase tracking-wide">⚠️ Periode tidak boleh melebihi 7 hari.</p>';
                }
              }
              return '';
            })()}
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">REKAP OMSET 7 HARI</h3>
          <div class="space-y-2">
            ${window.form.weekly.salesHarian.map((s, idx) => `
              <div class="flex items-center gap-3 border-b border-gray-100 pb-2">
                <span class="text-xs font-bold text-gray-500 w-16">${s.hari}</span>
                <div class="flex-1">
                   <input type="text" value="${s.real ? 'Rp ' + new Intl.NumberFormat('id-ID').format(s.real) : ''}" onchange="window.form.weekly.salesHarian[${idx}].real = parseRupiah(this.value); formatRupiah(this);" onfocus="unformatRupiah(this)" onblur="formatRupiah(this)" placeholder="Omset Aktual (Rp)" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black text-right">
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">EVALUASI PRODUK TOP</h3>
          <div class="space-y-4">
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOP 3 MINUMAN</label>
              <div class="space-y-2">
                <div class="flex items-center gap-3">
                  <span class="text-xs font-bold text-gray-400">1</span>
                  <input type="text" value="${window.form.weekly.produk.topMinuman[0]}" onchange="window.form.weekly.produk.topMinuman[0] = this.value" placeholder="Minuman 1" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                </div>
                <div class="flex items-center gap-3">
                  <span class="text-xs font-bold text-gray-400">2</span>
                  <input type="text" value="${window.form.weekly.produk.topMinuman[1]}" onchange="window.form.weekly.produk.topMinuman[1] = this.value" placeholder="Minuman 2" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                </div>
                <div class="flex items-center gap-3">
                  <span class="text-xs font-bold text-gray-400">3</span>
                  <input type="text" value="${window.form.weekly.produk.topMinuman[2]}" onchange="window.form.weekly.produk.topMinuman[2] = this.value" placeholder="Minuman 3" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                </div>
              </div>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOP 3 MAKANAN</label>
              <div class="space-y-2">
                <div class="flex items-center gap-3">
                  <span class="text-xs font-bold text-gray-400">1</span>
                  <input type="text" value="${window.form.weekly.produk.topMakanan[0]}" onchange="window.form.weekly.produk.topMakanan[0] = this.value" placeholder="Makanan 1" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                </div>
                <div class="flex items-center gap-3">
                  <span class="text-xs font-bold text-gray-400">2</span>
                  <input type="text" value="${window.form.weekly.produk.topMakanan[1]}" onchange="window.form.weekly.produk.topMakanan[1] = this.value" placeholder="Makanan 2" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                </div>
                <div class="flex items-center gap-3">
                  <span class="text-xs font-bold text-gray-400">3</span>
                  <input type="text" value="${window.form.weekly.produk.topMakanan[2]}" onchange="window.form.weekly.produk.topMakanan[2] = this.value" placeholder="Makanan 3" class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">EVALUASI PRODUK BOTTOM</h3>
          <div class="space-y-4">
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1">KATEGORI MINUMAN</span>
              <div class="space-y-2">
                ${window.form.weekly.produk.bottomMinuman.map((item, idx) => `
                  <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <input type="text" value="${item.nama}" onchange="window.form.weekly.produk.bottomMinuman[${idx}].nama = this.value" placeholder="Nama Produk Minuman" class="w-full px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg mb-2 focus:outline-none bg-white">
                    <input type="text" value="${item.tindakan}" onchange="window.form.weekly.produk.bottomMinuman[${idx}].tindakan = this.value" placeholder="Tindakan (Promo dll)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                  </div>
                `).join('')}
              </div>
            </div>
            <div>
              <span class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 border-b border-gray-100 pb-1 mt-4">KATEGORI MAKANAN</span>
              <div class="space-y-2">
                ${window.form.weekly.produk.bottomMakanan.map((item, idx) => `
                  <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <input type="text" value="${item.nama}" onchange="window.form.weekly.produk.bottomMakanan[${idx}].nama = this.value" placeholder="Nama Produk Makanan" class="w-full px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg mb-2 focus:outline-none bg-white">
                    <input type="text" value="${item.tindakan}" onchange="window.form.weekly.produk.bottomMakanan[${idx}].tindakan = this.value" placeholder="Tindakan (Promo dll)" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    case 2:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">KOMPLAIN & KENDALA MINGGUAN</h3>
          <div class="flex gap-3 mb-4">
             <div class="flex-1">
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL KASUS KOMPLAIN</label>
               <input type="number" value="${window.form.weekly.komplain.total}" onchange="window.form.weekly.komplain.total = Number(this.value)" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none text-center font-bold">
             </div>
             <div class="flex-1">
               <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">TOTAL REMAKE</label>
               <input type="number" value="${window.form.weekly.komplain.remake}" onchange="window.form.weekly.komplain.remake = Number(this.value)" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none text-center font-bold text-red-500">
             </div>
          </div>
          <div class="mb-4">
            <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">PENYEBAB UTAMA KOMPLAIN</label>
            <input type="text" value="${window.form.weekly.komplain.penyebab}" onchange="window.form.weekly.komplain.penyebab = this.value" placeholder="Misal: Pelayanan lambat" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none">
          </div>
          <div>
            <label class="block text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">KENDALA UTAMA BERULANG</label>
            <textarea onchange="window.form.weekly.kendalaUtama = this.value" placeholder="Tuliskan kendala berulang yang dialami tim selama seminggu ini..." class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none h-24">${window.form.weekly.kendalaUtama}</textarea>
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">EVALUASI PERFORMA STAFF</h3>
          <div class="space-y-3">
            ${window.form.weekly.staff.map((s, idx) => `
              <div class="border border-gray-100 rounded-xl p-3 bg-gray-50/30">
                <div class="flex justify-between items-center mb-2">
                  <span class="text-xs font-bold text-zero-black">${s.nama} <span class="text-[10px] text-gray-500 font-normal">(${s.posisi})</span></span>
                </div>
                <div class="mb-2">
                  <select onchange="updateWeeklyStaff(${idx}, 'status', this.value)" class="w-full px-2 py-1.5 text-xs font-bold border border-gray-200 rounded-lg focus:outline-none bg-white">
                    <option value="Berkembang" ${s.status === 'Berkembang' ? 'selected' : ''}>Berprogress Baik</option>
                    <option value="Stagnan" ${s.status === 'Stagnan' ? 'selected' : ''}>Stagnan / Standar</option>
                    <option value="Menurun" ${s.status === 'Menurun' ? 'selected' : ''}>Menurun / Perlu Evaluasi</option>
                  </select>
                </div>
                <div>
                  <input type="text" value="${s.alasan || ''}" onchange="updateWeeklyStaff(${idx}, 'alasan', this.value)" placeholder="Catatan/Alasan Evaluasi" class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none bg-white">
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    case 3:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4 space-y-6">
          <div>
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
              <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">RENCANA PERBAIKAN TIM</h3>
              ${window.form.weekly.rencana.length < 3 ? '<button type="button" onclick="addWeeklyArrayItem(\'rencana\')" class="px-3 py-1 bg-zero-black text-white text-[8px] font-bold rounded-lg hover:bg-gray-800 transition-all">TAMBAH</button>' : ''}
            </div>
            <div class="space-y-2">
              ${window.form.weekly.rencana.map((r, idx) => `
                <div class="flex items-center gap-2">
                  <span class="text-xs font-bold text-gray-400 w-4">${idx + 1}.</span>
                  <input type="text" value="${r}" onchange="window.form.weekly.rencana[${idx}] = this.value" placeholder="Tindakan perbaikan..." class="flex-1 px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none">
                  ${window.form.weekly.rencana.length > 1 ? '<button type="button" onclick="removeWeeklyArrayItem(\'rencana\', ' + idx + ')" class="text-[10px] font-bold text-red-500 px-2">X</button>' : ''}
                </div>
              `).join('')}
            </div>
          </div>
          <div>
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-2 mt-6">
              <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest">KEBUTUHAN SPV / TIM</h3>
              <button type="button" onclick="addWeeklyArrayItem('kebutuhan')" class="px-3 py-1 bg-zero-black text-white text-[8px] font-bold rounded-lg hover:bg-gray-800 transition-all">TAMBAH</button>
            </div>
            <div class="space-y-2">
              ${window.form.weekly.kebutuhan.map((k, idx) => `
                <div class="flex items-center gap-2">
                  <span class="text-xs font-bold text-gray-400 w-4">${idx + 1}.</span>
                  <input type="text" value="${k}" onchange="window.form.weekly.kebutuhan[${idx}] = this.value" placeholder="Kebutuhan (alat, training, dll)..." class="flex-1 px-3 py-2 text-xs border border-gray-200 rounded-xl focus:outline-none">
                  ${window.form.weekly.kebutuhan.length > 1 ? '<button type="button" onclick="removeWeeklyArrayItem(\'kebutuhan\', ' + idx + ')" class="text-[10px] font-bold text-red-500 px-2">X</button>' : ''}
                </div>
              `).join('')}
            </div>
          </div>
        </div>
        <div class="flex flex-col gap-3 mt-8 mb-8">
          <div class="flex gap-3">
            <button type="button" onclick="saveDraft()" class="flex-1 py-3 border border-zero-black rounded-2xl text-xs font-bold text-zero-black hover:bg-gray-50 transition-all">SIMPAN DRAFT</button>
            <button type="button" onclick="exportPDF()" class="flex-1 py-3 border border-zero-black rounded-2xl text-xs font-bold text-zero-black hover:bg-gray-50 transition-all">EXPORT PDF</button>
          </div>
          <button type="button" onclick="openPreviewModal()" class="w-full py-4 bg-zero-black text-white rounded-2xl text-sm font-bold hover:bg-gray-800 transition-all shadow-md">TINJAU & KIRIM LAPORAN</button>
        </div>
      `;
  }
}

function updateWeeklyStaff(idx, field, value) { window.form.weekly.staff[idx][field] = value; }
function addWeeklyArrayItem(arrName) { window.form.weekly[arrName].push(""); renderApp(); }
function removeWeeklyArrayItem(arrName, idx) { window.form.weekly[arrName].splice(idx, 1); renderApp(); }

function getMonthlyFormTemplate() {
  const tabs = [
    { num: 1, label: "RINGKASAN & SALES" },
    { num: 2, label: "STAFF & QC" },
    { num: 3, label: "EVALUASI" }
  ];

  return `
    <div class="w-full min-h-screen pb-24 bg-[#f3f4f6]">
      <div class="bg-white px-6 py-4 flex justify-between items-center sticky top-0 z-20 border-b border-gray-200 shadow-sm">
        <div>
          <h2 class="text-sm font-extrabold text-zero-black">LAPORAN BULANAN</h2>
          <p class="text-[10px] font-bold text-gray-400">${window.form.bulan || 'Bulan Baru'}</p>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" onclick="confirmResetForm()" class="p-2 border border-gray-200 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all" title="Reset Laporan">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
          <button type="button" onclick="goBackMenu()" class="px-3 py-1.5 border border-gray-200 rounded-full text-[10px] font-bold text-gray-400 hover:bg-gray-50 transition-all">
            KEMBALI
          </button>
        </div>
      </div>
      <div class="bg-white border-b border-gray-200 px-4 py-3 mb-4 sticky top-[65px] z-10">
        <div class="flex overflow-x-auto space-x-2 scrollbar-hide py-1">
          ${tabs.map(t => `
            <button type="button" ${AppState.currentTab === t.num ? 'id="activeTabBtn"' : ''} onclick="switchTab(${t.num})" class="px-4 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition-all duration-200 ${AppState.currentTab === t.num ? 'bg-zero-black text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
              ${t.label}
            </button>
          `).join('')}
        </div>
      </div>
      <div class="px-4">
        <form id="monthlyFormElement" onsubmit="event.preventDefault();">
          ${getMonthlyTabContent()}
        </form>
      </div>
      ${renderBottomNav(AppState.currentTab, 3)}
    </div>
  `;
}

function getMonthlyTabContent() {
  switch (AppState.currentTab) {
    case 1:
      return `
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">IDENTITAS & PERIODE</h3>
          <div class="flex gap-3 mb-4">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">NAMA SUPERVISOR</label>
              <input type="text" value="${window.form.supervisor}" onchange="window.form.supervisor = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
            </div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">OUTLET</label>
              <select onchange="window.form.outlet = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors">
                <option value="Perintis" ${window.form.outlet === 'Perintis' ? 'selected' : ''}>Perintis</option>
                <option value="Dg Tata" ${window.form.outlet === 'Dg Tata' ? 'selected' : ''}>Dg Tata</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">BULAN LAPORAN</label>
            <input type="month" value="${window.form.bulan}" onchange="window.form.bulan = this.value" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-zero-black transition-colors" required>
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-4 space-y-4">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">RINGKASAN EKSEKUTIF</h3>

function updateMonthlySalesField(field, value) {
  window.form.monthly.sales[field] = value;
  if (field === 'total' || field === 'target') {
    if (window.form.monthly.sales.target > 0) {
      window.form.monthly.sales.persen = Math.round(window.form.monthly.sales.total / window.form.monthly.sales.target * 100);
    } else {
      window.form.monthly.sales.persen = 0;
    }
  }
  setTimeout(() => { if (AppState.currentTab === 1) renderApp(); }, 300);
}
function updateMonthlyRating(value) {
  window.form.monthly.evaluasi.ratingKerja = Number(value);
  const display = document.getElementById('monthlyRatingDisplay');
  if (display) display.innerText = value;
}
function updateMonthlyStaff(idx, field, value) { window.form.monthly.staff[idx][field] = value; }
function addMonthlyStaffRow() { window.form.monthly.staff.push({ nama: "", kriteria: "Inisiatif", nilai: "Baik", alasan: "" }); renderApp(); }
function removeMonthlyStaffRow(idx) { window.form.monthly.staff.splice(idx, 1); renderApp(); }

function addMonthlyQCItem() {
  if (!window.form.monthly.qc.items) window.form.monthly.qc.items = [];
  window.form.monthly.qc.items.push({ menu: "", status: "Baik", komplain: "", rekomendasi: "" });
  renderApp();
}
function removeMonthlyQCItem(idx) {
  window.form.monthly.qc.items.splice(idx, 1);
  renderApp();
}
function updateMonthlyQCItem(idx, field, value) {
  window.form.monthly.qc.items[idx][field] = value;
}

  return `
    <div class="w-full min-h-screen pb-24 bg-[#f3f4f6]">

        <div><h2 class="text-sm font-extrabold text-zero-black">DASHBOARD GM</h2><p class="text-[10px] font-bold text-gray-400">Zero Cafe Analytics</p></div>
        <button type="button" onclick="handleLogout()" class="px-3 py-1 border border-gray-200 rounded-full text-[10px] font-bold text-gray-400 hover:bg-gray-50 transition-all">KELUAR</button>
      </div>
      <div class="px-4 mt-6">
        <div class="mb-6">
          <div class="flex flex-col gap-3 bg-white p-4 rounded-2xl border border-gray-200">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2 mb-2">Filter Data</h3>
            <div class="flex gap-2">
              <select id="filterMonth" class="flex-1 px-3 py-2 text-xs font-bold text-zero-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">
                ${months.map(m => `<option value="${m}" ${AppState.activeFilters.month === m ? 'selected' : ''}>${m}</option>`).join('')}

              <select id="filterYear" class="flex-1 px-3 py-2 text-xs font-bold text-zero-black bg-gray-50 border border-gray-200 rounded-xl focus:outline-none">

        </div>
        ${statsHtml}
        ${AppState.dashboardData ? '<div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6"><h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest mb-4">Arsip PDF (' + AppState.activeFilters.month + ' ' + AppState.activeFilters.year + ')</h3>' + reportsHtml + '</div>' : ''}
        
        <!-- Pengaturan Sistem -->
        <div class="bg-white p-5 rounded-2xl border border-gray-200 mb-6">
          <h3 class="text-[10px] font-bold text-zero-black uppercase tracking-widest border-b border-gray-100 pb-2 mb-4">Pengaturan Sistem</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Target Folder GDrive ID</label>
              <p class="text-[10px] text-gray-500 mb-2">Semua file PDF laporan akan disimpan di dalam folder ini.</p>
              <div class="flex gap-2">
                <input type="text" id="targetFolderId" value="${(AppState.dashboardData && AppState.dashboardData.currentFolderId) ? AppState.dashboardData.currentFolderId : ''}" class="flex-1 px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-zero-black transition-colors" placeholder="Masukkan ID Folder GDrive baru">
                <button type="button" onclick="updateFolderId()" class="px-4 py-2 bg-zero-black text-white font-bold rounded-xl text-xs hover:bg-gray-800 transition-colors">Simpan</button>

async function fetchGMAnalytics() {
  const monthEl = document.getElementById('filterMonth');
  const yearEl = document.getElementById('filterYear');
  if (!monthEl || !yearEl) return;
  
  AppState.activeFilters.month = monthEl.value;
  AppState.activeFilters.year = yearEl.value;
  
  showLoading(true);
  try {
    const rawRes = await Server.call('api_gm_fetchReports', AppState.activeFilters.month, AppState.activeFilters.year);
    const res = typeof rawRes === 'string' ? JSON.parse(rawRes) : rawRes;
    
    if (res && res.status === 'success') {
      AppState.dashboardData = res.data;
      showToast("Data analitik berhasil diperbarui.");
    } else {
      showToast("Gagal menarik data: " + (res ? res.error : "Unknown error"), "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
    renderApp();
    if (AppState.dashboardData && AppState.dashboardData.chartData) {
      setTimeout(renderGMChart, 100);
    }
  }
}

async function saveTargetOmset() {
  const input = document.getElementById('inputTargetOmset');
  if (!input) return;
  const targetVal = input.value;
  
  if (!targetVal || isNaN(targetVal)) {
    showToast("Target omset tidak valid", "error");
    return;
  }
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_setTargetOmset', AppState.activeFilters.month, AppState.activeFilters.year, targetVal);
    if (res.success) {
      showToast("Target Omset berhasil disimpan!");
      // Refresh analytics to recalculate percentage
      fetchGMAnalytics();
    } else {
      showToast("Gagal menyimpan: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}

let gmChartInstance = null;
function renderGMChart() {
  const ctx = document.getElementById('gmChart');
  if (!ctx) return;
  
  if (gmChartInstance) {
    gmChartInstance.destroy();
  }
  
  const data = AppState.dashboardData.chartData || [];
  const labels = data.map(d => {
    // Convert YYYY-MM-DD to DD (e.g. "2026-07-05" -> "05")
    let parts = d.date.split('-');
    return parts.length === 3 ? parts[2] : d.date;
  });
  const values = data.map(d => d.omset);
  
  gmChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Omset Harian (Rp)',
        data: values,
        borderColor: '#0f0f0f',
        backgroundColor: 'rgba(15, 15, 15, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointBackgroundColor: '#ffffff',
        pointBorderColor: '#0f0f0f',
        pointBorderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0f0f0f',
          padding: 10,
          titleFont: { size: 10, weight: 'bold' },
          bodyFont: { size: 12, weight: 'bold' },
          callbacks: {
            label: function(context) {
              return 'Rp ' + context.parsed.y.toLocaleString('id-ID');
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } },
        y: { 
          grid: { borderDash: [5, 5], color: '#e5e7eb' }, 
          ticks: { 
            font: { size: 10, weight: 'bold' },
            callback: function(value) {
              if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
              return value;
            }
          }
        }
      }
    }
  });
}

async function updateFolderId() {
  const input = document.getElementById('targetFolderId');
  if (!input) return;
  const newId = input.value.trim();
  
  if (!newId) {
    showToast("ID Folder tidak boleh kosong", "error");
    return;
  }
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_updateFolderId', newId);
    if (res.success) {
      showToast("Berhasil! Folder: " + res.folderName);
      if (AppState.dashboardData) {
        AppState.dashboardData.currentFolderId = newId;
      }
    } else {
      showToast("Gagal: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}

function openPreviewModal() {
  if (!window.form.supervisor) { showToast("Nama Supervisor wajib diisi!", "error"); return; }
  const body = document.getElementById('previewModalBody');
  const modal = document.getElementById('previewModal');
  if (!body || !modal) return;
  
  let previewHtml = "";
  if (window.form.type === 'daily') {
    const totalSales = Number(window.form.penjualan.shift1 || 0) + Number(window.form.penjualan.shift2 || 0);
    previewHtml = `<div class="space-y-4">
      <p><strong>Laporan Harian:</strong> ${window.form.tanggal} | SPV: ${window.form.supervisor}</p>
      <p><strong>Target Harian:</strong> Rp ${Number(window.form.penjualan.target || 0).toLocaleString()}</p>
      <p><strong>Total Omset Real:</strong> Rp ${totalSales.toLocaleString()}</p>
      <p><strong>Total Transaksi:</strong> ${window.form.penjualan.transaksi} struk</p>
      <p><strong>Total Komplain / Remake:</strong> ${window.form.feedback.totalKomplain} / ${window.form.feedback.totalRemake}</p>
      <p><strong>Kendala Utama:</strong> ${window.form.penutup.kendala || 'Tidak ada'}</p>
    </div>`;
  } else if (window.form.type === 'weekly') {
    let totalReal = 0; window.form.weekly.salesHarian.forEach(s => totalReal += Number(s.real || 0));
    previewHtml = `<div class="space-y-4">
      <p><strong>Laporan Mingguan:</strong> Periode ${window.form.periode} | SPV: ${window.form.supervisor}</p>
      <p><strong>Total Sales 7 Hari:</strong> Rp ${totalReal.toLocaleString()}</p>
      <p><strong>Komplain / Remake:</strong> ${window.form.weekly.komplain.total} / ${window.form.weekly.komplain.remake}</p>
      <p><strong>Kendala Utama Berulang:</strong> ${window.form.weekly.kendalaUtama || 'Tidak ada'}</p>
    </div>`;
  } else if (window.form.type === 'monthly') {
    previewHtml = `<div class="space-y-4">
      <p><strong>Laporan Bulanan:</strong> Bulan ${window.form.bulan} | SPV: ${window.form.supervisor}</p>
      <p><strong>Total Sales Bulanan:</strong> Rp ${Number(window.form.monthly.sales.total || 0).toLocaleString()}</p>
      <p><strong>Pencapaian:</strong> ${window.form.monthly.sales.persen}%</p>
      <p><strong>Kepatuhan SOP:</strong> ${window.form.monthly.operasional.kepatuhanSop}% | Rating Kinerja: ${window.form.monthly.evaluasi.ratingKerja}/10</p>
    </div>`;
  }
  body.innerHTML = previewHtml;
  modal.classList.remove('hidden');
}

function closePreviewModal() {
  const modal = document.getElementById('previewModal');
  if (modal) modal.classList.add('hidden');
}

async function submitReport() {
  showLoading(true);
  try {
    const f = window.form;
    
    // Generate Base64 PDF to send to GDrive so the format perfectly matches the client
    const htmlContent = buildPDFHtml(f);
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = htmlContent;
    tempDiv.style.position = 'absolute';
    tempDiv.style.left = '-9999px';
    tempDiv.style.width = '794px';
    document.body.appendChild(tempDiv);
    
    const opt = {
      margin: 0,
      filename: 'temp.pdf',
      image: { type: 'jpeg', quality: 0.8 }, // Reduced for smaller base64 size
      html2canvas: { scale: 1.2, useCORS: true, logging: false }, // Reduced scale for faster generation & smaller size
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    try {
      const base64String = await html2pdf().set(opt).from(tempDiv).output('datauristring');
      if (base64String && base64String.includes(',')) {
        f.pdfBase64 = base64String.split(',')[1];
      }
    } catch (e) {
      console.warn("Gagal membuat base64 PDF, mengirim tanpa PDF base64", e);
    } finally {
      if (tempDiv.parentNode) document.body.removeChild(tempDiv);
    }
    
    const payloadStr = JSON.stringify(f);
    const res = await Server.call('submitFullReport', payloadStr);
    if (res.success) {
      StorageHelper.remove('zc_draft_daily');
      StorageHelper.remove('zc_draft_weekly');
      StorageHelper.remove('zc_draft_monthly');
      const currentType = window.form.type;
      resetFormData(currentType);
      const body = document.getElementById('previewModalBody');
      const modalFooter = document.getElementById('previewModalFooter');
      if (body) {
        body.innerHTML = `<div class="text-center py-6">
          <h4 class="text-xl font-bold text-gray-900 mb-2">Laporan Berhasil Dikirim!</h4>
          <p class="text-gray-600 mb-4">Laporan Anda telah disimpan ke database dan file PDF telah dibuat.</p>
          <div class="bg-gray-100 p-3 rounded-lg mb-6 text-sm text-left">
            <span class="font-bold text-gray-700">Lokasi Google Drive:</span><br/>
            <span class="text-gray-600 text-xs">${res.folderPath || 'Zero Cafe Workspace Drive'}</span>
          </div>
          <a href="${res.url}" target="_blank" class="inline-block px-6 py-3 bg-zero-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">Buka File PDF</a>
        </div>`;
      }
      if (modalFooter) {
        modalFooter.innerHTML = `<button onclick="closeSuccessModal()" class="px-6 py-2.5 bg-zero-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">Selesai</button>`;
      }
    } else {
      showToast("Gagal mengirim laporan: " + res.error, "error");
      closePreviewModal();
    }
  } catch (err) {
    showToast("Error sistem: " + err.toString(), "error");
    closePreviewModal();
  } finally {
    showLoading(false);
  }
}

function closeSuccessModal() {
  closePreviewModal();
  AppState.menu = 'select_report';
  renderApp();
}

/* === FORM RESET LOGIC === */
function confirmResetForm() {
  const modal = document.getElementById('confirmResetModal');
  if (modal) modal.classList.remove('hidden');
}

function closeResetModal() {
  const modal = document.getElementById('confirmResetModal');
  if (modal) modal.classList.add('hidden');
}

function executeResetForm() {
  closeResetModal();
  const currentType = window.form.type;
  if (!currentType) return;
  
  StorageHelper.remove('zc_draft_' + currentType);
  resetFormData(currentType);
  
  // Re-initialize dynamic staff if it was daily
  if (currentType === 'daily') {
    window.form.staff = [];
  } else if (currentType === 'weekly') {
    // leave as is, handled by resetFormData usually, but can remap if needed
    window.form.weekly.staff = AppState.masterStaff.map(s => ({ nama: s.nama, kpi: "", kendala: "" }));
  } else if (currentType === 'monthly') {
    window.form.monthly.staff = AppState.masterStaff.map(s => ({ nama: s.nama, posisi: s.posisi, attitude: "Baik", skill: "Bagus", rekomendasi: "Lanjut" }));
  }
  
  renderApp();
  showToast("Laporan telah direset", "success");
}

function openAddStaffModal() {
  const input = document.getElementById('newStaffName');
  const modal = document.getElementById('addStaffModal');
  if (input) input.value = "";
  if (modal) modal.classList.remove('hidden');
}

function closeAddStaffModal() {
  const modal = document.getElementById('addStaffModal');
  if (modal) modal.classList.add('hidden');
}

async function addStaffSubmit() {
  const nameEl = document.getElementById('newStaffName');
  const posEl = document.getElementById('newStaffPosition');
  if (!nameEl || !posEl) return;
  
  const name = nameEl.value.trim();
  const pos = posEl.value;
  if (!name) {
    showToast("Nama staf tidak boleh kosong!", "error");
    return;
  }
  closeAddStaffModal();
  showLoading(true);
  try {
    const res = await Server.call('api_addStaff', name, pos);
    if (res.success) {
      showToast(res.message);
      await fetchMasterStaff();
      if (window.form.type === 'daily') {
        window.form.staff.push({ nama: name, posisi: pos, status: "Hadir", keramahan: false, keterangan: "" });
      } else if (window.form.type === 'weekly') {
        window.form.weekly.staff = AppState.masterStaff.map(s => {
          const existing = window.form.weekly.staff.find(fs => fs.nama === s.nama);
          return existing || { nama: s.nama, posisi: s.posisi, status: "Berkembang", alasan: "" };
        });
      }
      renderApp();
    } else {
      showToast("Gagal menyimpan staff: " + res.error, "error");
    }
  } catch (err) {
    showToast("Error: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}
