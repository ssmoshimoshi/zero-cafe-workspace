<script>
// Utilities
function formatToDDMMYYYY(dateStr) {
  if (!dateStr) return "";
  const parts = dateStr.split("-");
  if (parts.length === 3 && parts[0].length === 4) {
    return `${parts[2]}-${parts[1]}-${parts[0]}`; // Convert YYYY-MM-DD to DD-MM-YYYY
  }
  return dateStr;
}

function updateWeeklyStaff(idx, field, value) { window.form.weekly.staff[idx][field] = value; }
function addWeeklyArrayItem(arrName) { window.form.weekly[arrName].push(""); renderApp(); }
function removeWeeklyArrayItem(arrName, idx) { window.form.weekly[arrName].splice(idx, 1); renderApp(); }

function validateWeeklyPeriode() {
  if (!window.form.periodeStart || !window.form.periodeEnd) return;
  const diffDays = Math.ceil(Math.abs(new Date(window.form.periodeEnd) - new Date(window.form.periodeStart)) / (1000 * 60 * 60 * 24));
  const warningEl = document.getElementById('periodeWarning');
  if (warningEl) {
    if (diffDays > 6) { 
      warningEl.textContent = 'Peringatan: Periode maksimal 7 hari!';
      warningEl.classList.remove('hidden');
    } else {
      warningEl.classList.add('hidden');
      fetchWeeklyData();
    }
  }
}

async function fetchWeeklyData() {
  const f = window.form;
  if (!f.periodeStart || !f.periodeEnd) return;
  
  const container = document.getElementById('weeklySalesContainer');
  if (container) {
    container.classList.add('shimmer-loading', 'opacity-50', 'pointer-events-none');
  } else {
    showToast("Mengambil data omset dari database...", "info");
  }
  
  try {
    const res = await Server.call('api_getWeeklyData', f.periodeStart, f.periodeEnd, f.outlet || 'Perintis');
    if (res.success && res.data) {
      f.weekly.salesHarian = res.data;
      if (res.produk) {
        Object.keys(res.produk).forEach(key => {
          if (f.weekly.produk[key]) {
            // Reset existing first
            f.weekly.produk[key].forEach(item => { item.nama = ''; item.terjual = ''; });
            // Populate new
            res.produk[key].forEach((item, idx) => {
              if (idx < f.weekly.produk[key].length) {
                f.weekly.produk[key][idx].nama = item.nama;
                f.weekly.produk[key][idx].terjual = item.terjual;
                if (item.rencana && f.weekly.produk[key][idx].rencana !== undefined) {
                  f.weekly.produk[key][idx].rencana = item.rencana;
                }
              }
            });
          }
        });
      }
      if (!container) showToast("Data omset dan target harian berhasil ditarik!", "success");
      renderApp(); // This will re-render and implicitly remove the shimmer class since it recreates the DOM element
    }
  } catch (err) {
    console.error("Error fetchWeeklyData", err);
    showToast("Gagal menarik data omset otomatis", "error");
    if (container) container.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
  }
}

async function fetchMonthlyData() {
  const f = window.form;
  if (!f.bulan) return;
  
  const salesContainer = document.getElementById('monthlySalesContainer');
  const qcContainer = document.getElementById('monthlyQcContainer');
  
  if (salesContainer) salesContainer.classList.add('shimmer-loading', 'opacity-50', 'pointer-events-none');
  if (qcContainer) qcContainer.classList.add('shimmer-loading', 'opacity-50', 'pointer-events-none');
  
  if (!salesContainer) {
    showToast("Mengambil data rekap bulanan...", "info");
  }
  
  try {
    const res = await Server.call('api_getMonthlyData', f.bulan, f.outlet || 'Perintis');
    if (res && res.success) {
      f.monthly.sales.total = res.totalReal || 0;
      f.monthly.sales.target = res.totalTarget || 0;
      f.monthly.qc.komplain = res.totalKomplain || 0;
      f.monthly.operasional.telat = res.totalTelat || 0;
      // f.monthly.operasional.teguran = res.totalTeguran || 0; // DISABLED: SP/Teguran is now input manually by SPV
      f.monthly.operasional.kepatuhanSop = res.kepatuhanSop || 0;
      const filteredStaff = AppState.masterStaff.filter(s => s.outlet && s.outlet.toLowerCase().trim() === (f.outlet || 'Perintis').toLowerCase().trim() && s.status === 'Aktif');
      f.monthly.staff = filteredStaff.map(s => ({ nama: s.nama, posisi: s.posisi, attitude: "Baik", skill: "Bagus", rekomendasi: "Lanjut" }));
      
      if (res.staffEvaluations && res.staffEvaluations.length > 0) {
        f.monthly.staff = res.staffEvaluations;
      }
      
      // Calculate percentage
      if (f.monthly.sales.target > 0) {
        f.monthly.sales.persen = Math.round(f.monthly.sales.total / f.monthly.sales.target * 100);
      } else {
        f.monthly.sales.persen = 0;
      }
      
      if (res.produk) {
        Object.keys(res.produk).forEach(key => {
          if (f.monthly.produk[key]) {
            f.monthly.produk[key].forEach(item => { item.nama = ''; item.terjual = ''; });
            res.produk[key].forEach((item, idx) => {
              if (idx < f.monthly.produk[key].length) {
                f.monthly.produk[key][idx].nama = item.nama;
                f.monthly.produk[key][idx].terjual = item.terjual;
                if (item.rencana && f.monthly.produk[key][idx].rencana !== undefined) {
                  f.monthly.produk[key][idx].rencana = item.rencana;
                }
              }
            });
          }
        });
      }
      
      if (!salesContainer) showToast("Data bulanan berhasil ditarik!", "success");
      renderApp();
    } else if (res && !res.success) {
      showToast("Gagal dari server: " + res.error, "error");
      if (salesContainer) salesContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
      if (qcContainer) qcContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
    }
  } catch (err) {
    console.error("Error fetchMonthlyData", err);
    showToast("Koneksi gagal: " + (err.message || err), "error");
    if (salesContainer) salesContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
    if (qcContainer) qcContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
  }
}

function updateWeeklySalesField(idx, field, value) {
  window.form.weekly.salesHarian[idx][field] = parseRupiah(value);
  setTimeout(() => { if (AppState.currentTab === 2) renderApp(); }, 100);
}

function updateMonthlySalesField(field, value) {
  window.form.monthly.sales[field] = value;
  if (field === 'total' || field === 'target') {
    if (window.form.monthly.sales.target > 0) {
      window.form.monthly.sales.persen = Math.round(window.form.monthly.sales.total / window.form.monthly.sales.target * 100);
    } else {
      window.form.monthly.sales.persen = 0;
    }
    
    // Update DOM directly to prevent scrolling/losing focus
    const persenEl = document.getElementById('monthlyPersenDisplay');
    if (persenEl) persenEl.innerText = window.form.monthly.sales.persen + '%';
  }
}
function updateMonthlyRating(value) {
  window.form.monthly.evaluasi.ratingKerja = Number(value);
  const display = document.getElementById('monthlyRatingDisplay');
  if (display) display.innerText = value;
}
function updateMonthlyStaff(idx, field, value) { window.form.monthly.staff[idx][field] = value; }
function addMonthlyStaffRow() { window.form.monthly.staff.push({ nama: "", kriteria: "Inisiatif", nilai: "Baik", alasan: "" }); renderApp(); }
function removeMonthlyStaffRow(idx) { window.form.monthly.staff.splice(idx, 1); renderApp(); }

function addMonthlyQCItem() {
  if (!window.form.monthly.qc.items) window.form.monthly.qc.items = [];
  window.form.monthly.qc.items.push({ menu: "", status: "Baik", komplain: "", rekomendasi: "" });
  renderApp();
}

function toggleAccordion(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById('icon-' + id);
  if (el && el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    if (icon) icon.style.transform = 'rotate(180deg)';
  } else if (el) {
    el.classList.add('hidden');
    if (icon) icon.style.transform = 'rotate(0deg)';
  }
}
function removeMonthlyQCItem(idx) {
  window.form.monthly.qc.items.splice(idx, 1);
  renderApp();
}
function updateMonthlyQCItem(idx, field, value) {
  window.form.monthly.qc.items[idx][field] = value;
}



async function fetchGMAnalytics() {
  const outletEl = document.getElementById('filterOutlet');
  const startDateEl = document.getElementById('filterStartDate');
  const endDateEl = document.getElementById('filterEndDate');
  
  if (outletEl) AppState.activeFilters.outlet = outletEl.value;
  if (startDateEl) AppState.activeFilters.startDate = startDateEl.value;
  if (endDateEl) AppState.activeFilters.endDate = endDateEl.value;
  
  // Validasi
  if (!AppState.activeFilters.startDate || !AppState.activeFilters.endDate) {
    showToast("Silakan pilih Tanggal Mulai dan Tanggal Akhir", "error");
    return;
  }
  
  const formattedStart = formatToDDMMYYYY(AppState.activeFilters.startDate);
  const formattedEnd = formatToDDMMYYYY(AppState.activeFilters.endDate);
  
  showLoading(true);
  try {
    const rawRes = await Server.call('api_gm_fetchReports', formattedStart, formattedEnd, AppState.activeFilters.outlet);
    const res = typeof rawRes === 'string' ? JSON.parse(rawRes) : rawRes;
    
    if (res && res.status === 'success') {
      AppState.dashboardData = res.data;
      showToast("Data analitik berhasil diperbarui.");
    } else {
      showToast("Gagal menarik data: " + (res ? res.error : "Unknown error"), "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
    renderApp();
    if (AppState.dashboardData && AppState.dashboardData.chartData) {
      setTimeout(renderGMChart, 100);
    }
  }
}



let gmChartInstance = null;
function renderGMChart() {
  const ctx = document.getElementById('gmOmsetChart');
  if (!ctx) return;
  
  if (gmChartInstance) {
    gmChartInstance.destroy();
  }
  
  const cData = AppState.dashboardData.chartData || [];
  const labels = cData.map(d => {
    // Format date MM-DD
    const parts = d.date.split('-');
    return parts.length >= 3 ? `${parts[2]}/${parts[1]}` : d.date;
  });
  const data = cData.map(d => d.omset);
  
  gmChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Omset Harian',
        data: data,
        borderColor: '#10b981', // emerald-500
        backgroundColor: 'rgba(16, 185, 129, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointBackgroundColor: '#10b981',
      }]
    },
    options: {
      animation: {
        duration: 1500,
        easing: 'easeOutQuart'
      },
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: {
            label: function(context) {
              return 'Rp ' + context.raw.toLocaleString('id-ID');
            }
          }
        }
      },
      scales: {
        x: { 
          grid: { display: false, drawBorder: false },
          ticks: { font: { size: 9 }, color: '#6b7280' }
        },
        y: { 
          display: false,
          beginAtZero: true 
        }
      },
      interaction: {
        mode: 'nearest',
        axis: 'x',
        intersect: false
      }
    }
  });
}

// Global variable to store insight chart instances
let insightChartInstances = {};

window.renderInsightCharts = function(insights) {
  insights.forEach((ins, idx) => {
    const canvasId = 'insight-chart-' + idx;
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    
    // Destroy previous instance if exists
    if (insightChartInstances[canvasId]) {
      insightChartInstances[canvasId].destroy();
    }
    
    if (ins.modul === 'Tren Omset Mingguan' && ins.chartData) {
      const labels = ins.chartData.map(d => d.periode);
      const data = ins.chartData.map(d => d.avgSales);
      
      insightChartInstances[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Rata-rata Omset Harian',
            data: data,
            backgroundColor: '#171717',
            borderRadius: 4,
            barPercentage: 0.6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return 'Rata-rata: Rp ' + Math.round(context.raw).toLocaleString('id-ID');
                }
              }
            }
          },
          scales: {
            x: { grid: { display: false } },
            y: { display: false, beginAtZero: true }
          }
        }
      });
    } else if (ins.modul === 'Analisis Menu' && ins.chartData) {
      const topData = ins.chartData.top.slice(0, 5);
      const bottomData = ins.chartData.bottom.slice(0, 5);
      
      const labels = [];
      const data = [];
      const colors = [];

      topData.forEach(d => {
        labels.push(d.nama);
        data.push(d.count);
        colors.push('#10B981'); // Emerald 500
      });
      bottomData.forEach(d => {
        labels.push(d.nama);
        data.push(d.count);
        colors.push('#F59E0B'); // Amber 500
      });

      if (labels.length > 0) {
        ctx.parentElement.style.height = (labels.length * 35 + 40) + 'px';
        
        insightChartInstances[canvasId] = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Frekuensi Muncul',
              data: data,
              backgroundColor: colors,
              borderRadius: 4,
              barPercentage: 0.6
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    return context.raw + ' kali muncul (' + Math.round((context.raw / ins.chartData.totalDays) * 100) + '%)';
                  }
                }
              }
            },
            scales: {
              x: { display: false, beginAtZero: true },
              y: { 
                grid: { display: false },
                ticks: { font: { size: 10, weight: 'bold' }, color: '#171717' }
              }
            }
          }
        });
      }
    } else if (ins.modul === 'Korelasi Kebersihan & Omset' && ins.chartData) {
      const labels = ins.chartData.map(d => d.date);
      const omsetData = ins.chartData.map(d => d.omset);
      const hygieneData = ins.chartData.map(d => d.hygiene);
      
      insightChartInstances[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              type: 'line',
              label: 'Skor Kebersihan (%)',
              data: hygieneData,
              borderColor: '#10B981', // Emerald 500
              backgroundColor: '#10B981',
              borderWidth: 2,
              tension: 0.3,
              yAxisID: 'y1',
              pointRadius: 4,
              pointBackgroundColor: '#fff'
            },
            {
              type: 'bar',
              label: 'Omset Harian (Rp)',
              data: omsetData,
              backgroundColor: 'rgba(23, 23, 23, 0.1)', // Light Zero Black
              borderColor: 'rgba(23, 23, 23, 0.2)',
              borderWidth: 1,
              borderRadius: 4,
              yAxisID: 'y'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { 
              display: true, 
              position: 'top', 
              labels: { boxWidth: 10, font: { size: 9, weight: 'bold' } } 
            },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                label: function(context) {
                  if (context.dataset.yAxisID === 'y') {
                    return 'Omset: Rp ' + context.raw.toLocaleString('id-ID');
                  } else {
                    return 'Kebersihan: ' + context.raw + '%';
                  }
                }
              }
            }
          },
          scales: {
            x: { 
              grid: { display: false },
              ticks: { font: { size: 9 } }
            },
            y: { 
              type: 'linear',
              display: true,
              position: 'left',
              beginAtZero: true,
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: { 
                callback: function(value) { return 'Rp ' + (value/1000000).toFixed(1) + 'Jt'; },
                font: { size: 9 }
              }
            },
            y1: {
              type: 'linear',
              display: true,
              position: 'right',
              beginAtZero: true,
              max: 100,
              grid: { drawOnChartArea: false },
              ticks: { 
                callback: function(value) { return value + '%'; },
                font: { size: 9 }
              }
            }
          }
        }
      });
    } else if (ins.modul === 'SDM & Risiko Operasional' && ins.chartData) {
      const labels = ['Tepat Waktu', 'Terlambat', 'Izin/Alfa'];
      const data = [ins.chartData.tepatWaktu, ins.chartData.terlambat, ins.chartData.lainnya];
      const colors = ['#10B981', '#EF4444', '#6B7280']; // Emerald, Red, Gray

      insightChartInstances[canvasId] = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: data,
            backgroundColor: colors,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'right',
              labels: {
                boxWidth: 10,
                font: { size: 9, weight: 'bold' },
                color: '#171717'
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const total = data.reduce((a, b) => a + b, 0);
                  const val = context.raw;
                  const pct = total > 0 ? Math.round((val / total) * 100) : 0;
                  return context.label + ': ' + val + ' shift (' + pct + '%)';
                }
              }
            }
          },
          cutout: '70%' // Donut style
        }
      });
    }
  });
};

async function updateFolderId() {
  const input = document.getElementById('targetFolderId');
  if (!input) return;
  const newId = input.value.trim();
  
  if (!newId) {
    showToast("ID Folder tidak boleh kosong", "error");
    return;
  }
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_updateFolderId', newId);
    if (res.success) {
      showToast("Berhasil! Folder: " + res.folderName);
      if (AppState.dashboardData) {
        AppState.dashboardData.currentFolderId = newId;
      }
    } else {
      showToast("Gagal: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}

function openPreviewModal() {
  const f = window.form;
  
  // Patch missing posisi from old drafts
  if (f.type === 'weekly' && f.weekly && f.weekly.staff) {
    f.weekly.staff.forEach(s => {
      if (!s.posisi && AppState.masterStaff) {
        const m = AppState.masterStaff.find(x => x.nama === s.nama);
        if (m) s.posisi = m.posisi;
      }
    });
  } else if (f.type === 'monthly' && f.monthly && f.monthly.staff) {
    f.monthly.staff.forEach(s => {
      if (!s.posisi && AppState.masterStaff) {
        const m = AppState.masterStaff.find(x => x.nama === s.nama);
        if (m) s.posisi = m.posisi;
      }
    });
  }
  
  const err = window.validateFormCompletion(f);
  if (err) { showToast(err, "error"); return; }
  const body = document.getElementById('previewModalBody');
  const modal = document.getElementById('previewModal');
  if (!body || !modal) return;
  
  // Ensure all data in form is updated before building HTML
  const previewHtml = buildPDFHtml(window.form);
  body.innerHTML = previewHtml;
  
  // Reset footer buttons to default state
  const modalFooter = document.getElementById('previewModalFooter');
  if (modalFooter) {
    modalFooter.innerHTML = `
      <button onclick="closePreviewModal()" class="px-5 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">Batal</button>
      <button id="btnSubmitReport" onclick="submitReport()" class="px-6 py-2.5 bg-zero-gray hover:bg-gray-400 text-zero-white font-bold rounded-2xl hover: transition-all duration-200">Kirim Laporan</button>
    `;
  }
  
  modal.classList.remove('hidden');
}

function closePreviewModal() {
  const modal = document.getElementById('previewModal');
  if (modal) modal.classList.add('hidden');
}

async function submitReport() {
  if (AppState.isSubmitting) return;
  AppState.isSubmitting = true;
  
  const btn = document.getElementById('btnSubmitReport');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = 'Mengirim...';
    btn.classList.add('opacity-50', 'cursor-not-allowed');
  }
  showUploadLoading(true);
  
  // Beri waktu 50ms agar browser sempat me-render animasi loader sebelum thread diblokir oleh html2pdf
  await new Promise(resolve => setTimeout(resolve, 50));
  
  try {
    // Force save draft synchronously to capture last-millisecond checkbox changes
    if (typeof saveDraft === 'function') {
      saveDraft(true);
    }
    
    const f = window.form;
    
    // Generate Base64 PDF to send to GDrive so the format perfectly matches the client
    const htmlContent = buildPDFHtml(f);
    
    const opt = {
      margin: 0,
      filename: 'temp.pdf',
      image: { type: 'jpeg', quality: 0.8 }, 
      html2canvas: { scale: 1.2, useCORS: true, logging: false }, 
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    if (f.type === 'daily' && f.fase === 1) {
      f.pdfBase64 = null; // No PDF for Fase 1
    } else {
      try {
        const base64String = await html2pdf().set(opt).from(htmlContent).outputPdf('datauristring');
        if (base64String && base64String.includes(',')) {
          f.pdfBase64 = base64String.split(',')[1];
        }
      } catch (e) {
        console.warn("Gagal membuat base64 PDF, mengirim tanpa PDF base64", e);
      }
    }
    
    if (f.type === 'daily' && f.kebersihan && f.kebersihan.length > 0) {
      const kbHtmlContent = buildKebersihanPDFHtml(f);
      if (kbHtmlContent) {
        try {
          const kbBase64String = await html2pdf().set(opt).from(kbHtmlContent).outputPdf('datauristring');
          if (kbBase64String && kbBase64String.includes(',')) {
            f.kebersihanPdfBase64 = kbBase64String.split(',')[1];
          }
        } catch (e) {
          console.warn("Gagal membuat base64 PDF Kebersihan", e);
        }
      }
    }
    
    const payloadStr = JSON.stringify(f);
    const res = await Server.call('submitFullReport', payloadStr);
    
    if (res && res.success) {
      StorageHelper.remove('zc_draft_daily');
      StorageHelper.remove('zc_draft_weekly');
      StorageHelper.remove('zc_draft_monthly');
      
      showToast("Laporan berhasil dikirim!", "success");
      
      // Jika Fase 1, kembali ke dashboard. Jika normal/Fase 2, buka PDF.
      if (f.type === 'daily' && f.fase === 1) {
         setTimeout(function() {
           showUploadLoading(false);
           AppState.isSubmitting = false;
           window.location.reload();
         }, 1500);
      } else {
         const body = document.getElementById('previewModalBody');
         const modalFooter = document.getElementById('previewModalFooter');
         if (body) {
           body.innerHTML = `<div class="text-center py-6">
             <h4 class="text-xl font-bold text-gray-900 mb-2">Laporan Berhasil Dikirim!</h4>
             <p class="text-gray-600 mb-4">Laporan Anda telah disimpan ke database dan file PDF telah dibuat.</p>
             <div class="bg-gray-100 p-3 rounded-lg mb-6 text-sm text-left">
               <span class="font-bold text-gray-700">Lokasi Google Drive:</span><br/>
               <span class="text-gray-600 text-xs">${res.folderPath || 'Zero Cafe Workspace Drive'}</span>
             </div>
             <a href="${res.url}" target="_blank" class="inline-block px-6 py-3 bg-zero-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">Buka File PDF</a>
           </div>`;
         }
         if (modalFooter) {
           modalFooter.innerHTML = `<button onclick="closeSuccessModal()" class="px-6 py-2.5 bg-zero-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">Selesai</button>`;
         }
         showUploadLoading(false);
         AppState.isSubmitting = false;
      }
      
    } else if (res && res.isDuplicate) {
      showToast("DATA GANDA: " + res.message, "error");
      showUploadLoading(false);
      AppState.isSubmitting = false;
      const body = document.getElementById('previewModalBody');
      const modalFooter = document.getElementById('previewModalFooter');
      if (body) {
        body.innerHTML = `<div class="text-center py-6">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-4">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          </div>
          <h4 class="text-xl font-bold text-red-600 mb-2">Laporan Duplikat!</h4>
          <p class="text-gray-600 mb-4 text-sm px-4">Laporan untuk periode/tanggal ini sudah pernah diupload. Sistem mencegah pengiriman ganda.</p>
        </div>`;
      }
      if (modalFooter) {
        modalFooter.innerHTML = `<button onclick="closePreviewModal()" class="px-6 py-2.5 bg-gray-200 text-gray-700 font-bold rounded-2xl hover:bg-gray-300 transition-all">Tutup</button>`;
      }
    } else if (res && res.isDangling) {
      window.form = {}; // Destroy the form in memory so auto-save cannot resurrect it
      StorageHelper.remove('zc_draft_daily');
      showToast(res.message, "error");
      showUploadLoading(false);
      AppState.isSubmitting = false;
      setTimeout(function() {
        AppState.allPendingLaporan = null;
        transitionToMenu("select_report");
        checkPendingReports();
      }, 3500);
      closePreviewModal();
    } else {
      showToast("Gagal mengirim laporan: " + (res ? (res.error || res.message) : "Unknown error"), "error");
      showUploadLoading(false);
      AppState.isSubmitting = false;
      closePreviewModal();
    }
  } catch (err) {
    showToast("Error sistem: " + err.toString(), "error");
    showUploadLoading(false);
    AppState.isSubmitting = false;
    const btn = document.getElementById('btnSubmitReport');
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = 'Kirim Laporan';
      btn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
    showLoading(false);
  }
}

function closeSuccessModal() {
  closePreviewModal();
  AppState.menu = 'select_report';
  renderApp();
}

/* === FORM RESET LOGIC === */
function confirmResetForm() {
  const modal = document.getElementById('confirmResetModal');
  if (modal) modal.classList.remove('hidden');
}

function closeResetModal() {
  const modal = document.getElementById('confirmResetModal');
  if (modal) modal.classList.add('hidden');
}

function executeResetForm() {
  closeResetModal();
  const currentType = window.form.type;
  if (!currentType) return;
  
  StorageHelper.remove('zc_draft_' + currentType);
  resetFormData(currentType);
  
  if (currentType === 'daily') {
    window.form.staff = [];
  } else {
    const filteredStaff = AppState.masterStaff.filter(s => s.outlet && s.outlet.toLowerCase().trim() === (window.form.outlet || 'Perintis').toLowerCase().trim() && s.status === 'Aktif');
    if (currentType === 'weekly') {
      window.form.weekly.staff = filteredStaff.map(s => ({ nama: s.nama, kpi: "", kendala: "" }));
    } else if (currentType === 'monthly') {
      window.form.monthly.staff = filteredStaff.map(s => ({ nama: s.nama, posisi: s.posisi, attitude: "Baik", skill: "Bagus", rekomendasi: "Lanjut" }));
    }
  }
  
  renderApp();
  showToast("Laporan telah direset", "success");
}

window.openAddStaffModal = function() {
  const input = document.getElementById('newStaffName');
  const modal = document.getElementById('addStaffModal');
  if (input) input.value = "";
  if (modal) {
    modal.classList.remove('hidden');
    modal.style.display = 'flex';
  }
};

window.closeAddStaffModal = function() {
  const modal = document.getElementById('addStaffModal');
  if (modal) {
    modal.classList.add('hidden');
    modal.style.display = 'none';
  }
};

window.addStaffSubmit = async function() {
  const nameEl = document.getElementById('newStaffName');
  const posEl = document.getElementById('newStaffPosition');
  if (!nameEl || !posEl) return;
  const name = nameEl.value.trim();
  const pos = posEl.value;
  if (!name) return;
  
  try {
    const res = await Server.call('api_addMasterStaff', name, pos, window.form.outlet);
    if (res.success) {
      // Add to local master list
      AppState.masterStaff.push({ id: res.id, nama: name, posisi: pos, status: 'Aktif', outlet: window.form.outlet });
      
      // Auto-add to current form based on type
      if (window.form.type === 'daily') {
        window.form.staff.push({ nama: name, posisi: pos, status: "Hadir", keramahan: false, keterangan: "", outletAsal: window.form.outlet });
      } else if (window.form.type === 'weekly') {
        window.form.weekly.staff.push({ nama: name, posisi: pos, status: "Berkembang", alasan: "" });
      }
      renderApp();
    } else {
      showToast("Gagal menambahkan staff: " + res.error, "error");
    }
  } catch (err) {
    showToast("Koneksi gagal", "error");
  } finally {
    window.closeAddStaffModal();
  }
};

window.openBorrowStaffModal = function() {
  const currentOutlet = window.form.outlet || 'Perintis';
  const otherOutlet = currentOutlet === 'Perintis' ? 'Dg Tata' : 'Perintis';
  
  const select = document.getElementById('borrowStaffSelect');
  const label = document.getElementById('borrowStaffTargetLabel');
  const modal = document.getElementById('borrowStaffModal');
  
  if (!select || !modal) return;
  
  if (label) label.innerText = `Pilih Staf dari ${otherOutlet}`;
  
  const existingNames = (window.form.staff || []).map(s => s.nama);
  const otherStaff = AppState.masterStaff.filter(s => 
    s.outlet && s.outlet.toLowerCase().trim() === otherOutlet.toLowerCase().trim() && 
    s.status === 'Aktif' && 
    !existingNames.includes(s.nama)
  );
  
  let html = '<option value="">PILIH STAF PINJAMAN</option>';
  otherStaff.forEach(s => {
    html += `<option value="${s.nama}">${s.nama} (${s.posisi})</option>`;
  });
  select.innerHTML = html;
  
  modal.classList.remove('hidden');
  modal.style.display = 'flex';
};

window.closeBorrowStaffModal = function() {
  const modal = document.getElementById('borrowStaffModal');
  if (modal) {
    modal.classList.add('hidden');
    modal.style.display = 'none';
  }
};

window.borrowStaffSubmit = function() {
  const select = document.getElementById('borrowStaffSelect');
  if (!select) return;
  
  const nama = select.value;
  if (!nama) {
    showToast("Silakan pilih staf terlebih dahulu", "error");
    return;
  }
  
  const master = AppState.masterStaff.find(s => s.nama === nama);
  if (master) {
    if (window.form.type === 'daily') {
      window.form.staff.push({
        nama: master.nama,
        posisi: master.posisi,
        outletAsal: master.outlet,
        status: "Hadir",
        keramahan: false,
        keterangan: ""
      });
    }
    
    renderApp();
    showToast(`Berhasil meminjam ${master.nama}`, "success");
  }
  
  window.closeBorrowStaffModal();
};

/*  === DARK MODE INIT === */
(function() {
  try {
    const theme = StorageHelper.get('zc_theme');
    if (theme === 'dark' || (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  } catch(e) {
    console.warn("Gagal set tema:", e);
  }
})();
</script>
