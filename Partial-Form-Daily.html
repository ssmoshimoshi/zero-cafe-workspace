<!-- Partial-Form-Daily.html -->
<script>
window.updateDailyProgress = function() {
  let s1El = document.getElementById('inputShift1');
  let s2El = document.getElementById('inputShift2');
  
  let s1 = s1El && s1El.value ? Number(s1El.value.replace(/[^0-9]/g, '')) : 0;
  let s2 = s2El && s2El.value ? Number(s2El.value.replace(/[^0-9]/g, '')) : 0;
  
  form.penjualan.shift1 = s1;
  form.penjualan.shift2 = s2;
  
  let total = s1 + s2;
  let target = form.penjualan.target || 0;
  
  let pct = target > 0 ? Math.round((total / target) * 100) : 0;
  let barPct = Math.min(pct, 100);
  let barColor = pct >= 100 ? 'bg-emerald-500' : pct >= 70 ? 'bg-zero-black' : 'bg-gray-500';
  
  let fill = document.getElementById('progressBarFill');
  let pctText = document.getElementById('progressTextPct');
  let detailText = document.getElementById('progressTextDetail');
  
  if (fill) {
    fill.style.width = barPct + '%';
    fill.className = barColor + ' h-2 rounded-full transition-all duration-500';
  }
  if (pctText) pctText.innerText = pct + '%';
  if (detailText) {
    detailText.innerText = target > 0 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(total) + ' dari Rp ' + new Intl.NumberFormat('id-ID').format(target) : 'Target bulanan belum diset (0)';
  }
  
  let targetInput = document.getElementById('displayTargetHarian');
  if (targetInput) {
    targetInput.value = target > 0 ? 'Rp ' + new Intl.NumberFormat('id-ID').format(target) : 'Rp 0 (Belum Diset)';
  }
}

window.switchTab = function(tabNum) {
  AppState.currentTab = tabNum;
  renderApp();
}
window.nextTab = function() {
  if (AppState.currentTab < 9) switchTab(AppState.currentTab + 1);
}
window.prevTab = function() {
  if (AppState.currentTab > 1) switchTab(AppState.currentTab - 1);
}

function handleKebersihanCheckboxChange(checkboxEl, idx) {
  const r = checkboxEl.closest('.row-kebersihan');
  // Ambil status saat ini
  const sel = r.querySelector('select');
  const stat = sel.value || 'Bersih'; // fallback
  
  // Ambil semua checkbox di dalam grup status tersebut yang dicentang
  const groupClass = `.checklist-group-${stat.replace(' ', '')}`;
  const group = r.querySelector(groupClass);
  if (!group) return;
  
  const checkedBoxes = Array.from(group.querySelectorAll('input[type="checkbox"]:checked'));
  const values = checkedBoxes.map(cb => cb.value);
  
  window.form.kebersihan[idx].ket = values.join(', ');
}

function handleKebersihanSkorChange(inputEl, idx) {
  let skor = Number(inputEl.value);
  if (skor < 0) skor = 0;
  if (skor > 100) skor = 100;
  inputEl.value = skor;
  window.form.kebersihan[idx].skor = skor;
  
  let r = inputEl.closest('.row-kebersihan');
  let sel = r.querySelector('select');
  
  let stat = '';
  if (skor >= 80) stat = 'Bersih';
  else if (skor >= 60) stat = 'Cukup Bersih';
  else stat = 'Kotor';
  
  if (sel.value !== stat) {
    sel.value = stat;
    window.form.kebersihan[idx].status = stat;
    // Clear ket if status changed automatically
    window.form.kebersihan[idx].ket = "";
    // Uncheck all checkboxes
    const allCbs = r.querySelectorAll('input[type="checkbox"]');
    allCbs.forEach(cb => cb.checked = false);
  }
  
  updateKebersihanDOM(r, sel, stat);
}

function handleKebersihanStatusChange(selEl, idx) {
  let stat = selEl.value;
  let oldStat = window.form.kebersihan[idx].status;
  window.form.kebersihan[idx].status = stat;
  
  let r = selEl.closest('.row-kebersihan');
  let scoreInput = r.querySelector('input[type="number"]');
  
  let skor = 0;
  if (stat === 'Bersih') skor = 100;
  else if (stat === 'Cukup Bersih') skor = 75;
  else if (stat === 'Kotor') skor = 50;
  
  if (stat !== '') {
    scoreInput.value = skor;
    window.form.kebersihan[idx].skor = skor;
  }
  
  if (oldStat !== stat) {
    // Clear ket if status changed
    window.form.kebersihan[idx].ket = "";
    // Uncheck all checkboxes
    const allCbs = r.querySelectorAll('input[type="checkbox"]');
    allCbs.forEach(cb => cb.checked = false);
  }
  
  updateKebersihanDOM(r, selEl, stat);
}

function updateKebersihanDOM(rowEl, selEl, stat) {
  if (stat === 'Bersih') {
    selEl.className = 'flex-1 px-2 py-1.5 text-[10px] font-bold border border-emerald-300 bg-emerald-50 text-emerald-700 rounded focus:outline-none';
    rowEl.className = 'row-kebersihan border rounded-xl p-3 bg-gray-50/50 border-gray-100';
  } else if (stat === 'Cukup Bersih') {
    selEl.className = 'flex-1 px-2 py-1.5 text-[10px] font-bold border border-yellow-300 bg-yellow-50 text-yellow-700 rounded focus:outline-none';
    rowEl.className = 'row-kebersihan border rounded-xl p-3 bg-gray-50/50 border-gray-100';
  } else if (stat === 'Kotor') {
    selEl.className = 'flex-1 px-2 py-1.5 text-[10px] font-bold border border-red-300 bg-red-50 text-red-700 rounded focus:outline-none';
    rowEl.className = 'row-kebersihan border rounded-xl p-3 bg-red-50 border-red-200';
  } else {
    selEl.className = 'flex-1 px-2 py-1.5 text-[10px] font-bold border border-red-300 bg-white text-red-500 rounded focus:outline-none';
    rowEl.className = 'row-kebersihan border rounded-xl p-3 bg-red-50 border-red-200';
  }
  
  // Toggle checkbox groups visibility
  const groups = ['Bersih', 'CukupBersih', 'Kotor'];
  groups.forEach(g => {
    const div = rowEl.querySelector(`.checklist-group-${g}`);
    if (div) {
      if (stat.replace(' ', '') === g) {
        div.classList.remove('hidden');
      } else {
        div.classList.add('hidden');
      }
    }
  });
}
