<!-- CSS.html -->
<!-- Import Google Fonts and FontAwesome -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Montserrat', 'sans-serif'],
        },
        colors: {
          zero: {
            black: '#171717',
            white: '#F0EFEF',
            gray: '#919191',
          },
          // Kept for backward compatibility while migrating, but mapped to grayscale for cleaner look
          cafe: {
            50: '#f9fafb',
            100: '#f3f4f6',
            200: '#e5e7eb',
            300: '#d1d5db',
            400: '#9ca3af',
            500: '#919191', /* Accent gray */
            600: '#6b7280',
            700: '#4b5563',
            800: '#374151',
            900: '#171717', /* Brand black */
            950: '#0f0f0f',
          },
        }
      }
    }
  }
</script>

<style>
  body {
    font-family: 'Montserrat', sans-serif;
    background-color: #F0EFEF;
    color: #171717;
    min-height: 100vh;
    transition: background-color 0.3s, color 0.3s;
  }
  
  .dark body {
    background-color: #121212;
    color: #F0EFEF;
  }

  /* Ultra-clean Premium Glassmorphism / Card Styling */
  .glass-card {
    background: #ffffff;
    border: 1px solid rgba(0, 0, 0, 0.05);
    box-: 0 4px 20px rgba(0, 0, 0, 0.03);
    border-radius: 1.5rem; /* rounded corners */
  }

  .dark .glass-card {
    background: #1e1e1e;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-: 0 4px 20px rgba(0, 0, 0, 0.2);
  }

  .glass-card-dark {
    background: #171717;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-: 0 4px 20px rgba(0, 0, 0, 0.2);
  }

  /* Micro-interactions & animations */
  .transition-all-300 {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .hover-scale:hover {
    transform: translateY(-2px);
  }
  
  .active-scale:active, button:active {
    transform: scale(0.97);
  }

  /* Elegant custom scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: #e5e7eb;
    border-radius: 999px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #919191;
  }
  
  .dark ::-webkit-scrollbar-thumb {
    background: #374151;
  }
  .dark ::-webkit-scrollbar-thumb:hover {
    background: #919191;
  }
  
  /* Bottom Sheet Slide Up Animation */
  @keyframes slideUp {
    0% { transform: translateY(100%); }
    100% { transform: translateY(0); }
  }
  .animate-slide-up {
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* Shimmer Loading Animation */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer-loading {
    background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  .dark .shimmer-loading {
    background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
  }
  
  /* Input & Select styles for dark mode */
  .dark input, .dark select, .dark textarea {
    background-color: #2a2a2a !important;
    border-color: #4b5563 !important;
    color: #F0EFEF !important;
  }
  .dark input:focus, .dark select:focus, .dark textarea:focus {
    border-color: #919191 !important;
    --tw-ring-color: #919191 !important;
  }
  .dark ::placeholder {
    color: #9ca3af !important;
  }
  
  /* Button overrides for dark mode */
  .dark .bg-white {
    background-color: #2a2a2a !important;
    border-color: #4b5563 !important;
    color: #F0EFEF !important;
  }
  .dark .text-cafe-700, .dark .text-cafe-800, .dark .text-cafe-900 {
    color: #F0EFEF !important;
  }
</style>
