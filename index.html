<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Zero Cafe Workspace</title>
  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error:", e.message, "at", e.filename, ":", e.lineno);
    });
  </script>
  <?!= include('CSS'); ?>
</head>
<body class="overflow-x-hidden antialiased bg-[#f3f4f6]">
  <!-- Main Root Container -->
  <div id="app-root" class="max-w-md mx-auto bg-white min-h-screen relative overflow-x-hidden border-x border-gray-100 shadow-sm"></div>

  <!-- Global Loading Spinner overlay -->
  <div id="loadingSpinner" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden space-y-4">
    <div class="w-10 h-10 border-4 border-gray-500 border-t-white rounded-full animate-spin"></div>
    <span class="text-[10px] font-bold text-white tracking-widest uppercase">Memproses data...</span>
  </div>

  <!-- Toast Notification -->
  <div id="toastNotification" class="fixed bottom-5 right-5 px-6 py-3 rounded-2xl z-50 transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none"></div>

  <!-- Modals Container -->
  <!-- 1. Preview Modal -->
  <div id="previewModal" class="fixed inset-0 bg-[#0f0f0f]/60 backdrop-blur-sm z-40 flex items-center justify-center hidden p-4">
    <div class="bg-zero-white dark:bg-zero-black max-w-2xl w-full max-h-[85vh] rounded-3xl-2xl overflow-hidden border border-gray-200 dark:border-gray-800 flex flex-col transform scale-95 transition-all duration-300">
      <div class="px-6 py-4 bg-gradient-to-r from-gray-800 to-zero-black text-zero-white flex justify-between items-center">
        <h3 class="font-bold text-lg">Tinjau Laporan Sebelum Dikirim</h3>
        <button onclick="closePreviewModal()" class="text-white/80 hover:text-white"></button>
      </div>
      <div class="p-6 overflow-y-auto flex-1 text-sm text-gray-800 dark:text-gray-200" id="previewModalBody">
        <!-- Renders preview dynamically -->
      </div>
      <div id="previewModalFooter" class="px-6 py-4 bg-gray-50 dark:bg-[#1a1a1a] border-t border-gray-200 dark:border-gray-800 flex justify-end space-x-3">
        <button onclick="closePreviewModal()" class="px-5 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">Batal</button>
        <button onclick="submitReport()" class="px-6 py-2.5 bg-zero-gray hover:bg-gray-400 text-zero-white font-bold rounded-2xl hover: transition-all duration-200">Kirim Laporan</button>
      </div>
    </div>
  </div>

  <!-- 2. Add Staff Modal -->
  <div id="addStaffModal" class="fixed inset-0 bg-[#0f0f0f]/60 backdrop-blur-sm z-40 flex items-center justify-center hidden p-4">
    <div class="bg-zero-white dark:bg-zero-black max-w-sm w-full rounded-3xl-2xl overflow-hidden border border-gray-200 dark:border-gray-800 p-6">
      <h3 class="font-bold text-lg text-gray-900 dark:text-zero-white mb-4 flex items-center space-x-2">
        <span>Tambah Staff Baru</span>
      </h3>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider mb-2">Nama Lengkap</label>
          <input type="text" id="newStaffName" placeholder="Nama Lengkap" class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-zero-gray bg-white/50 dark:bg-gray-800 dark:text-zero-white">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider mb-2">Posisi</label>
          <select id="newStaffPosition" class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-zero-gray bg-white/50 dark:bg-gray-800 dark:text-zero-white">
            <option value="Barista">Barista</option>
            <option value="Waitres">Waitres</option>
            <option value="Kitchen">Kitchen</option>
          </select>
        </div>
      </div>
      <div class="mt-6 flex justify-end space-x-3">
        <button onclick="closeAddStaffModal()" class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Batal</button>
        <button onclick="addStaffSubmit()" class="px-5 py-2 bg-zero-gray hover:bg-gray-400 text-zero-white font-semibold rounded-2xl">Simpan</button>
      </div>
    </div>
  </div>

  <?!= include('JS-API'); ?>
  <?!= include('JS-App1'); ?>
  <?!= include('JS-App2'); ?>
</body>
</html>
