<script>
/**
 * Promisified wrapper for google.script.run
 */
const Server = {
  call: (funcName, ...args) => {
    return new Promise((resolve, reject) => {
      /*  Check if we are running in local test environment or GAS */
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler((err) => {
            console.error(`Error in server call ${funcName}:`, err);
            reject(err);
          })
          [funcName](...args);
      } else {
        /*  Fallback mockup for local preview if needed */
        console.warn(`Local simulation mode: ${funcName}`, args);
        setTimeout(() => {
          if (funcName === 'api_getMasterStaff') {
            resolve([
              { id: 1, nama: 'Amel (Demo)', posisi: 'Barista' },
              { id: 2, nama: 'Irma (Demo)', posisi: 'Waitres' },
              { id: 3, nama: 'Fitri (Demo)', posisi: 'Kitchen' }
            ]);
          } else if (funcName === 'api_addStaff') {
            resolve({ success: true, message: "Staff baru ditambahkan (Demo)" });
          } else if (funcName === 'submitFullReport') {
            resolve({ success: true, url: "https://drive.google.com/mock-pdf-url" });
          } else if (funcName === 'api_gm_fetchReports') {
            resolve({
              status: "success",
              data: {
                omsetTotal: 12500000,
                transaksiTotal: 450,
                komplainTotal: 3,
                listLaporan: [
                  { name: "Daily Report - 2026-06-27 (Fanani)", url: "#", dateCreated: "2026-06-27" },
                  { name: "Daily Report - 2026-06-26 (Gita)", url: "#", dateCreated: "2026-06-26" }
                ]
              }
            });
          } else if (funcName === 'initializeSystem') {
            resolve({ status: "success", message: "Sistem berhasil diinisialisasi (Demo)" });
          } else {
            resolve({ success: true });
          }
        }, 800);
      }
    });
  }
};

/**
 * Currency Formatting Helpers
 */
function formatRupiah(inputEl) {
  let val = inputEl.value.replace(/[^0-9-]/g, '');
  if (!val || val === '-' || val === '') return;
  inputEl.value = 'Rp ' + new Intl.NumberFormat('id-ID').format(val);
}

function unformatRupiah(inputEl) {
  let val = inputEl.value.replace(/[^0-9-]/g, '');
  inputEl.value = val;
}

function parseRupiah(str) {
  if (!str) return 0;
  return Number(str.toString().replace(/[^0-9-]/g, '')) || 0;
}
</script>
