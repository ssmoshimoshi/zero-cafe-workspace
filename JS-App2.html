<script>

function updateWeeklyStaff(idx, field, value) { window.form.weekly.staff[idx][field] = value; }
function addWeeklyArrayItem(arrName) { window.form.weekly[arrName].push(""); renderApp(); }
function removeWeeklyArrayItem(arrName, idx) { window.form.weekly[arrName].splice(idx, 1); renderApp(); }

function validateWeeklyPeriode() {
  if (!window.form.periodeStart || !window.form.periodeEnd) return;
  const diffDays = Math.ceil(Math.abs(new Date(window.form.periodeEnd) - new Date(window.form.periodeStart)) / (1000 * 60 * 60 * 24));
  const warningEl = document.getElementById('periodeWarning');
  if (warningEl) {
    if (diffDays > 6) { 
      warningEl.textContent = 'Peringatan: Periode maksimal 7 hari!';
      warningEl.classList.remove('hidden');
    } else {
      warningEl.classList.add('hidden');
      fetchWeeklyData();
    }
  }
}

async function fetchWeeklyData() {
  const f = window.form;
  if (!f.periodeStart || !f.periodeEnd) return;
  
  const container = document.getElementById('weeklySalesContainer');
  if (container) {
    container.classList.add('shimmer-loading', 'opacity-50', 'pointer-events-none');
  } else {
    showToast("Mengambil data omset dari database...", "info");
  }
  
  try {
    const res = await Server.call('api_getWeeklyData', f.periodeStart, f.periodeEnd, f.outlet || 'Perintis');
    if (res.success && res.data) {
      f.weekly.salesHarian = res.data;
      if (!container) showToast("Data omset dan target harian berhasil ditarik!", "success");
      renderApp(); // This will re-render and implicitly remove the shimmer class since it recreates the DOM element
    }
  } catch (err) {
    console.error("Error fetchWeeklyData", err);
    showToast("Gagal menarik data omset otomatis", "error");
    if (container) container.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
  }
}

async function fetchMonthlyData() {
  const f = window.form;
  if (!f.bulan) return;
  
  const salesContainer = document.getElementById('monthlySalesContainer');
  const qcContainer = document.getElementById('monthlyQcContainer');
  
  if (salesContainer) salesContainer.classList.add('shimmer-loading', 'opacity-50', 'pointer-events-none');
  if (qcContainer) qcContainer.classList.add('shimmer-loading', 'opacity-50', 'pointer-events-none');
  
  if (!salesContainer) {
    showToast("Mengambil data rekap bulanan...", "info");
  }
  
  try {
    const res = await Server.call('api_getMonthlyData', f.bulan, f.outlet || 'Perintis');
    if (res && res.success) {
      f.monthly.sales.total = res.totalReal || 0;
      f.monthly.sales.target = res.totalTarget || 0;
      f.monthly.qc.komplain = res.totalKomplain || 0;
      f.monthly.operasional.telat = res.totalTelat || 0;
      // f.monthly.operasional.teguran = res.totalTeguran || 0; // DISABLED: SP/Teguran is now input manually by SPV
      f.monthly.operasional.kepatuhanSop = res.kepatuhanSop || 0;
      
      if (res.staffEvaluations && res.staffEvaluations.length > 0) {
        f.monthly.staff = res.staffEvaluations;
      }
      
      // Calculate percentage
      if (f.monthly.sales.target > 0) {
        f.monthly.sales.persen = Math.round(f.monthly.sales.total / f.monthly.sales.target * 100);
      } else {
        f.monthly.sales.persen = 0;
      }
      
      if (!salesContainer) showToast("Data bulanan berhasil ditarik!", "success");
      renderApp();
    } else if (res && !res.success) {
      showToast("Gagal dari server: " + res.error, "error");
      if (salesContainer) salesContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
      if (qcContainer) qcContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
    }
  } catch (err) {
    console.error("Error fetchMonthlyData", err);
    showToast("Koneksi gagal: " + (err.message || err), "error");
    if (salesContainer) salesContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
    if (qcContainer) qcContainer.classList.remove('shimmer-loading', 'opacity-50', 'pointer-events-none');
  }
}

function updateWeeklySalesField(idx, field, value) {
  window.form.weekly.salesHarian[idx][field] = parseRupiah(value);
  setTimeout(() => { if (AppState.currentTab === 2) renderApp(); }, 100);
}

function updateMonthlySalesField(field, value) {
  window.form.monthly.sales[field] = value;
  if (field === 'total' || field === 'target') {
    if (window.form.monthly.sales.target > 0) {
      window.form.monthly.sales.persen = Math.round(window.form.monthly.sales.total / window.form.monthly.sales.target * 100);
    } else {
      window.form.monthly.sales.persen = 0;
    }
    
    // Update DOM directly to prevent scrolling/losing focus
    const persenEl = document.getElementById('monthlyPersenDisplay');
    if (persenEl) persenEl.innerText = window.form.monthly.sales.persen + '%';
  }
}
function updateMonthlyRating(value) {
  window.form.monthly.evaluasi.ratingKerja = Number(value);
  const display = document.getElementById('monthlyRatingDisplay');
  if (display) display.innerText = value;
}
function updateMonthlyStaff(idx, field, value) { window.form.monthly.staff[idx][field] = value; }
function addMonthlyStaffRow() { window.form.monthly.staff.push({ nama: "", kriteria: "Inisiatif", nilai: "Baik", alasan: "" }); renderApp(); }
function removeMonthlyStaffRow(idx) { window.form.monthly.staff.splice(idx, 1); renderApp(); }

function addMonthlyQCItem() {
  if (!window.form.monthly.qc.items) window.form.monthly.qc.items = [];
  window.form.monthly.qc.items.push({ menu: "", status: "Baik", komplain: "", rekomendasi: "" });
  renderApp();
}

function toggleAccordion(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById('icon-' + id);
  if (el && el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    if (icon) icon.style.transform = 'rotate(180deg)';
  } else if (el) {
    el.classList.add('hidden');
    if (icon) icon.style.transform = 'rotate(0deg)';
  }
}
function removeMonthlyQCItem(idx) {
  window.form.monthly.qc.items.splice(idx, 1);
  renderApp();
}
function updateMonthlyQCItem(idx, field, value) {
  window.form.monthly.qc.items[idx][field] = value;
}



async function fetchGMAnalytics() {
  const monthEl = document.getElementById('filterMonth');
  const yearEl = document.getElementById('filterYear');
  if (!monthEl || !yearEl) return;
  
  AppState.activeFilters.month = monthEl.value;
  AppState.activeFilters.year = yearEl.value;
  
  showLoading(true);
  try {
    const rawRes = await Server.call('api_gm_fetchReports', AppState.activeFilters.month, AppState.activeFilters.year);
    const res = typeof rawRes === 'string' ? JSON.parse(rawRes) : rawRes;
    
    if (res && res.status === 'success') {
      AppState.dashboardData = res.data;
      showToast("Data analitik berhasil diperbarui.");
    } else {
      showToast("Gagal menarik data: " + (res ? res.error : "Unknown error"), "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
    renderApp();
    if (AppState.dashboardData && AppState.dashboardData.chartData) {
      setTimeout(renderGMChart, 100);
    }
  }
}

async function saveTargetOmset() {
  const input = document.getElementById('inputTargetOmset');
  if (!input) return;
  const targetVal = input.value;
  
  if (!targetVal || isNaN(targetVal)) {
    showToast("Target omset tidak valid", "error");
    return;
  }
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_setTargetOmset', AppState.activeFilters.month, AppState.activeFilters.year, targetVal);
    if (res.success) {
      showToast("Target Omset berhasil disimpan!");
      // Refresh analytics to recalculate percentage
      fetchGMAnalytics();
    } else {
      showToast("Gagal menyimpan: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}

let gmChartInstance = null;
function renderGMChart() {
  const ctx = document.getElementById('gmChart');
  if (!ctx) return;
  
  if (gmChartInstance) {
    gmChartInstance.destroy();
  }
  
  const data = AppState.dashboardData.chartData || [];
  const labels = data.map(d => {
    // Convert YYYY-MM-DD to DD (e.g. "2026-07-05" -> "05")
    let parts = d.date.split('-');
    return parts.length === 3 ? parts[2] : d.date;
  });
  const values = data.map(d => d.omset);
  
  gmChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Omset Harian (Rp)',
        data: values,
        borderColor: '#0f0f0f',
        backgroundColor: 'rgba(15, 15, 15, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointBackgroundColor: '#ffffff',
        pointBorderColor: '#0f0f0f',
        pointBorderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0f0f0f',
          padding: 10,
          titleFont: { size: 10, weight: 'bold' },
          bodyFont: { size: 12, weight: 'bold' },
          callbacks: {
            label: function(context) {
              return 'Rp ' + context.parsed.y.toLocaleString('id-ID');
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } },
        y: { 
          grid: { borderDash: [5, 5], color: '#e5e7eb' }, 
          ticks: { 
            font: { size: 10, weight: 'bold' },
            callback: function(value) {
              if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
              return value;
            }
          }
        }
      }
    }
  });
}

async function updateFolderId() {
  const input = document.getElementById('targetFolderId');
  if (!input) return;
  const newId = input.value.trim();
  
  if (!newId) {
    showToast("ID Folder tidak boleh kosong", "error");
    return;
  }
  
  showLoading(true);
  try {
    const res = await Server.call('api_gm_updateFolderId', newId);
    if (res.success) {
      showToast("Berhasil! Folder: " + res.folderName);
      if (AppState.dashboardData) {
        AppState.dashboardData.currentFolderId = newId;
      }
    } else {
      showToast("Gagal: " + res.error, "error");
    }
  } catch (err) {
    showToast("Kesalahan sistem: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
}

function openPreviewModal() {
  const f = window.form;
  
  // Patch missing posisi from old drafts
  if (f.type === 'weekly' && f.weekly && f.weekly.staff) {
    f.weekly.staff.forEach(s => {
      if (!s.posisi && AppState.masterStaff) {
        const m = AppState.masterStaff.find(x => x.nama === s.nama);
        if (m) s.posisi = m.posisi;
      }
    });
  } else if (f.type === 'monthly' && f.monthly && f.monthly.staff) {
    f.monthly.staff.forEach(s => {
      if (!s.posisi && AppState.masterStaff) {
        const m = AppState.masterStaff.find(x => x.nama === s.nama);
        if (m) s.posisi = m.posisi;
      }
    });
  }
  
  const err = window.validateFormCompletion(f);
  if (err) { showToast(err, "error"); return; }
  const body = document.getElementById('previewModalBody');
  const modal = document.getElementById('previewModal');
  if (!body || !modal) return;
  
  // Ensure all data in form is updated before building HTML
  const previewHtml = buildPDFHtml(window.form);
  body.innerHTML = previewHtml;
  modal.classList.remove('hidden');
}

function closePreviewModal() {
  const modal = document.getElementById('previewModal');
  if (modal) modal.classList.add('hidden');
}

async function submitReport() {
  showLoading(true);
  try {
    const f = window.form;
    
    // Generate Base64 PDF to send to GDrive so the format perfectly matches the client
    const htmlContent = buildPDFHtml(f);
    
    const opt = {
      margin: 0,
      filename: 'temp.pdf',
      image: { type: 'jpeg', quality: 0.8 }, // Reduced for smaller base64 size
      html2canvas: { scale: 1.2, useCORS: true, logging: false }, // Reduced scale for faster generation & smaller size
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    try {
      const base64String = await html2pdf().set(opt).from(htmlContent).outputPdf('datauristring');
      if (base64String && base64String.includes(',')) {
        f.pdfBase64 = base64String.split(',')[1];
      }
    } catch (e) {
      console.warn("Gagal membuat base64 PDF, mengirim tanpa PDF base64", e);
    }
    
    const payloadStr = JSON.stringify(f);
    const res = await Server.call('submitFullReport', payloadStr);
    if (res.success) {
      StorageHelper.remove('zc_draft_daily');
      StorageHelper.remove('zc_draft_weekly');
      StorageHelper.remove('zc_draft_monthly');
      const currentType = window.form.type;
      resetFormData(currentType);
      const body = document.getElementById('previewModalBody');
      const modalFooter = document.getElementById('previewModalFooter');
      if (body) {
        body.innerHTML = `<div class="text-center py-6">
          <h4 class="text-xl font-bold text-gray-900 mb-2">Laporan Berhasil Dikirim!</h4>
          <p class="text-gray-600 mb-4">Laporan Anda telah disimpan ke database dan file PDF telah dibuat.</p>
          <div class="bg-gray-100 p-3 rounded-lg mb-6 text-sm text-left">
            <span class="font-bold text-gray-700">Lokasi Google Drive:</span><br/>
            <span class="text-gray-600 text-xs">${res.folderPath || 'Zero Cafe Workspace Drive'}</span>
          </div>
          <a href="${res.url}" target="_blank" class="inline-block px-6 py-3 bg-zero-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">Buka File PDF</a>
        </div>`;
      }
      if (modalFooter) {
        modalFooter.innerHTML = `<button onclick="closeSuccessModal()" class="px-6 py-2.5 bg-zero-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">Selesai</button>`;
      }
    } else if (res.isDuplicate) {
      // Special handling for duplicate reports
      showToast("DATA GANDA: " + res.message, "error");
      
      const body = document.getElementById('previewModalBody');
      const modalFooter = document.getElementById('previewModalFooter');
      if (body) {
        body.innerHTML = `<div class="text-center py-6">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-4">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          </div>
          <h4 class="text-xl font-bold text-red-600 mb-2">Laporan Duplikat!</h4>
          <p class="text-gray-600 mb-4 text-sm px-4">Laporan untuk periode/tanggal ini sudah pernah diupload. Sistem mencegah pengiriman ganda.</p>
        </div>`;
      }
      if (modalFooter) {
        modalFooter.innerHTML = `<button onclick="closePreviewModal()" class="px-6 py-2.5 bg-gray-200 text-gray-700 font-bold rounded-2xl hover:bg-gray-300 transition-all">Tutup</button>`;
      }
    } else {
      showToast("Gagal mengirim laporan: " + res.error, "error");
      closePreviewModal();
    }
  } catch (err) {
    showToast("Error sistem: " + err.toString(), "error");
    closePreviewModal();
  } finally {
    showLoading(false);
  }
}

function closeSuccessModal() {
  closePreviewModal();
  AppState.menu = 'select_report';
  renderApp();
}

/* === FORM RESET LOGIC === */
window.confirmResetForm = function() {
  try {
    const modal = document.getElementById('confirmResetModal');
    if (!modal) {
      if (window.showToast) window.showToast("Modal Reset tidak ditemukan", "error");
      return;
    }
    modal.classList.remove('hidden');
    modal.style.setProperty('display', 'flex', 'important');
    modal.style.setProperty('opacity', '1', 'important');
    modal.style.setProperty('pointer-events', 'auto', 'important');
    modal.style.setProperty('z-index', '9999', 'important');
  } catch(e) {
    if (window.showToast) window.showToast("Error: " + e.message, "error");
    alert("Error: " + e.message);
  }
};

window.closeResetModal = function() {
  const modal = document.getElementById('confirmResetModal');
  if (modal) {
    modal.classList.add('hidden');
    modal.style.setProperty('display', 'none', 'important');
  }
};

window.executeResetForm = function() {
  try {
    window.closeResetModal();
    const currentType = window.form.type;
    if (!currentType) {
      if (window.showToast) window.showToast("Tipe laporan tidak ditemukan", "error");
      return;
    }
    
    StorageHelper.remove('zc_draft_' + currentType);
    resetFormData(currentType);
    
    // Re-initialize dynamic staff if it was daily
    if (currentType === 'daily') {
      window.form.staff = [];
    } else if (currentType === 'weekly') {
      window.form.weekly.staff = AppState.masterStaff.map(s => ({ nama: s.nama, posisi: s.posisi, status: "", alasan: "" }));
    } else if (currentType === 'monthly') {
      window.form.monthly.staff = AppState.masterStaff.map(s => ({ nama: s.nama, posisi: s.posisi, attitude: "Baik", skill: "Bagus", rekomendasi: "Lanjut" }));
    }
    
    renderApp();
    if (window.showToast) window.showToast("Laporan telah direset", "success");
  } catch(e) {
    if (window.showToast) window.showToast("Error reset: " + e.message, "error");
  }
};

window.openAddStaffModal = function() {
  try {
    const input = document.getElementById('newStaffName');
    const modal = document.getElementById('addStaffModal');
    if (!modal) {
      if (window.showToast) window.showToast("Modal Tambah Staff tidak ditemukan", "error");
      return;
    }
    if (input) input.value = "";
    modal.classList.remove('hidden');
    modal.style.setProperty('display', 'flex', 'important');
    modal.style.setProperty('opacity', '1', 'important');
    modal.style.setProperty('pointer-events', 'auto', 'important');
    modal.style.setProperty('z-index', '9999', 'important');
  } catch(e) {
    if (window.showToast) window.showToast("Error: " + e.message, "error");
    alert("Error: " + e.message);
  }
};

window.closeAddStaffModal = function() {
  const modal = document.getElementById('addStaffModal');
  if (modal) {
    modal.classList.add('hidden');
    modal.style.setProperty('display', 'none', 'important');
  }
};

window.addStaffSubmit = async function() {
  const nameEl = document.getElementById('newStaffName');
  const posEl = document.getElementById('newStaffPosition');
  if (!nameEl || !posEl) return;
  
  const name = nameEl.value.trim();
  const pos = posEl.value;
  if (!name) {
    if (window.showToast) window.showToast("Nama staf tidak boleh kosong!", "error");
    return;
  }
  
  window.closeAddStaffModal();
  showLoading(true);
  try {
    const res = await Server.call('api_addStaff', name, pos);
    if (res.success) {
      if (window.showToast) window.showToast(res.message);
      await fetchMasterStaff();
      if (window.form.type === 'daily') {
        window.form.staff.push({ nama: name, posisi: pos, status: "Hadir", keramahan: false, keterangan: "" });
      } else if (window.form.type === 'weekly') {
        window.form.weekly.staff = AppState.masterStaff.map(s => {
          const existing = window.form.weekly.staff.find(fs => fs.nama === s.nama);
          return existing || { nama: s.nama, posisi: s.posisi, status: "Berkembang", alasan: "" };
        });
      }
      renderApp();
    } else {
      if (window.showToast) window.showToast("Gagal menyimpan staff: " + res.error, "error");
    }
  } catch (err) {
    if (window.showToast) window.showToast("Error: " + err.toString(), "error");
  } finally {
    showLoading(false);
  }
};

/*  === DARK MODE INIT === */
(function() {
  try {
    const theme = StorageHelper.get('zc_theme');
    if (theme === 'dark' || (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  } catch(e) {
    console.warn("Gagal set tema:", e);
  }
})();
</script>
