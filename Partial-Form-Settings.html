window.loadParametersList = function() {
  const container = document.getElementById('paramListContainer');
  const outlet = AppState.outlet || "Semua";
  
  google.script.run
    .withSuccessHandler(function(resStr) {
      try {
        const res = JSON.parse(resStr);
        if (res.status === 'success') {
          if (res.data.length === 0) {
            container.innerHTML = `<div class="p-6 bg-white border border-gray-100 rounded-3xl text-center shadow-sm">
              <p class="text-xs text-gray-400 font-medium">Belum ada event parameter yang tersimpan.</p>
            </div>`;
          } else {
            let listHtml = '';
            res.data.forEach(p => {
              listHtml += `
                <div class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm flex flex-col gap-2">
                  <div class="flex justify-between items-start">
                    <span class="text-[10px] font-bold text-white bg-zero-black px-2 py-0.5 rounded-full uppercase tracking-wider">${p.kategori}</span>
                    <span class="text-[10px] font-bold ${p.status === 'Aktif' ? 'text-emerald-500' : 'text-gray-400'} uppercase tracking-wider">${p.status}</span>
                  </div>
                  <h4 class="font-bold text-sm text-zero-black">${p.namaEvent}</h4>
                  <p class="text-xs text-gray-500 font-medium">${p.tglMulai} s/d ${p.tglSelesai}</p>
                </div>
              `;
            });
            container.innerHTML = listHtml;
          }
        }
      } catch(e) {
        console.error(e);
        container.innerHTML = `<p class="text-xs text-red-500 text-center py-4">Gagal memuat data.</p>`;
      }
    })
    .withFailureHandler(function(e) {
      console.error(e);
      container.innerHTML = `<p class="text-xs text-red-500 text-center py-4">Terjadi kesalahan jaringan.</p>`;
    })
    .api_getParameters(outlet);
}
window.submitTargetBulanan = function() {
  const bulan = document.getElementById('targetBulan').value;
  const tahun = document.getElementById('targetTahun').value;
  const targetOmsetStr = document.getElementById('targetOmsetInput').value;
  
  if (!targetOmsetStr) {
    showToast("Harap isi Total Target!", "error");
    return;
  }
  
  const targetOmset = targetOmsetStr.replace(/[^0-9]/g, '');
  const bulanTahun = bulan + "-" + tahun;
  const outlet = document.getElementById('targetOutlet').value || AppState.outlet || "Semua";
  
  const btnText = document.getElementById('btnSaveTargetText');
  const btnLoader = document.getElementById('btnSaveTargetLoader');
  btnText.classList.add('hidden');
  btnLoader.classList.remove('hidden');
  
  google.script.run
    .withSuccessHandler(function(resStr) {
      btnText.classList.remove('hidden');
      btnLoader.classList.add('hidden');
      try {
        const res = JSON.parse(resStr);
        if (res.status === 'success') {
          showToast("Target Bulanan Berhasil Disimpan!", "success");
          document.getElementById('targetOmsetInput').value = '';
        } else {
          showToast("Gagal: " + res.error, "error");
        }
      } catch(e) {
        showToast("Error parsing response", "error");
      }
    })
    .withFailureHandler(function(e) {
      btnText.classList.remove('hidden');
      btnLoader.classList.add('hidden');
      showToast("Terjadi kesalahan jaringan", "error");
    })
    .api_saveConfigTarget(bulanTahun, outlet, targetOmset);
}

window.submitParameter = function() {
  const kategori = document.getElementById('paramKategori').value;
  const namaEvent = document.getElementById('paramNamaEvent').value;
  const tglMulai = document.getElementById('paramTglMulai').value;
  const tglSelesai = document.getElementById('paramTglSelesai').value;
  
  if (!namaEvent || !tglMulai || !tglSelesai) {
    showToast("Harap isi Nama Event dan Rentang Tanggal!", "error");
    return;
  }
  
  if (tglMulai > tglSelesai) {
    showToast("Tanggal Selesai tidak boleh mendahului Tanggal Mulai!", "error");
    return;
  }
  
  const payload = {
    outlet: document.getElementById('paramOutlet').value || AppState.outlet || "Semua",
    kategori: kategori,
    namaEvent: namaEvent,
    tglMulai: tglMulai,
    tglSelesai: tglSelesai
  };
  
  const btnText = document.getElementById('btnSaveParamText');
  const btnLoader = document.getElementById('btnSaveParamLoader');
  btnText.classList.add('hidden');
  btnLoader.classList.remove('hidden');
  
  google.script.run
    .withSuccessHandler(function(resStr) {
      btnText.classList.remove('hidden');
      btnLoader.classList.add('hidden');
      try {
        const res = JSON.parse(resStr);
        if (res.status === 'success') {
          showToast(res.message, "success");
          document.getElementById('paramNamaEvent').value = '';
          document.getElementById('paramTglMulai').value = '';
          document.getElementById('paramTglSelesai').value = '';
          loadParametersList();
        } else {
          showToast(res.error || "Gagal menyimpan", "error");
        }
      } catch(e) {
        showToast("Error parsing response", "error");
      }
    })
    .withFailureHandler(function(e) {
      btnText.classList.remove('hidden');
      btnLoader.classList.add('hidden');
      showToast("Gagal menghubungi server", "error");
    })
    .api_saveParameter(JSON.stringify(payload));
}

// ================= MASTER STAFF FUNCTIONS =================
window.openMasterStaffModal = function() {
  document.getElementById('staffModalOutletLabel').innerText = AppState.outlet || 'Semua';
  const modal = document.getElementById('modalSPVMasterStaff');
  const content = document.getElementById('modalSPVMasterStaffContent');
  if (modal && content) {
    modal.classList.remove('hidden');
    setTimeout(() => {
      content.classList.remove('translate-y-full');
      content.classList.add('translate-y-0');
      renderMasterStaffList();
    }, 10);
  }
};

window.closeMasterStaffModal = function() {
  const modal = document.getElementById('modalSPVMasterStaff');
  const content = document.getElementById('modalSPVMasterStaffContent');
  if (modal && content) {
    content.classList.remove('translate-y-0');
    content.classList.add('translate-y-full');
    setTimeout(() => {
      modal.classList.add('hidden');
    }, 300);
  }
};

window.renderMasterStaffList = async function() {
  const container = document.getElementById('spvMasterStaffContainer');
  if (!container) return;
  const outlet = AppState.outlet || "Semua";
  
  container.innerHTML = `
    <div class="flex justify-center py-8">
      <svg class="animate-spin h-6 w-6 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>
  `;

  try {
    const staffList = await Server.call('api_getAllMasterStaff', outlet);
    
    if (!staffList || staffList.length === 0) {
      container.innerHTML = '<p class="text-xs text-center text-gray-500 py-8">Tidak ada data staff untuk outlet ini.</p>';
      return;
    }
    
    let html = '<div class="space-y-3">';
    staffList.forEach((staff) => {
      const isAktif = staff.status === 'Aktif';
      const badgeColor = isAktif ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800';
      
      html += `
        <div class="border border-gray-100 rounded-xl p-4 bg-gray-50/50">
          <div class="flex justify-between items-start mb-2">
            <div>
              <span class="text-xs font-bold ${isAktif ? 'text-zero-black' : 'text-gray-400 line-through'}">${staff.nama}</span>
              <span class="text-[10px] text-gray-500 ml-1">(${staff.posisi})</span>
            </div>
            <span class="text-[8px] font-bold px-2 py-0.5 rounded-full ${badgeColor}">${staff.status}</span>
          </div>
          <div class="flex gap-2 border-t border-gray-100 pt-3 mt-3">
            <button onclick="editMasterStaff('${staff.id}', '${staff.nama}', '${staff.posisi}', '${staff.status}', '${staff.outlet}')" class="flex-1 py-2 bg-white border border-gray-200 text-zero-black rounded-lg text-[9px] font-bold hover:bg-gray-50 transition-colors">EDIT</button>
          </div>
        </div>
      `;
    });
    html += '</div>';
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<p class="text-xs text-center text-red-500 py-8">Gagal memuat data staff.</p>';
  }
};

window.openAddStaffModal = function() {
  document.getElementById('editStaffTitle').innerText = 'TAMBAH STAF BARU';
  document.getElementById('editStaffSubtitle').innerText = 'Daftarkan staf baru ke outlet Anda';
  document.getElementById('editStaffId').value = '';
  document.getElementById('editStaffNama').value = '';
  document.getElementById('editStaffPosisi').value = 'Barista';
  document.getElementById('editStaffStatus').value = 'Aktif';
  document.getElementById('editStaffStatusContainer').classList.add('hidden');
  
  const modal = document.getElementById('modalSPVEditStaff');
  const content = document.getElementById('modalSPVEditStaffContent');
  if (modal && content) {
    modal.classList.remove('hidden');
    setTimeout(() => {
      content.classList.remove('translate-y-full');
      content.classList.add('translate-y-0');
    }, 10);
  }
};

window.editMasterStaff = function(id, nama, posisi, status, outlet) {
  document.getElementById('editStaffTitle').innerText = 'EDIT STAF';
  document.getElementById('editStaffSubtitle').innerText = 'Ubah data staf outlet';
  document.getElementById('editStaffId').value = id;
  document.getElementById('editStaffNama').value = nama;
  document.getElementById('editStaffPosisi').value = posisi;
  document.getElementById('editStaffStatus').value = status;
  document.getElementById('editStaffStatusContainer').classList.remove('hidden');
  
  const modal = document.getElementById('modalSPVEditStaff');
  const content = document.getElementById('modalSPVEditStaffContent');
  if (modal && content) {
    modal.classList.remove('hidden');
    setTimeout(() => {
      content.classList.remove('translate-y-full');
      content.classList.add('translate-y-0');
    }, 10);
  }
};

window.closeEditStaffModal = function() {
  const modal = document.getElementById('modalSPVEditStaff');
  const content = document.getElementById('modalSPVEditStaffContent');
  if (modal && content) {
    content.classList.remove('translate-y-0');
    content.classList.add('translate-y-full');
    setTimeout(() => {
      modal.classList.add('hidden');
    }, 300);
  }
};

window.saveEditStaff = async function() {
  const id = document.getElementById('editStaffId').value;
  const nama = document.getElementById('editStaffNama').value.trim();
  const posisi = document.getElementById('editStaffPosisi').value;
  const status = document.getElementById('editStaffStatus').value || 'Aktif';
  const outlet = AppState.outlet || "Semua"; 
  
  if (!nama) {
    showToast("Nama tidak boleh kosong", "error");
    return;
  }
  
  const btnText = document.getElementById('btnSaveEditStaffText');
  const btnLoader = document.getElementById('btnSaveEditStaffLoader');
  btnText.classList.add('opacity-0');
  btnLoader.classList.remove('hidden');
  
  try {
    let res;
    if (id) {
      res = await Server.call('api_updateMasterStaff', id, nama, posisi, status, outlet);
    } else {
      res = await Server.call('api_addMasterStaff', nama, posisi, outlet);
    }
    
    if (res && res.success) {
      showToast("Data staf berhasil disimpan!", "success");
      closeEditStaffModal();
      renderMasterStaffList();
    } else {
      showToast(res && res.error ? res.error : "Gagal menyimpan data", "error");
    }
  } catch (e) {
    showToast("Terjadi kesalahan sistem", "error");
  } finally {
    btnText.classList.remove('opacity-0');
    btnLoader.classList.add('hidden');
  }
};
</script>
